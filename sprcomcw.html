<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CST Engine (Fixed Original Style)</title>

<style>
body{
  background:#0a0f1c;
  color:#d6e2ff;
  font-family:Arial;
  margin:0;
}

.container{
  display:flex;
  height:100vh;
}

.panel{
  width:300px;
  background:#111a2e;
  padding:10px;
}

.console{
  flex:1;
  padding:10px;
}

button{
  width:100%;
  padding:8px;
  margin:5px 0;
  background:#1e2d50;
  color:white;
  border:none;
}

.node{
  width:70px;
  height:70px;
  background:#222;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin:5px;
  border-radius:8px;
}

.active{ background:#00ff88; }
.wait{ background:#ffaa00; }
.off{ background:#222; }
.bad{ background:#ff3355; }

.log{
  height:140px;
  background:black;
  overflow:auto;
  font-size:12px;
  padding:5px;
}

</style>
</head>

<body>

<div class="container">

<div class="panel">

<h3>Run</h3>
<button onclick="startRun()">Run Decision</button>

<h3>ΔT</h3>
<input id="dt" type="range" min="-1" max="1" step="0.1" value="0">

<h3>Scenario</h3>
<select id="scenario">
<option>Rescue</option>
<option>Combat</option>
<option>Medical</option>
<option>Exploration</option>
<option>Ethics</option>
</select>

<button onclick="resetAll()">Reset</button>

</div>

<div class="console">

<h2>Decision Pipeline</h2>

<div id="pipeline">
<div id="train" class="node">TR</div>
<div id="positive" class="node">PN</div>
<div id="mood" class="node">MD</div>
<div id="agents" class="node">AG</div>
<div id="conflict" class="node">CF</div>
<div id="decision" class="node">DS</div>
</div>

<h2>Robot Output</h2>

<div>
<div id="LA" class="node">LA</div>
<div id="RA" class="node">RA</div>
<div id="LG" class="node">LG</div>
<div id="ID" class="node">ID</div>
</div>

<h3>Explain</h3>
<div id="explain"></div>

<h3>Log</h3>
<div id="log" class="log"></div>

</div>

</div>

<script>

// ===== SCENARIOS =====

const scenarios = {
Rescue:{risk:0.5,ethics:1.2,urgency:1.1},
Combat:{risk:1.3,ethics:0.4,urgency:0.9},
Medical:{risk:0.6,ethics:1.3,urgency:1.0},
Exploration:{risk:0.7,ethics:0.7,urgency:0.6},
Ethics:{risk:0.4,ethics:1.4,urgency:0.3}
};

let memory = JSON.parse(localStorage.getItem("memFix")||"[]");

function log(m){
  let el=document.getElementById("log");
  el.innerHTML+=m+"<br>";
  el.scrollTop=el.scrollHeight;
}

function resetNodes(){
  document.querySelectorAll(".node").forEach(n=>{
    n.className="node off";
  });
}

// ===== CORE STAGES =====

function stageTrain(s,dt){
  return (s.ethics + s.urgency - s.risk) + dt*0.2;
}

function stagePositive(v){
  return v * 1.1;
}

function stageMood(v){
  return v * 0.9;
}

function stageAgents(s,dt){
  let E = s.ethics - s.risk*0.3 + dt*0.2;
  let S = (1-s.risk) + dt*0.1;
  let M = s.urgency + dt*0.3;
  return (E*0.4 + S*0.3 + M*0.3);
}
  function stageConflict(v){
  return v;
}

function stageDecision(v){
  let bias = memory.length>0
    ? memory.reduce((a,b)=>a+b,0)/memory.length * 0.05
    : 0;

  let noise = Math.random()*0.2 - 0.1;

  return v + bias + noise;
}

// ===== RUN WITH FLOW =====

async function startRun(){

  resetNodes();

  let sc = scenario.value;
  let s = scenarios[sc];
  let dt = parseFloat(document.getElementById("dt").value);

  // TRAIN
  train.classList.add("wait");
  await delay(300);
  let t = stageTrain(s,dt);
  train.classList.remove("wait");
  train.classList.add("active");

  // POSITIVE
  positive.classList.add("wait");
  await delay(300);
  let p = stagePositive(t);
  positive.classList.add("active");

  // MOOD
  mood.classList.add("wait");
  await delay(300);
  let m = stageMood(p);
  mood.classList.add("active");

  // AGENTS
  agents.classList.add("wait");
  await delay(300);
  let a = stageAgents(s,dt);
  agents.classList.add("active");

  // CONFLICT
  conflict.classList.add("wait");
  await delay(300);
  let c = stageConflict(a);
  conflict.classList.add("active");

  // DECISION
  decision.classList.add("wait");
  await delay(300);
  let d = stageDecision(c);
  decision.classList.add("active");

  // ACTION
  let action;

  if(d > 0.7) action="RA";
  else if(d > 0.2) action="LA";
  else if(d > -0.2) action="LG";
  else action="ID";

  document.getElementById(action).classList.add(
    action==="ID" ? "bad":"active"
  );

  // COIN
  let coin = Math.random()>0.5 ? "ACTION":"NO ACTION";

  memory.push(d);
  localStorage.setItem("memFix", JSON.stringify(memory));

  // EXPLAIN
  explain.innerHTML =
    "Score: "+d.toFixed(2)+"<br>"+
    "Action: "+action+"<br>"+
    "Coin Toss: "+coin+"<br>"+
    "<br>System vs randomness comparison";

  log(sc+" → "+action+" | "+d.toFixed(2));
}

function delay(ms){
  return new Promise(r=>setTimeout(r,ms));
}

// ===== RESET =====

function resetAll(){
  memory=[];
  localStorage.removeItem("memFix");
  log.innerHTML="";
  explain.innerHTML="";
  resetNodes();
}

</script>

</body>
</html>
