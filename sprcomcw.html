<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CST Decision Engine V4</title>

<style>
body{
  background:#0a0f1c;
  color:#d6e2ff;
  font-family:Arial;
  margin:0;
}

.container{
  display:flex;
  height:100vh;
}

.panel{
  width:320px;
  background:#111a2e;
  padding:10px;
  overflow:auto;
}

.console{
  flex:1;
  padding:10px;
  display:flex;
  flex-direction:column;
}

button{
  width:100%;
  margin:4px 0;
  padding:8px;
  background:#1e2d50;
  color:white;
  border:none;
}

.slider{ width:100%; }

.log{
  height:120px;
  background:black;
  padding:8px;
  overflow:auto;
  font-size:12px;
}

.signal{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.node{
  width:60px;
  height:60px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:6px;
}

.active{ background:#00ff88; }
.bad{ background:#ff3355; }

canvas{ background:#000; margin-top:5px; }

.explain{
  background:#111;
  padding:8px;
  font-size:12px;
  margin-top:5px;
}

</style>
</head>

<body>

<div class="container">

<div class="panel">

<h3>Run</h3>
<button onclick="runCST()">Run CST Decision</button>

<h3>ΔT (Time Sync)</h3>
<input id="dt" type="range" min="-1" max="1" step="0.1" class="slider">

<h3>Scenario</h3>
<select id="scenario">
<option>Rescue</option>
<option>Combat</option>
<option>Medical</option>
<option>Exploration</option>
<option>Ethics</option>
</select>

<button onclick="resetAll()">Reset</button>

</div>

<div class="console">

<h2>CST Decision Engine</h2>

<div class="signal">
<div id="ethicsNode" class="node">E</div>
<div id="survivalNode" class="node">S</div>
<div id="missionNode" class="node">M</div>
<div id="decisionNode" class="node">D</div>
</div>

<h3>Robot Output</h3>
<div class="signal">
<div id="leftArm" class="node">LA</div>
<div id="rightArm" class="node">RA</div>
<div id="legs" class="node">LG</div>
<div id="idle" class="node">ID</div>
</div>

<h3>Heatmap</h3>
<canvas id="heat" width="500" height="100"></canvas>

<h3>Explain</h3>
<div id="explain" class="explain"></div>

<h3>Log</h3>
<div id="log" class="log"></div>

</div>

</div>

<script>

// ================= MEMORY =================

let memory = JSON.parse(localStorage.getItem("cstMem")||"[]");

// ================= SCENARIOS =================

const scenarios = {
  Rescue:{risk:0.5,ethics:1.2,urgency:1.1},
  Combat:{risk:1.3,ethics:0.4,urgency:0.9},
  Medical:{risk:0.6,ethics:1.3,urgency:1.0},
  Exploration:{risk:0.7,ethics:0.7,urgency:0.6},
  Ethics:{risk:0.4,ethics:1.4,urgency:0.3}
};

// ================= UTIL =================

function log(m){
  let el=document.getElementById("log");
  el.innerHTML+=m+"<br>";
  el.scrollTop=el.scrollHeight;
}

function resetNodes(){
  document.querySelectorAll(".node").forEach(n=>{
    n.classList.remove("active","bad");
  });
}

// ================= AGENTS =================

function ethicsAgent(s,dt){
  let v = s.ethics - s.risk*0.3 + dt*0.2;
  return v;
}

function survivalAgent(s,dt){
  let v = (1 - s.risk) + dt*0.1;
  return v;
}

function missionAgent(s,dt){
  let v = s.urgency + dt*0.3;
  return v;
}
  // ================= CORE =================

function runCST(){

  resetNodes();

  let sc = document.getElementById("scenario").value;
  let s = scenarios[sc];

  let dt = parseFloat(document.getElementById("dt").value);

  // Agents
  let E = ethicsAgent(s,dt);
  let S = survivalAgent(s,dt);
  let M = missionAgent(s,dt);

  document.getElementById("ethicsNode").classList.add("active");
  document.getElementById("survivalNode").classList.add("active");
  document.getElementById("missionNode").classList.add("active");

  // Conflict resolution
  let combined = (E*0.4 + S*0.3 + M*0.3);

  // Adaptive learning
  let bias = memory.length>0
    ? memory.reduce((a,b)=>a+b,0)/memory.length * 0.05
    : 0;

  let noise = Math.random()*0.2 - 0.1;

  let score = combined + bias + noise;

  document.getElementById("decisionNode").classList.add("active");

  // Coin toss
  let coin = Math.random()>0.5 ? 1 : -1;

  // Decision
  let action;

  if(score > 0.7) action="RIGHT_ARM";
  else if(score > 0.2) action="LEFT_ARM";
  else if(score > -0.2) action="LEGS";
  else action="IDLE";

  // Highlight robot output
  if(action==="RIGHT_ARM") rightArm.classList.add("active");
  if(action==="LEFT_ARM") leftArm.classList.add("active");
  if(action==="LEGS") legs.classList.add("active");
  if(action==="IDLE") idle.classList.add("bad");

  // Save learning
  memory.push(score);
  localStorage.setItem("cstMem", JSON.stringify(memory));

  // Heatmap
  drawHeat([E,S,M,score]);

  // Explain
  document.getElementById("explain").innerHTML =
    "ΔT: "+dt+"<br>"+
    "Ethics: "+E.toFixed(2)+" | Survival: "+S.toFixed(2)+" | Mission: "+M.toFixed(2)+"<br>"+
    "Combined: "+combined.toFixed(2)+"<br>"+
    "Noise: "+noise.toFixed(2)+" | Memory Bias: "+bias.toFixed(2)+"<br>"+
    "Final Score: "+score.toFixed(2)+"<br>"+
    "Decision: "+action+"<br>"+
    "Coin Toss Comparison: "+(coin>0?"Action":"No Action")+"<br>"+
    "<br>⚠ Demonstrates how structured logic can approach coin-toss behavior.";

  log(sc+" → "+action+" | Score "+score.toFixed(2));

}

// ================= HEATMAP =================

function drawHeat(arr){
  let c=document.getElementById("heat");
  let ctx=c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  arr.forEach((v,i)=>{
    ctx.fillStyle = v>0 ? "green":"red";
    ctx.fillRect(i*120,0,100,100);
  });
}

// ================= RESET =================

function resetAll(){
  memory=[];
  localStorage.removeItem("cstMem");
  document.getElementById("log").innerHTML="";
  document.getElementById("explain").innerHTML="";
  resetNodes();
}

</script>

</body>
</html>
