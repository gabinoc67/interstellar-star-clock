<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pre-K Read-Aloud Practice</title>
  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#1e293b;
      --card:#111827;
      --text:#f8fafc;
      --muted:#cbd5e1;
      --accent:#38bdf8;
      --good:#22c55e;
      --bad:#ef4444;
      --btn:#334155;
      --btn2:#475569;
      --shadow:0 10px 28px rgba(0,0,0,.28);
      --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:16px;
    }
    .app{
      width:100%;
      max-width:700px;
      background:rgba(17,24,39,.95);
      border-radius:28px;
      box-shadow:var(--shadow);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
    }
    .top{
      padding:18px 18px 10px;
      background:linear-gradient(180deg, rgba(56,189,248,.16), rgba(255,255,255,0));
    }
    h1{
      margin:0;
      font-size:1.5rem;
      text-align:center;
    }
    .sub{
      text-align:center;
      color:var(--muted);
      font-size:.95rem;
      margin-top:6px;
    }
    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      padding:14px 16px 0;
    }
    .stat{
      background:rgba(255,255,255,.05);
      border-radius:18px;
      padding:12px 10px;
      text-align:center;
    }
    .stat .label{
      font-size:.78rem;
      color:var(--muted);
      margin-bottom:6px;
    }
    .stat .value{
      font-size:1.15rem;
      font-weight:700;
    }
    .progressWrap{
      padding:14px 16px 2px;
    }
    .progressBar{
      height:14px;
      background:rgba(255,255,255,.08);
      border-radius:999px;
      overflow:hidden;
    }
    .progressFill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#38bdf8,#22c55e);
      transition:width .35s ease;
    }

    .card{
      margin:14px 16px 16px;
      background:rgba(255,255,255,.04);
      border-radius:var(--radius);
      padding:18px;
    }

    .modeTag{
      display:inline-block;
      margin:0 auto 12px;
      padding:8px 14px;
      border-radius:999px;
      font-size:.85rem;
      background:rgba(56,189,248,.15);
      color:#dff6ff;
      text-align:center;
      width:100%;
    }

    .display{
      min-height:120px;
      border-radius:22px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:16px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      font-size:3rem;
      line-height:1.2;
      margin-bottom:14px;
      user-select:none;
    }

    .questionText{
      text-align:center;
      color:var(--muted);
      font-size:1rem;
      min-height:24px;
      margin-bottom:14px;
    }

    .answers{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .answerBtn, .controlBtn, .startBtn, .smallBtn{
      border:none;
      border-radius:18px;
      color:white;
      cursor:pointer;
      transition:transform .08s ease, opacity .2s ease, background .2s ease;
      -webkit-tap-highlight-color:transparent;
    }
    .answerBtn:active, .controlBtn:active, .startBtn:active, .smallBtn:active{
      transform:scale(.98);
    }
    .answerBtn{
      min-height:84px;
      font-size:1.6rem;
      font-weight:700;
      background:var(--btn);
      padding:14px 10px;
    }
    .answerBtn[disabled]{
      cursor:not-allowed;
      opacity:.92;
    }
    .correct{ background:var(--good)!important; }
    .wrong{ background:var(--bad)!important; }

    .controls{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:14px;
    }
    .controlBtn{
      min-height:58px;
      font-size:1rem;
      font-weight:700;
      background:var(--btn2);
      padding:12px;
    }
    .startRow{
      padding:0 16px 18px;
      display:grid;
      gap:12px;
    }
    .startBtn{
      min-height:62px;
      font-size:1.1rem;
      font-weight:700;
      background:linear-gradient(90deg,#0ea5e9,#2563eb);
    }
    .smallActions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .smallBtn{
      min-height:52px;
      font-size:1rem;
      font-weight:700;
      background:#475569;
    }

    .feedback{
      text-align:center;
      min-height:28px;
      font-size:1rem;
      font-weight:700;
      margin-top:12px;
    }

    .footerNote{
      text-align:center;
      color:var(--muted);
      font-size:.85rem;
      padding:0 16px 16px;
    }

    @media (max-width:520px){
      h1{font-size:1.25rem}
      .display{font-size:2.3rem; min-height:108px}
      .answerBtn{font-size:1.25rem; min-height:76px}
      .controlBtn,.startBtn,.smallBtn{font-size:.98rem}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1>Pre-K Read-Aloud Practice</h1>
      <div class="sub">Tap Start. The app reads the question out loud. Child taps the answer.</div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="label">Question</div>
        <div class="value" id="questionCount">0 / 0</div>
      </div>
      <div class="stat">
        <div class="label">Score</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="stat">
        <div class="label">Mode</div>
        <div class="value" id="modeName">Ready</div>
      </div>
    </div>

    <div class="progressWrap">
      <div class="progressBar">
        <div class="progressFill" id="progressFill"></div>
      </div>
    </div>

    <div class="card">
      <div class="modeTag" id="modeTag">Read-Aloud Practice</div>
      <div class="display" id="display">🎓</div>
      <div class="questionText" id="questionText">Press Start to begin.</div>

      <div class="answers" id="answers"></div>

      <div class="feedback" id="feedback"></div>

      <div class="controls">
        <button class="controlBtn" id="repeatBtn">🔊 Repeat Question</button>
        <button class="controlBtn" id="nextBtn">➡️ Next Question</button>
      </div>
    </div>

    <div class="startRow">
      <button class="startBtn" id="startBtn">▶️ Start Practice</button>
      <div class="smallActions">
        <button class="smallBtn" id="shuffleBtn">🔀 Shuffle</button>
        <button class="smallBtn" id="restartBtn">🔄 Restart</button>
      </div>
    </div>

    <div class="footerNote">
      Best on phone or tablet. Tap once anywhere if audio is blocked, then tap Start again.
    </div>
  </div>

  <script>
    const allQuestions = [
      { type:"letters", prompt:"What letter is this?", speak:"What letter is this?", display:"A", options:["A","B","D","M"], answer:"A" },
      { type:"letters", prompt:"What letter is this?", speak:"What letter is this?", display:"M", options:["N","M","W","H"], answer:"M" },
      { type:"letters", prompt:"What letter is this?", speak:"What letter is this?", display:"S", options:["S","C","L","T"], answer:"S" },
      { type:"letters", prompt:"What letter is this?", speak:"What letter is this?", display:"B", options:["P","B","R","D"], answer:"B" },

      { type:"rhyming", prompt:"Which word rhymes with cat?", speak:"Which word rhymes with cat?", display:"🐱", options:["hat","sun","pig","car"], answer:"hat" },
      { type:"rhyming", prompt:"Which word rhymes with log?", speak:"Which word rhymes with log?", display:"🪵", options:["pen","cup","frog","bed"], answer:"frog" },
      { type:"rhyming", prompt:"Which word rhymes with cake?", speak:"Which word rhymes with cake?", display:"🎂", options:["lake","ball","dog","fish"], answer:"lake" },

      { type:"counting", prompt:"How many apples?", speak:"How many apples?", display:"🍎🍎🍎", options:["2","3","4","5"], answer:"3" },
      { type:"counting", prompt:"How many stars?", speak:"How many stars?", display:"⭐️⭐️⭐️⭐️", options:["3","4","5","6"], answer:"4" },
      { type:"counting", prompt:"How many bears?", speak:"How many bears?", display:"🐻🐻🐻🐻🐻", options:["4","5","6","7"], answer:"5" },

      { type:"shapes", prompt:"Which one is a circle?", speak:"Which one is a circle?", display:"⭕", options:["Circle","Square","Triangle","Rectangle"], answer:"Circle" },
      { type:"colors", prompt:"Which one is red?", speak:"Which one is red?", display:"🟥", options:["Blue","Yellow","Red","Green"], answer:"Red" }
    ];

    let questions = [...allQuestions];
    let currentIndex = -1;
    let score = 0;
    let started = false;
    let answered = false;
    let selectedVoice = null;

    const display = document.getElementById("display");
    const questionText = document.getElementById("questionText");
    const answersDiv = document.getElementById("answers");
    const feedback = document.getElementById("feedback");
    const scoreEl = document.getElementById("score");
    const questionCountEl = document.getElementById("questionCount");
    const modeName = document.getElementById("modeName");
    const modeTag = document.getElementById("modeTag");
    const progressFill = document.getElementById("progressFill");
    const startBtn = document.getElementById("startBtn");
    const repeatBtn = document.getElementById("repeatBtn");
    const nextBtn = document.getElementById("nextBtn");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const restartBtn = document.getElementById("restartBtn");

    function shuffleArray(arr){
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function loadVoices(){
      const voices = window.speechSynthesis ? speechSynthesis.getVoices() : [];
      if(!voices.length) return;
      selectedVoice =
        voices.find(v => /en-US/i.test(v.lang) && /female|samantha|zira|aria|google us english/i.test(v.name)) ||
        voices.find(v => /en-US/i.test(v.lang)) ||
        voices[0] ||
        null;
    }

    function speak(text){
      if(!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      if(selectedVoice) utter.voice = selectedVoice;
      utter.rate = 0.88;
      utter.pitch = 1.05;
      utter.volume = 1;
      speechSynthesis.speak(utter);
    }

    function currentQuestion(){
      return questions[currentIndex];
    }

    function updateStats(){
      scoreEl.textContent = score;
      questionCountEl.textContent = started ? `${currentIndex + 1} / ${questions.length}` : `0 / ${questions.length}`;
      const pct = started ? ((currentIndex) / questions.length) * 100 : 0;
      progressFill.style.width = `${Math.max(0, Math.min(100, pct))}%`;
    }

    function renderQuestion(){
      const q = currentQuestion();
      if(!q) return;

      answered = false;
      feedback.textContent = "";
      display.textContent = q.display;
      questionText.textContent = q.prompt;
      modeName.textContent = q.type.charAt(0).toUpperCase() + q.type.slice(1);
      modeTag.textContent = `${q.type.charAt(0).toUpperCase() + q.type.slice(1)} Practice`;

      answersDiv.innerHTML = "";
      q.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "answerBtn";
        btn.textContent = opt;
        btn.addEventListener("click", () => checkAnswer(btn, opt));
        answersDiv.appendChild(btn);
      });

      updateStats();

      setTimeout(() => {
        speak(q.speak);
      }, 300);
    }

    function checkAnswer(btn, choice){
      if(answered) return;
      answered = true;

      const q = currentQuestion();
      const buttons = [...document.querySelectorAll(".answerBtn")];

      buttons.forEach(b => b.disabled = true);

      if(choice === q.answer){
        btn.classList.add("correct");
        feedback.textContent = "✅ Great job!";
        score++;
      } else {
        btn.classList.add("wrong");
        const correctBtn = buttons.find(b => b.textContent === q.answer);
        if(correctBtn) correctBtn.classList.add("correct");
        feedback.textContent = `💡 The correct answer is: ${q.answer}`;
      }

      scoreEl.textContent = score;
      progressFill.style.width = `${((currentIndex + 1) / questions.length) * 100}%`;

      setTimeout(() => {
        if(choice === q.answer){
          speak("Great job");
        } else {
          speak(`The correct answer is ${q.answer}`);
        }
      }, 250);
    }

    function nextQuestion(){
      if(!started){
        startPractice();
        return;
      }

      currentIndex++;
      if(currentIndex >= questions.length){
        finishPractice();
        return;
      }
      renderQuestion();
    }

    function startPractice(){
      started = true;
      score = 0;
      currentIndex = 0;
      startBtn.textContent = "✅ Practice Started";
      scoreEl.textContent = "0";
      renderQuestion();
    }

    function finishPractice(){
      display.textContent = "🎉";
      questionText.textContent = `Finished. Final score: ${score} out of ${questions.length}`;
      answersDiv.innerHTML = "";
      feedback.textContent = score === questions.length ? "🌟 Perfect score!" : "👏 Nice work!";
      modeName.textContent = "Done";
      modeTag.textContent = "Practice Complete";
      progressFill.style.width = "100%";
      speak(`Practice complete. You got ${score} out of ${questions.length} correct.`);
    }

    function restartPractice(){
      window.speechSynthesis && window.speechSynthesis.cancel();
      started = false;
      score = 0;
      currentIndex = -1;
      answered = false;
      scoreEl.textContent = "0";
      modeName.textContent = "Ready";
      modeTag.textContent = "Read-Aloud Practice";
      questionCountEl.textContent = `0 / ${questions.length}`;
      progressFill.style.width = "0%";
      display.textContent = "🎓";
      questionText.textContent = "Press Start to begin.";
      feedback.textContent = "";
      answersDiv.innerHTML = "";
      startBtn.textContent = "▶️ Start Practice";
    }

    function shuffleQuestions(){
      questions = shuffleArray([...allQuestions]);
      restartPractice();
    }

    startBtn.addEventListener("click", () => {
      if(!started) startPractice();
    });

    repeatBtn.addEventListener("click", () => {
      if(started && currentQuestion()){
        speak(currentQuestion().speak);
      }
    });

    nextBtn.addEventListener("click", () => {
      if(!started){
        startPractice();
        return;
      }
      if(currentIndex >= questions.length){
        restartPractice();
        return;
      }
      nextQuestion();
    });

    shuffleBtn.addEventListener("click", shuffleQuestions);
    restartBtn.addEventListener("click", restartPractice);

    if ("speechSynthesis" in window) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }

    updateStats();
  </script>
</body>
</html>
