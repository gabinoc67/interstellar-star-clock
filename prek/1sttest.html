<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pre-K Practice Simulator</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0f172a;
  color: white;
  text-align: center;
}
.container {
  padding: 15px;
}
h1 {
  font-size: 22px;
}
.question {
  font-size: 26px;
  margin: 20px 0;
}
.buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
button {
  padding: 18px;
  font-size: 20px;
  border: none;
  border-radius: 12px;
  background: #1e293b;
  color: white;
}
button.correct { background: #16a34a; }
button.wrong { background: #dc2626; }
.next {
  margin-top: 20px;
  padding: 15px;
  font-size: 18px;
  background: #2563eb;
}
.score {
  margin-top: 10px;
  font-size: 18px;
}
</style>
</head>
<body>

<div class="container">
  <h1>🎓 Pre-K Practice</h1>
  <div class="score">Score: <span id="score">0</span></div>

  <div class="question" id="question">Loading...</div>

  <div class="buttons" id="answers"></div>

  <button class="next" onclick="nextQuestion()">Next</button>
</div>

<script>
let score = 0;
let current = 0;

const questions = [
  // LETTERS
  {q:"What letter is this?", display:"A", options:["A","B","C","D"], answer:"A"},
  {q:"What letter is this?", display:"M", options:["M","N","W","H"], answer:"M"},

  // RHYMING
  {q:"Which rhymes with CAT?", display:"🐱", options:["hat","sun","dog","car"], answer:"hat"},
  {q:"Which rhymes with LOG?", display:"🪵", options:["frog","pen","cup","bed"], answer:"frog"},

  // COUNTING
  {q:"How many apples?", display:"🍎🍎🍎", options:["2","3","4","5"], answer:"3"},
  {q:"How many stars?", display:"⭐️⭐️⭐️⭐️", options:["3","4","5","6"], answer:"4"}
];

function loadQuestion() {
  const q = questions[current];
  document.getElementById("question").innerHTML = q.q + "<br><br>" + q.display;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => checkAnswer(btn, opt);
    answersDiv.appendChild(btn);
  });
}

function checkAnswer(btn, choice) {
  const correct = questions[current].answer;

  if (choice === correct) {
    btn.classList.add("correct");
    score++;
    document.getElementById("score").innerText = score;
  } else {
    btn.classList.add("wrong");
  }

  // disable buttons
  document.querySelectorAll("#answers button").forEach(b => b.disabled = true);
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    document.getElementById("question").innerHTML = "🎉 Finished! Final Score: " + score;
    document.getElementById("answers").innerHTML = "";
    return;
  }
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
