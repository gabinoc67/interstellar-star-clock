<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Hexagon Fix + Constraint View</title>

<style>
body{margin:0;background:#0b0f14;color:#e8eef6;font-family:Arial}
.wrap{display:grid;grid-template-columns:400px 1fr;gap:10px;padding:10px}
.panel{background:#101823;padding:10px;border-radius:10px}
canvas{width:100%;height:100vh;background:#070a0f}
button{padding:6px 10px;margin:4px}
.log{height:200px;overflow:auto;background:#000;padding:6px;font-size:12px}
</style>
</head>

<body>
<div class="wrap">

<div class="panel">
<h2>Constraint Demo</h2>

<button id="step">+1</button>
<button id="reset">Reset</button>

<label>N: <span id="nVal"></span></label>
<input id="N" type="range" min="6" max="100" value="6">

<h3>Log</h3>
<div id="log" class="log"></div>
</div>

<canvas id="c"></canvas>

</div>

<script>
  const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const NEl = document.getElementById("N");
const nVal = document.getElementById("nVal");
const logEl = document.getElementById("log");

function log(t){
  logEl.textContent += t + "\n";
  logEl.scrollTop = logEl.scrollHeight;
}

function draw(){
  const N = parseInt(NEl.value);
  nVal.textContent = N;

  const w = canvas.width = canvas.clientWidth;
  const h = canvas.height = canvas.clientHeight;

  ctx.clearRect(0,0,w,h);

  const cx = w/2;
  const cy = h/2;
  const r = 200;

  ctx.strokeStyle="white";
  ctx.beginPath();

  for(let i=0;i<N;i++){
    const ang = (Math.PI*2*i)/N;
    const x = cx + r*Math.cos(ang);
    const y = cy + r*Math.sin(ang);
    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  }

  ctx.closePath();
  ctx.stroke();
}

document.getElementById("step").onclick = ()=>{
  NEl.value = parseInt(NEl.value)+1;
  log("Step → N=" + NEl.value);
  draw();
};

document.getElementById("reset").onclick = ()=>{
  NEl.value = 6;
  log("Reset");
  draw();
};

NEl.oninput = draw;

draw();
</script>

</body>
</html>
