<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Interstellar Star Clock Library</title>
<style>
:root{
  --bg1:#030712;--bg2:#071326;--bg3:#0b1d3a;
  --panel:rgba(10,18,35,.86);--panel2:rgba(18,30,58,.94);
  --ink:#eef4ff;--muted:#9fb3d8;--line:rgba(145,180,255,.18);
  --accent:#7dd3fc;--docx:#93c5fd;--html:#86efac;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);min-height:100vh;
  background:
    radial-gradient(circle at 20% 20%,rgba(124,58,237,.18),transparent 24%),
    radial-gradient(circle at 80% 10%,rgba(56,189,248,.16),transparent 22%),
    radial-gradient(circle at 70% 80%,rgba(59,130,246,.16),transparent 25%),
    linear-gradient(180deg,var(--bg3),var(--bg2) 45%,var(--bg1));
  overflow-x:hidden;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(2px 2px at 8% 14%,rgba(255,255,255,.9),transparent 60%),
    radial-gradient(1.5px 1.5px at 22% 76%,rgba(255,255,255,.8),transparent 60%),
    radial-gradient(2px 2px at 35% 28%,rgba(255,255,255,.85),transparent 60%),
    radial-gradient(1.5px 1.5px at 46% 60%,rgba(255,255,255,.75),transparent 60%),
    radial-gradient(2px 2px at 58% 22%,rgba(255,255,255,.85),transparent 60%),
    radial-gradient(1.5px 1.5px at 69% 73%,rgba(255,255,255,.75),transparent 60%),
    radial-gradient(2px 2px at 82% 34%,rgba(255,255,255,.8),transparent 60%),
    radial-gradient(1.5px 1.5px at 91% 61%,rgba(255,255,255,.85),transparent 60%);
}
.wrap{position:relative;z-index:1;max-width:1500px;margin:0 auto;padding:28px 18px 36px}
.hero{
  background:linear-gradient(180deg,rgba(14,23,45,.86),rgba(10,18,35,.78));
  border:1px solid var(--line);border-radius:24px;padding:24px;margin-bottom:22px;
  box-shadow:0 0 24px rgba(125,211,252,.18);backdrop-filter:blur(8px)
}
.hero h1{margin:0 0 8px;font-size:clamp(28px,4vw,42px);line-height:1.08}
.hero p{margin:0;color:var(--muted);font-size:15px;line-height:1.6}
.tools{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}
.search{
  flex:1;min-width:240px;padding:12px 14px;border-radius:14px;border:1px solid var(--line);
  background:rgba(3,7,18,.65);color:var(--ink);font-size:15px;outline:none
}
.count{padding:12px 14px;border-radius:14px;border:1px solid var(--line);color:var(--muted);background:rgba(3,7,18,.45)}
.columns{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.column{
  background:rgba(10,18,35,.55);border:1px solid var(--line);border-radius:22px;padding:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.22)
}
.column h2{margin:0 0 14px;font-size:22px}
.badge{font-size:13px;color:var(--muted);font-weight:400}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px}
.card{
  display:block;text-decoration:none;background:linear-gradient(180deg,var(--panel2),var(--panel));
  border:1px solid var(--line);border-radius:18px;padding:16px;min-height:142px;
  transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease
}
.card:hover{transform:translateY(-3px);border-color:rgba(125,211,252,.45);box-shadow:0 14px 38px rgba(0,0,0,.34)}
.type{font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.type.docx{color:var(--docx)}
.type.html{color:var(--html)}
.title{margin:0 0 10px;font-size:16px;line-height:1.35;color:#f7fbff}
.path{margin:0;color:var(--muted);font-size:12px;line-height:1.45;word-break:break-word}
footer{margin-top:24px;color:var(--muted);font-size:13px;text-align:center}
@media(max-width:900px){.columns{grid-template-columns:1fr}.wrap{padding:16px 12px 28px}}
</style>
</head>

const unique = [];
const seen = new Set();

items.forEach(item=>{
  const key = item.url.trim().toLowerCase();
  if(!seen.has(key)){
    seen.add(key);
    unique.push(item);
  }
});

function shortPath(url){
  return url.replace("https://gabinoc67.github.io/interstellar-star-clock/new/","/new/");
}

function card(item){
  return `
  <a class="card" href="${item.url}" target="_blank" data-title="${item.title.toLowerCase()}" data-type="${item.type}">
    <div class="type ${item.type}">${item.type}</div>
    <h3 class="title">${item.title}</h3>
    <p class="path">${shortPath(item.url)}</p>
  </a>`;
}

function render(filter=""){
  const q = filter.trim().toLowerCase();
  const docx = unique.filter(i=>i.type==="docx" && (i.title.toLowerCase().includes(q)||i.url.toLowerCase().includes(q)||i.type.includes(q)));
  const html = unique.filter(i=>i.type==="html" && (i.title.toLowerCase().includes(q)||i.url.toLowerCase().includes(q)||i.type.includes(q)));

  document.getElementById("docxGrid").innerHTML = docx.map(card).join("");
  document.getElementById("htmlGrid").innerHTML = html.map(card).join("");

  document.getElementById("docxCount").textContent = `(${docx.length})`;
  document.getElementById("htmlCount").textContent = `(${html.length})`;
  document.getElementById("countBox").textContent = `${docx.length + html.length} shown • ${unique.length} total • duplicates removed`;
}

document.getElementById("searchBox").addEventListener("input", e=>render(e.target.value));
render();
