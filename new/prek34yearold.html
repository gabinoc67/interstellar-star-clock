<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pre-K 3 & 4 ESL Learning Program</title>

<style>
:root{
--bg:#f7fbff;--card:#ffffff;--ink:#14213d;--muted:#52616b;
--blue:#1d72f3;--green:#1fa463;--orange:#f59e0b;--red:#e63946;
--purple:#7c3aed;--line:#d9e4f2;--shadow:0 8px 24px rgba(20,40,80,.12);
}
*{box-sizing:border-box}
body{
margin:0;background:var(--bg);color:var(--ink);
font-family:Arial,Helvetica,sans-serif;line-height:1.4;
}
header{
padding:22px;text-align:center;background:linear-gradient(135deg,#dbeafe,#fef3c7);
border-bottom:2px solid var(--line);
}
h1{margin:0;font-size:clamp(24px,4vw,42px)}
h2{margin:10px 0}
p{color:var(--muted)}
.container{max-width:1200px;margin:auto;padding:18px}
.toolbar{
display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0;
}
button{
border:0;border-radius:14px;padding:12px 16px;font-size:16px;
font-weight:bold;cursor:pointer;background:var(--blue);color:white;
box-shadow:var(--shadow);
}
button:hover{filter:brightness(.95)}
.btn-green{background:var(--green)}
.btn-orange{background:var(--orange)}
.btn-purple{background:var(--purple)}
.btn-red{background:var(--red)}
.grid{
display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
gap:16px;margin-top:16px;
}
.card{
background:var(--card);border:2px solid var(--line);border-radius:22px;
padding:18px;text-align:center;box-shadow:var(--shadow);
}
.pic{
font-size:72px;margin:10px auto;
width:120px;height:120px;border-radius:24px;
display:flex;align-items:center;justify-content:center;
background:linear-gradient(145deg,#fff,#e0f2fe);
border:3px solid #bfdbfe;
}
.big-letter{font-size:72px;font-weight:900;color:var(--blue)}
.word{font-size:28px;font-weight:900}
.esl{font-size:20px;color:var(--green);font-weight:bold}
.small{font-size:14px;color:var(--muted)}
.option{
display:block;width:100%;margin:8px 0;background:white;color:var(--ink);
border:2px solid var(--line);box-shadow:none;
}
.correct{border-color:var(--green);background:#dcfce7}
.wrong{border-color:var(--red);background:#fee2e2}
.storybox{
background:white;border:2px solid var(--line);border-radius:22px;
padding:20px;box-shadow:var(--shadow);font-size:22px;
}
.badge{
display:inline-block;padding:8px 12px;border-radius:999px;
background:#e0f2fe;font-weight:bold;margin:4px;
}
footer{text-align:center;padding:20px;color:var(--muted)}
</style>
</head>
<body>

<header>
<h1>Pre-K 3 & 4 ESL Learning Program</h1>
<p>Letters • Numbers • Colors • Shapes • Vocabulary • Stories • ESL Spanish Support</p>
<div class="toolbar">
<button onclick="showSection('alphabet')">Alphabet</button>
<button onclick="showSection('numbers')">Numbers</button>
<button onclick="showSection('colors')">Colors</button>
<button onclick="showSection('shapes')">Shapes</button>
<button onclick="showSection('vocab')">Vocabulary</button>
<button onclick="showSection('stories')">Stories</button>
<button onclick="showSection('quiz')">Practice Test</button>
</div>
<button class="btn-green" onclick="readPage()">🔊 Read This Page</button>
<button class="btn-orange" onclick="stopReading()">⏹ Stop</button>
</header>

<div class="container">
<div id="app"></div>
</div>
<script>
const app=document.getElementById("app");
let currentSection="alphabet";

function speak(text,rate=.85){
  stopReading();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US";
  u.rate=rate;
  speechSynthesis.speak(u);
}

function speakSpanish(text,rate=.85){
  stopReading();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="es-US";
  u.rate=rate;
  speechSynthesis.speak(u);
}

function stopReading(){
  speechSynthesis.cancel();
}

function readPage(){
  const text=app.innerText.replace(/\s+/g," ");
  speak(text,.75);
}

function repeatWord(word){
  speak(word,.65);
  setTimeout(()=>speak(word,.65),1200);
}

function repeatSpanishWord(word){
  speakSpanish(word,.65);
  setTimeout(()=>speakSpanish(word,.65),1200);
}

const letters=[
["A","Apple","Manzana","🍎","A says ah. Apple."],
["B","Ball","Pelota","⚽","B says buh. Ball."],

["G","Goat","Cabra","🐐","G says guh. Goat."],
["H","Hat","Sombrero","🎩","H says huh. Hat."],
["I","Igloo","Iglú","🏠","I says ih. Igloo."],
["J","Juice","Jugo","🧃","J says juh. Juice."],
["K","Kite","Cometa","🪁","K says kuh. Kite."],

["M","Moon","Luna","🌙","M says mmm. Moon."],
["N","Nest","Nido","🪺","N says nnn. Nest."],

["X","X-ray","Radiografía","🩻","X says ks. X-ray."],
["Y","Yo-yo","Yoyó","🪀","Y says yuh. Yo-yo."],
["Z","Zebra","Cebra","🦓","Z says zzz. Zebra."]

const numbers=[
["1","One","Uno","⭐"],
["2","Two","Dos","⭐⭐"],
["3","Three","Tres","⭐⭐⭐"],
["4","Four","Cuatro","⭐⭐⭐⭐"],
["5","Five","Cinco","⭐⭐⭐⭐⭐"],
["6","Six","Seis","🍎🍎🍎🍎🍎🍎"],
["7","Seven","Siete","🐟🐟🐟🐟🐟🐟🐟"],
["8","Eight","Ocho","🌼🌼🌼🌼🌼🌼🌼🌼"],
["9","Nine","Nueve","⚽⚽⚽⚽⚽⚽⚽⚽⚽"],
["10","Ten","Diez","🔵🔵🔵🔵🔵🔵🔵🔵🔵🔵"]
];

function showSection(section){
  currentSection=section;
  if(section==="alphabet") renderAlphabet();
  if(section==="numbers") renderNumbers();
  if(section==="colors") renderColors();
  if(section==="shapes") renderShapes();
  if(section==="vocab") renderVocab();
  if(section==="stories") renderStories();
  if(section==="quiz") renderQuiz();
}

function renderAlphabet(){
  app.innerHTML=`
  <h2>Alphabet / Alfabeto</h2>
  <p>Press the buttons to hear the letter, word, sound, and Spanish word.</p>
  <div class="grid">
  ${letters.map(l=>`
    <div class="card">
      <div class="big-letter">${l[0]}</div>
      <div class="pic">${l[3]}</div>
      <div class="word">${l[1]}</div>
      <div class="esl">${l[2]}</div>
      <p>${l[4]}</p>
      <button onclick="speak('${l[4]}')">🔊 English</button>
      <button class="btn-green" onclick="speakSpanish('${l[2]}')">🇪🇸 Spanish</button>
      <button class="btn-purple" onclick="repeatWord('${l[1]}')">🔁 Repeat Word</button>
    </div>
  `).join("")}
  </div>`;
}
</script>
<script>
function renderNumbers(){
  app.innerHTML=`
  <h2>Numbers / Números</h2>
  <p>Learn numbers, counting, and ESL Spanish number words.</p>
  <div class="grid">
  ${numbers.map(n=>`
    <div class="card">
      <div class="big-letter">${n[0]}</div>
      <div class="pic" style="font-size:28px">${n[3]}</div>
      <div class="word">${n[1]}</div>
      <div class="esl">${n[2]}</div>
      <button onclick="speak('Number ${n[0]}. ${n[1]}. Count with me.')">🔊 English</button>
      <button class="btn-green" onclick="speakSpanish('Número ${n[0]}. ${n[2]}. Cuenta conmigo.')">🇪🇸 Spanish</button>
      <button class="btn-purple" onclick="repeatWord('${n[1]}')">🔁 Repeat</button>
    </div>
  `).join("")}
  </div>`;
}

const colors=[
["Red","Rojo","🔴","Apple, stop sign, fire truck","Manzana, señal de alto, camión de bomberos"],
["Blue","Azul","🔵","Sky, water, blue crayon","Cielo, agua, crayón azul"],
["Yellow","Amarillo","🟡","Sun, banana, school bus","Sol, banana, autobús escolar"],
["Green","Verde","🟢","Grass, tree, frog","Pasto, árbol, rana"],
["Orange","Anaranjado","🟠","Orange fruit, pumpkin","Naranja, calabaza"],
["Purple","Morado","🟣","Grapes, flower","Uvas, flor"],
["Pink","Rosa","🌸","Flower, heart","Flor, corazón"],
["Black","Negro","⚫","Night, tire","Noche, llanta"],
["White","Blanco","⚪","Cloud, milk","Nube, leche"],
["Brown","Café","🟤","Bear, tree trunk","Oso, tronco de árbol"]

function renderColors(){

  <h2>Colors / Colores</h2>

  ${colors.map(c=>`
    <div class="card">

    </div>
  `).join("")}

}

const shapes=[
["Circle","Círculo","⭕","A circle is round.","Un círculo es redondo."],
["Square","Cuadrado","⬛","A square has four equal sides.","Un cuadrado tiene cuatro lados iguales."],
["Triangle","Triángulo","🔺","A triangle has three sides.","Un triángulo tiene tres lados."],
["Rectangle","Rectángulo","▭","A rectangle has two long sides and two short sides.","Un rectángulo tiene dos lados largos y dos lados cortos."],
["Star","Estrella","⭐","A star has points.","Una estrella tiene puntas."],
["Heart","Corazón","❤️","A heart shape means love.","Un corazón significa amor."],
["Oval","Óvalo","🥚","An oval looks like an egg.","Un óvalo parece un huevo."],
["Diamond","Diamante","🔷","A diamond has four corners.","Un diamante tiene cuatro esquinas."]
];

function renderShapes(){
  app.innerHTML=`
  <h2>Shapes / Figuras</h2>
  <p>Students learn basic shapes, sides, corners, and ESL Spanish words.</p>
  <div class="grid">
  ${shapes.map(s=>`
    <div class="card">
      <div class="pic">${s[2]}</div>
      <div class="word">${s[0]}</div>
      <div class="esl">${s[1]}</div>
      <p>${s[3]}</p>
      <button onclick="speak('${s[0]}. ${s[3]}')">🔊 English</button>
      <button class="btn-green" onclick="speakSpanish('${s[1]}. ${s[4]}')">🇪🇸 Spanish</button>
      <button class="btn-purple" onclick="repeatWord('${s[0]}')">🔁 Repeat</button>
    </div>
  `).join("")}
  </div>`;
}
</script>
<script>

function renderStories(){
  app.innerHTML=`
  <h2>Stories / Cuentos</h2>
  <p>Students can listen to the story in English or Spanish, repeat words, and practice reading.</p>
  <div class="grid">
  ${stories.map((s,i)=>`
    <div class="card">
      <div class="pic">${s.pic}</div>

  `).join("")}
  </div>`;
}

function openStory(i){
  const s=stories[i];
  app.innerHTML=`
  <h2>${s.title} / <span class="esl">${s.es}</span></h2>

  <div class="storybox">
    <div class="pic">${s.pic}</div>

    <h2>English Story</h2>
    <p>${s.text}</p>
    <button onclick="speak('${s.text}',.65)">🔊 Read English Slowly</button>
    <button class="btn-purple" onclick="speak('${s.text}',.9)">🔊 Read English Normal</button>

    <h2>Spanish Story</h2>
    <p class="esl">${s.spanishText}</p>
    <button class="btn-green" onclick="speakSpanish('${s.spanishText}',.65)">🇪🇸 Read Spanish Slowly</button>
    <button class="btn-green" onclick="speakSpanish('${s.spanishText}',.9)">🇪🇸 Read Spanish Normal</button>

    <button class="btn-orange" onclick="stopReading()">⏹ Stop</button>

function renderQuiz(){
  score=0;
  total=0;
  app.innerHTML=`
  <h2>Practice Test / Prueba de Práctica</h2>
  <p>Press English or Spanish to hear the question and answer choices.</p>
  <div id="quizArea"></div>
  <div id="resultArea"></div>`;
  quizQuestions.forEach((item,index)=>addQuestion(item,index));
}

function addQuestion(item,index){
  const area=document.getElementById("quizArea");
  const div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
    <h2>Question ${index+1} / Pregunta ${index+1}</h2>
    <p class="word">${item.q}</p>
    <p class="esl">${item.qEs}</p>

    <button onclick="speak('${item.q}. Choices are: ${item.answers.join(", ")}')">🔊 Read English Question</button>
    <button class="btn-green" onclick="speakSpanish('${item.qEs}. Las opciones son: ${item.answersEs.join(", ")}')">🇪🇸 Read Spanish Question</button>

    ${item.answers.map((a,i)=>`
      <button class="option" onclick="checkAnswer(this,'${a}','${item.correct}')">
        ${a}
        <br>
        <span class="small">${item.answersEs[i]}</span>
      </button>
    `).join("")}
  `;
  area.appendChild(div);
}

function checkAnswer(btn,answer,correct){
  const buttons=btn.parentElement.querySelectorAll(".option");
  buttons.forEach(b=>b.disabled=true);
  total++;

  if(answer===correct){
    score++;
    btn.classList.add("correct");
    speak("Correct. Good job!");
  }else{
    btn.classList.add("wrong");
    speak("Try again next time. The correct answer is "+correct);
  }

  showResult();
}

function showResult(){
  const area=document.getElementById("resultArea");
  area.innerHTML=`
  <div class="card">
    <h2>Score / Resultado</h2>
    <div class="big-letter">${score}/${total}</div>
    <p>${score>=8?"Excellent work!":"Keep practicing!"}</p>
    <p class="esl">${score>=8?"¡Excelente trabajo!":"¡Sigue practicando!"}</p>

    <span class="badge">⭐ Alphabet</span>
    <span class="badge">⭐ ESL</span>
    <span class="badge">⭐ Reading</span>
    <span class="badge">⭐ Vocabulary</span>

    <br><br>
    <button onclick="speak('Your score is ${score} out of ${total}.')">🔊 Read Score English</button>
    <button class="btn-green" onclick="speakSpanish('Tu resultado es ${score} de ${total}.')">🇪🇸 Read Score Spanish</button>
    <button class="btn-purple" onclick="renderQuiz()">🔁 Restart Test</button>
  </div>`;
}

showSection("alphabet");
</script>

<footer>
<p>Pre-K 3 & 4 ESL Learning Program • English and Spanish Reading Buttons Added</p>
</footer>

</body>
</html>
