<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pre-K 3 & 4 ESL Learning Program</title>

<style>
:root{
--bg:#f7fbff;--card:#ffffff;--ink:#14213d;--muted:#52616b;
--blue:#1d72f3;--green:#1fa463;--orange:#f59e0b;--red:#e63946;
--purple:#7c3aed;--line:#d9e4f2;--shadow:0 8px 24px rgba(20,40,80,.12);
}
*{box-sizing:border-box}
body{
margin:0;background:var(--bg);color:var(--ink);
font-family:Arial,Helvetica,sans-serif;line-height:1.4;
}
header{
padding:22px;text-align:center;background:linear-gradient(135deg,#dbeafe,#fef3c7);
border-bottom:2px solid var(--line);
}
h1{margin:0;font-size:clamp(24px,4vw,42px)}
h2{margin:10px 0}
p{color:var(--muted)}
.container{max-width:1200px;margin:auto;padding:18px}
.toolbar{
display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0;
}
button{
border:0;border-radius:14px;padding:12px 16px;font-size:16px;
font-weight:bold;cursor:pointer;background:var(--blue);color:white;
box-shadow:var(--shadow);margin:4px;
}
button:hover{filter:brightness(.95)}
button:disabled{opacity:.7;cursor:not-allowed}
.btn-green{background:var(--green)}
.btn-orange{background:var(--orange)}
.btn-purple{background:var(--purple)}
.btn-red{background:var(--red)}
.grid{
display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
gap:16px;margin-top:16px;
}
.card{
background:var(--card);border:2px solid var(--line);border-radius:22px;
padding:18px;text-align:center;box-shadow:var(--shadow);
}
.pic{
font-size:72px;margin:10px auto;
width:120px;height:120px;border-radius:24px;
display:flex;align-items:center;justify-content:center;
background:linear-gradient(145deg,#fff,#e0f2fe);
border:3px solid #bfdbfe;
}
.big-letter{font-size:72px;font-weight:900;color:var(--blue)}
.word{font-size:28px;font-weight:900}
.esl{font-size:22px;color:var(--green);font-weight:bold}
.small{font-size:14px;color:var(--muted)}
.option{
display:block;width:100%;margin:8px 0;background:white;color:var(--ink);
border:2px solid var(--line);box-shadow:none;
}
.correct{border-color:var(--green);background:#dcfce7}
.wrong{border-color:var(--red);background:#fee2e2}
.storybox{
background:white;border:2px solid var(--line);border-radius:22px;
padding:20px;box-shadow:var(--shadow);font-size:22px;
}
.badge{
display:inline-block;padding:8px 12px;border-radius:999px;
background:#e0f2fe;font-weight:bold;margin:4px;
}
footer{text-align:center;padding:20px;color:var(--muted)}
</style>
</head>

<body>

<header>
<h1>Pre-K 3 & 4 ESL Learning Program</h1>
<p>Letters • Numbers • Colors • Shapes • Vocabulary • Stories • Spanish ESL Support</p>

<div class="toolbar">
<button onclick="showSection('alphabet')">Alphabet</button>
<button onclick="showSection('numbers')">Numbers</button>
<button onclick="showSection('colors')">Colors</button>
<button onclick="showSection('shapes')">Shapes</button>
<button onclick="showSection('vocab')">Vocabulary</button>
<button onclick="showSection('stories')">Stories</button>
<button onclick="showSection('quiz')">Practice Test</button>
</div>

<button class="btn-green" onclick="readPageSpanish()">🇪🇸 Read Page Spanish</button>
<button class="btn-purple" onclick="readPageEnglish()">🔊 Read Page English</button>
<button class="btn-orange" onclick="stopReading()">⏹ Stop</button>
</header>

<div class="container">
<div id="app"></div>
</div>
<script>
const app=document.getElementById("app");

function safeText(text){
  return String(text)
    .replace(/\\/g,"\\\\")
    .replace(/'/g,"\\'")
    .replace(/"/g,"&quot;")
    .replace(/\n/g," ");
}

function speak(text,rate=.85,lang="en-US"){
  stopReading();
  const u=new SpeechSynthesisUtterance(String(text));
  u.lang=lang;
  u.rate=rate;
  speechSynthesis.speak(u);
}

function speakEnglish(text,rate=.85){speak(text,rate,"en-US");}
function speakSpanish(text,rate=.85){speak(text,rate,"es-US");}
function stopReading(){speechSynthesis.cancel();}

function readPageEnglish(){
  const text=app.innerText.replace(/\s+/g," ");
  speakEnglish(text,.75);
}

function readPageSpanish(){
  const spanishText=[...document.querySelectorAll(".esl")]
    .map(el=>el.innerText)
    .join(". ");
  speakSpanish(spanishText,.75);
}

function repeatEnglish(word){
  speakEnglish(word,.65);
  setTimeout(()=>speakEnglish(word,.65),1200);
}

function repeatSpanish(word){
  speakSpanish(word,.65);
  setTimeout(()=>speakSpanish(word,.65),1200);
}

function showSection(section){
  if(section==="alphabet") renderAlphabet();
  if(section==="numbers") renderNumbers();
  if(section==="colors") renderColors();
  if(section==="shapes") renderShapes();
  if(section==="vocab") renderVocab();
  if(section==="stories") renderStories();
  if(section==="quiz") renderQuiz();
}

function renderAlphabet(){
  app.innerHTML=`
  <h2>Alphabet / Alfabeto</h2>
  <p>Spanish buttons read Spanish words only.</p>
  <div class="grid">
  ${letters.map(l=>`
    <div class="card">
      <div class="big-letter">${l[0]}</div>
      <div class="pic">${l[3]}</div>
      <div class="word">${l[1]}</div>
      <div class="esl">${l[2]}</div>
      <p>${l[4]}</p>
      <button onclick="speakEnglish('${safeText(l[4])}')">🔊 English</button>
      <button class="btn-green" onclick="speakSpanish('${safeText(l[5])}')">🇪🇸 Español</button>
      <button class="btn-purple" onclick="repeatEnglish('${safeText(l[1])}')">🔁 Repeat English</button>
      <button class="btn-orange" onclick="repeatSpanish('${safeText(l[2])}')">🔁 Repetir Español</button>
    </div>
  `).join("")}
  </div>`;
}
</script>

function renderQuiz(){
  score=0;
  total=0;
  app.innerHTML=`
  <h2>Practice Test / Prueba de Práctica</h2>
  <p>English buttons read English. Spanish buttons read Spanish only.</p>
  <div id="quizArea"></div>
  <div id="resultArea"></div>`;
  quizQuestions.forEach((item,index)=>addQuestion(item,index));
}

function addQuestion(item,index){
  const area=document.getElementById("quizArea");
  const div=document.createElement("div");
  div.className="card";

  const englishChoices=item.answers.join(", ");
  const spanishChoices=item.answersEs.join(", ");

  div.innerHTML=`
    <h2>Question ${index+1} / Pregunta ${index+1}</h2>
    <p class="word">${item.q}</p>
    <p class="esl">${item.qEs}</p>

    <button onclick="speakEnglish('${safeText(item.q)}. Choices are: ${safeText(englishChoices)}.')">🔊 Read English Question</button>
    <button class="btn-green" onclick="speakSpanish('${safeText(item.qEs)}. Las opciones son: ${safeText(spanishChoices)}.')">🇪🇸 Leer Pregunta en Español</button>

    ${item.answers.map((a,i)=>`
      <button class="option" onclick="checkAnswer(this,'${safeText(a)}','${safeText(item.correct)}','${safeText(item.correctEs)}')">
        <span class="word">${a}</span>
        <br>
        <span class="esl">${item.answersEs[i]}</span>
      </button>
    `).join("")}
  `;
  area.appendChild(div);
}

function checkAnswer(btn,answer,correct,correctEs){
  const buttons=btn.parentElement.querySelectorAll(".option");
  buttons.forEach(b=>b.disabled=true);
  total++;

  if(answer===correct){
    score++;
    btn.classList.add("correct");
    speakEnglish("Correct. Good job!");
  }else{
    btn.classList.add("wrong");
    speakEnglish("Try again next time. The correct answer is "+correct+".");
  }

  showResult();
}

function showResult(){
  const area=document.getElementById("resultArea");
  const englishMessage=score>=8?"Excellent work!":"Keep practicing!";
  const spanishMessage=score>=8?"¡Excelente trabajo!":"¡Sigue practicando!";

  area.innerHTML=`
  <div class="card">
    <h2>Score / Resultado</h2>
    <div class="big-letter">${score}/${total}</div>
    <p>${englishMessage}</p>
    <p class="esl">${spanishMessage}</p>

    <span class="badge">⭐ Alphabet</span>
    <span class="badge">⭐ Español</span>
    <span class="badge">⭐ Reading</span>
    <span class="badge">⭐ Vocabulary</span>

    <br><br>
    <button onclick="speakEnglish('Your score is ${score} out of ${total}. ${safeText(englishMessage)}')">🔊 Read Score English</button>
    <button class="btn-green" onclick="speakSpanish('Tu resultado es ${score} de ${total}. ${safeText(spanishMessage)}')">🇪🇸 Leer Resultado Español</button>
    <button class="btn-purple" onclick="renderQuiz()">🔁 Restart Test</button>
  </div>`;
}
