<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pre-K 3 & 4 ESL Learning Program</title>

<style>
:root{
--bg:#f7fbff;--card:#ffffff;--ink:#14213d;--muted:#52616b;
--blue:#1d72f3;--green:#1fa463;--orange:#f59e0b;--red:#e63946;
--purple:#7c3aed;--line:#d9e4f2;--shadow:0 8px 24px rgba(20,40,80,.12);
}
*{box-sizing:border-box}
body{
margin:0;background:var(--bg);color:var(--ink);
font-family:Arial,Helvetica,sans-serif;line-height:1.4;
}
header{
padding:22px;text-align:center;background:linear-gradient(135deg,#dbeafe,#fef3c7);
border-bottom:2px solid var(--line);
}
h1{margin:0;font-size:clamp(24px,4vw,42px)}
h2{margin:10px 0}
p{color:var(--muted)}
.container{max-width:1200px;margin:auto;padding:18px}
.toolbar{
display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0;
}
button{
border:0;border-radius:14px;padding:12px 16px;font-size:16px;
font-weight:bold;cursor:pointer;background:var(--blue);color:white;
box-shadow:var(--shadow);
}
button:hover{filter:brightness(.95)}
.btn-green{background:var(--green)}
.btn-orange{background:var(--orange)}
.btn-purple{background:var(--purple)}
.btn-red{background:var(--red)}
.grid{
display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
gap:16px;margin-top:16px;
}
.card{
background:var(--card);border:2px solid var(--line);border-radius:22px;
padding:18px;text-align:center;box-shadow:var(--shadow);
}
.pic{
font-size:72px;margin:10px auto;
width:120px;height:120px;border-radius:24px;
display:flex;align-items:center;justify-content:center;
background:linear-gradient(145deg,#fff,#e0f2fe);
border:3px solid #bfdbfe;
}
.big-letter{font-size:72px;font-weight:900;color:var(--blue)}
.word{font-size:28px;font-weight:900}
.esl{font-size:20px;color:var(--green);font-weight:bold}
.small{font-size:14px;color:var(--muted)}
.option{
display:block;width:100%;margin:8px 0;background:white;color:var(--ink);
border:2px solid var(--line);box-shadow:none;
}
.correct{border-color:var(--green);background:#dcfce7}
.wrong{border-color:var(--red);background:#fee2e2}
.storybox{
background:white;border:2px solid var(--line);border-radius:22px;
padding:20px;box-shadow:var(--shadow);font-size:22px;
}
.badge{
display:inline-block;padding:8px 12px;border-radius:999px;
background:#e0f2fe;font-weight:bold;margin:4px;
}
footer{text-align:center;padding:20px;color:var(--muted)}
</style>
</head>
<body>

<header>
<h1>Pre-K 3 & 4 ESL Learning Program</h1>
<p>Letters • Numbers • Colors • Shapes • Vocabulary • Stories • ESL Spanish Support</p>
<div class="toolbar">
<button onclick="showSection('alphabet')">Alphabet</button>
<button onclick="showSection('numbers')">Numbers</button>
<button onclick="showSection('colors')">Colors</button>
<button onclick="showSection('shapes')">Shapes</button>
<button onclick="showSection('vocab')">Vocabulary</button>
<button onclick="showSection('stories')">Stories</button>
<button onclick="showSection('quiz')">Practice Test</button>
</div>
<button class="btn-green" onclick="readPage()">🔊 Read This Page</button>
<button class="btn-orange" onclick="stopReading()">⏹ Stop</button>
</header>

<div class="container">
<div id="app"></div>
</div>
<script>
const app=document.getElementById("app");
let currentSection="alphabet";

function speak(text,rate=.85){
  stopReading();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US";
  u.rate=rate;
  speechSynthesis.speak(u);
}
function speakSpanish(text,rate=.85){
  stopReading();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="es-US";
  u.rate=rate;
  speechSynthesis.speak(u);
}
function stopReading(){speechSynthesis.cancel();}
function readPage(){
  const text=app.innerText.replace(/\s+/g," ");
  speak(text,.75);
}
function repeatWord(word){
  speak(word,.65);
  setTimeout(()=>speak(word,.65),1200);
}

const letters=[
["A","Apple","Manzana","🍎","A says ah. Apple."],
["B","Ball","Pelota","⚽","B says buh. Ball."],
["C","Cat","Gato","🐱","C says kuh. Cat."],
["D","Dog","Perro","🐶","D says duh. Dog."],
["E","Egg","Huevo","🥚","E says eh. Egg."],
["F","Fish","Pez","🐟","F says fff. Fish."],
["G","Goat","Cabra","🐐","G says guh. Goat."],
["H","Hat","Sombrero","🎩","H says huh. Hat."],
["I","Igloo","Iglú","🏠","I says ih. Igloo."],
["J","Juice","Jugo","🧃","J says juh. Juice."],
["K","Kite","Cometa","🪁","K says kuh. Kite."],
["L","Lion","León","🦁","L says lll. Lion."],
["M","Moon","Luna","🌙","M says mmm. Moon."],
["N","Nest","Nido","🪺","N says nnn. Nest."],
["O","Orange","Naranja","🍊","O says ah. Orange."],
["P","Pig","Cerdo","🐷","P says puh. Pig."],
["Q","Queen","Reina","👑","Q says kwuh. Queen."],
["R","Rabbit","Conejo","🐰","R says rrr. Rabbit."],
["S","Sun","Sol","☀️","S says sss. Sun."],
["T","Tree","Árbol","🌳","T says tuh. Tree."],
["U","Umbrella","Paraguas","☂️","U says uh. Umbrella."],
["V","Van","Camioneta","🚐","V says vvv. Van."],
["W","Water","Agua","💧","W says wuh. Water."],
["X","X-ray","Radiografía","🩻","X says ks. X-ray."],
["Y","Yo-yo","Yoyó","🪀","Y says yuh. Yo-yo."],
["Z","Zebra","Cebra","🦓","Z says zzz. Zebra."]
];

const numbers=[
["1","One","Uno","⭐"],
["2","Two","Dos","⭐⭐"],
["3","Three","Tres","⭐⭐⭐"],
["4","Four","Cuatro","⭐⭐⭐⭐"],
["5","Five","Cinco","⭐⭐⭐⭐⭐"],
["6","Six","Seis","🍎🍎🍎🍎🍎🍎"],
["7","Seven","Siete","🐟🐟🐟🐟🐟🐟🐟"],
["8","Eight","Ocho","🌼🌼🌼🌼🌼🌼🌼🌼"],
["9","Nine","Nueve","⚽⚽⚽⚽⚽⚽⚽⚽⚽"],
["10","Ten","Diez","🔵🔵🔵🔵🔵🔵🔵🔵🔵🔵"]
];

function showSection(section){
  currentSection=section;
  if(section==="alphabet") renderAlphabet();
  if(section==="numbers") renderNumbers();
  if(section==="colors") renderColors();
  if(section==="shapes") renderShapes();
  if(section==="vocab") renderVocab();
  if(section==="stories") renderStories();
  if(section==="quiz") renderQuiz();
}

function renderAlphabet(){
  app.innerHTML=`
  <h2>Alphabet / Alfabeto</h2>
  <p>Press the buttons to hear the letter, word, sound, and Spanish word.</p>
  <div class="grid">
  ${letters.map(l=>`
    <div class="card">
      <div class="big-letter">${l[0]}</div>
      <div class="pic">${l[3]}</div>
      <div class="word">${l[1]}</div>
      <div class="esl">${l[2]}</div>
      <p>${l[4]}</p>
      <button onclick="speak('${l[4]}')">🔊 Read</button>
      <button class="btn-green" onclick="speakSpanish('${l[2]}')">🇪🇸 Spanish</button>
      <button class="btn-purple" onclick="repeatWord('${l[1]}')">🔁 Repeat Word</button>
    </div>
  `).join("")}
  </div>`;
}
</script>
<script>
function renderNumbers(){
  app.innerHTML=`
  <h2>Numbers / Números</h2>
  <p>Learn numbers, counting, and ESL Spanish number words.</p>
  <div class="grid">
  ${numbers.map(n=>`
    <div class="card">
      <div class="big-letter">${n[0]}</div>
      <div class="pic" style="font-size:28px">${n[3]}</div>
      <div class="word">${n[1]}</div>
      <div class="esl">${n[2]}</div>
      <button onclick="speak('Number ${n[0]}. ${n[1]}. Count with me. ${n[3].split('').join(' ')}')">🔊 Read</button>
      <button class="btn-green" onclick="speakSpanish('${n[2]}')">🇪🇸 Spanish</button>
      <button class="btn-purple" onclick="repeatWord('${n[1]}')">🔁 Repeat</button>
    </div>
  `).join("")}
  </div>`;
}

const colors=[
["Red","Rojo","🔴","Apple, stop sign, fire truck"],
["Blue","Azul","🔵","Sky, water, blue crayon"],
["Yellow","Amarillo","🟡","Sun, banana, school bus"],
["Green","Verde","🟢","Grass, tree, frog"],
["Orange","Anaranjado","🟠","Orange fruit, pumpkin"],
["Purple","Morado","🟣","Grapes, flower"],
["Pink","Rosa","🌸","Flower, heart"],
["Black","Negro","⚫","Night, tire"],
["White","Blanco","⚪","Cloud, milk"],
["Brown","Café","🟤","Bear, tree trunk"]
];

function renderColors(){
  app.innerHTML=`
  <h2>Colors / Colores</h2>
  <p>Students learn to identify colors and name objects with that color.</p>
  <div class="grid">
  ${colors.map(c=>`
    <div class="card">
      <div class="pic">${c[2]}</div>
      <div class="word">${c[0]}</div>
      <div class="esl">${c[1]}</div>
      <p>${c[3]}</p>
      <button onclick="speak('${c[0]}. ${c[3]}. Find something ${c[0]}.')">🔊 Read</button>
      <button class="btn-green" onclick="speakSpanish('${c[1]}')">🇪🇸 Spanish</button>
      <button class="btn-purple" onclick="repeatWord('${c[0]}')">🔁 Repeat</button>
    </div>
  `).join("")}
  </div>`;
}

const shapes=[
["Circle","Círculo","⭕","A circle is round."],
["Square","Cuadrado","⬛","A square has four equal sides."],
["Triangle","Triángulo","🔺","A triangle has three sides."],
["Rectangle","Rectángulo","▭","A rectangle has two long sides and two short sides."],
["Star","Estrella","⭐","A star has points."],
["Heart","Corazón","❤️","A heart shape means love."],
["Oval","Óvalo","🥚","An oval looks like an egg."],
["Diamond","Diamante","🔷","A diamond has four corners."]
];

function renderShapes(){
  app.innerHTML=`
  <h2>Shapes / Figuras</h2>
  <p>Students learn basic shapes, sides, corners, and ESL Spanish words.</p>
  <div class="grid">
  ${shapes.map(s=>`
    <div class="card">
      <div class="pic">${s[2]}</div>
      <div class="word">${s[0]}</div>
      <div class="esl">${s[1]}</div>
      <p>${s[3]}</p>
      <button onclick="speak('${s[0]}. ${s[3]}')">🔊 Read</button>
      <button class="btn-green" onclick="speakSpanish('${s[1]}')">🇪🇸 Spanish</button>
      <button class="btn-purple" onclick="repeatWord('${s[0]}')">🔁 Repeat</button>
    </div>
  `).join("")}
  </div>`;
}
</script>
<script>
const vocab=[
["Animals","Animales",[
["Dog","Perro","🐶","The dog says woof."],
["Cat","Gato","🐱","The cat says meow."],
["Bird","Pájaro","🐦","The bird can fly."],
["Fish","Pez","🐟","The fish swims."],
["Cow","Vaca","🐄","The cow says moo."],
["Horse","Caballo","🐴","The horse runs."]
]],
["Weather","Clima",[
["Sunny","Soleado","☀️","It is sunny outside."],
["Rainy","Lluvioso","🌧️","Rain falls from the clouds."],
["Cloudy","Nublado","☁️","The sky has clouds."],
["Windy","Ventoso","💨","The wind is blowing."],
["Cold","Frío","🥶","Wear a jacket when it is cold."],
["Hot","Caliente","🥵","Drink water when it is hot."]
]],
["Community Helpers","Ayudantes de la comunidad",[
["Teacher","Maestra","👩‍🏫","A teacher helps us learn."],
["Doctor","Doctor","🧑‍⚕️","A doctor helps us feel better."],
["Firefighter","Bombero","🧑‍🚒","A firefighter helps put out fires."],
["Police Officer","Policía","👮","A police officer helps keep people safe."],
["Mail Carrier","Cartero","📬","A mail carrier brings letters."],
["Chef","Cocinero","🧑‍🍳","A chef cooks food."]
]],
["School Words","Palabras de escuela",[
["Book","Libro","📘","We read a book."],
["Pencil","Lápiz","✏️","We write with a pencil."],
["Crayon","Crayón","🖍️","We color with a crayon."],
["Chair","Silla","🪑","We sit on a chair."],
["Table","Mesa","🟫","We work at a table."],
["Backpack","Mochila","🎒","We carry things in a backpack."]
]],
["Body Parts","Partes del cuerpo",[
["Eyes","Ojos","👀","We see with our eyes."],
["Ears","Orejas","👂","We hear with our ears."],
["Nose","Nariz","👃","We smell with our nose."],
["Mouth","Boca","👄","We talk with our mouth."],
["Hands","Manos","👐","We clap with our hands."],
["Feet","Pies","🦶","We walk with our feet."]
]]
];

function renderVocab(){
  app.innerHTML=`
  <h2>Vocabulary / Vocabulario ESL</h2>
  <p>Learn common Pre-K words in English and Spanish.</p>
  ${vocab.map(group=>`
    <h2>${group[0]} / <span class="esl">${group[1]}</span></h2>
    <div class="grid">
    ${group[2].map(v=>`
      <div class="card">
        <div class="pic">${v[2]}</div>
        <div class="word">${v[0]}</div>
        <div class="esl">${v[1]}</div>
        <p>${v[3]}</p>
        <button onclick="speak('${v[0]}. ${v[3]}')">🔊 Read</button>
        <button class="btn-green" onclick="speakSpanish('${v[1]}')">🇪🇸 Spanish</button>
        <button class="btn-purple" onclick="repeatWord('${v[0]}')">🔁 Repeat</button>
      </div>
    `).join("")}
    </div>
  `).join("")}`;
}
</script>
<script>
const stories=[
{
title:"The Red Apple",
es:"La Manzana Roja",
pic:"🍎",
text:"I see a red apple. The apple is big. I can eat the apple. Yum yum!",
words:["I","see","red","apple","big","eat"]
},
{
title:"My Little Dog",
es:"Mi Perrito",
pic:"🐶",
text:"My dog is little. My dog can run. My dog can jump. I love my dog.",
words:["my","dog","little","run","jump","love"]
},
{
title:"The Sunny Day",
es:"El Día Soleado",
pic:"☀️",
text:"The sun is up. The sky is blue. I play outside. It is a sunny day.",
words:["sun","sky","blue","play","outside","day"]
},
{
title:"At School",
es:"En la Escuela",
pic:"🏫",
text:"I go to school. I see my teacher. I read a book. I write my name.",
words:["go","school","teacher","read","book","write","name"]
}
];

function renderStories(){
  app.innerHTML=`
  <h2>Stories / Cuentos</h2>
  <p>Students can listen to the story, repeat words, and practice reading.</p>
  <div class="grid">
  ${stories.map((s,i)=>`
    <div class="card">
      <div class="pic">${s.pic}</div>
      <div class="word">${s.title}</div>
      <div class="esl">${s.es}</div>
      <p class="small">Beginning Reading Story</p>
      <button onclick="openStory(${i})">📖 Open Story</button>
      <button class="btn-green" onclick="speak('${s.title}. ${s.text}')">🔊 Read Story</button>
    </div>
  `).join("")}
  </div>`;
}

function openStory(i){
  const s=stories[i];
  app.innerHTML=`
  <h2>${s.title} / <span class="esl">${s.es}</span></h2>
  <div class="storybox">
    <div class="pic">${s.pic}</div>
    <p>${s.text}</p>
    <button onclick="speak('${s.text}',.65)">🔊 Read Slowly</button>
    <button class="btn-green" onclick="speak('${s.text}',.9)">🔊 Read Normal</button>
    <button class="btn-orange" onclick="stopReading()">⏹ Stop</button>
  </div>

  <h2>Repeat Words</h2>
  <div class="grid">
  ${s.words.map(w=>`
    <div class="card">
      <div class="word">${w}</div>
      <button onclick="repeatWord('${w}')">🔁 Repeat Word</button>
      <button class="btn-purple" onclick="speak('Say it with me. ${w}. ${w}. ${w}.')">🗣 Practice</button>
    </div>
  `).join("")}
  </div>

  <div class="toolbar">
    <button onclick="renderStories()">⬅ Back to Stories</button>
  </div>`;
}
</script>
<script>
let score=0;
let total=0;

const quizQuestions=[
{q:"Which letter is A?",answers:["A","B","C"],correct:"A"},
{q:"Which picture is an apple?",answers:["🍎","🐶","🚗"],correct:"🍎"},
{q:"What number is 5?",answers:["3","5","8"],correct:"5"},
{q:"Which color is red?",answers:["🔴","🔵","🟢"],correct:"🔴"},
{q:"Which shape is a circle?",answers:["⭕","🔺","⬛"],correct:"⭕"},
{q:"Which animal says woof?",answers:["Dog","Cat","Fish"],correct:"Dog"},
{q:"Which helper teaches students?",answers:["Teacher","Doctor","Chef"],correct:"Teacher"},
{q:"What do we read?",answers:["Book","Shoe","Car"],correct:"Book"},
{q:"Which is sunny?",answers:["☀️","🌧️","☁️"],correct:"☀️"},
{q:"Which body part helps us see?",answers:["Eyes","Feet","Hands"],correct:"Eyes"}
];

function renderQuiz(){
  score=0;
  total=0;
  app.innerHTML=`
  <h2>Practice Test / Prueba de Práctica</h2>
  <p>Press read to hear the question and answer choices.</p>
  <div id="quizArea"></div>
  <div id="resultArea"></div>`;
  quizQuestions.forEach((item,index)=>addQuestion(item,index));
}

function addQuestion(item,index){
  const area=document.getElementById("quizArea");
  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`
    <h2>Question ${index+1}</h2>
    <p class="word">${item.q}</p>
    <button onclick="speak('${item.q}. Choices are: ${item.answers.join(", ")}')">🔊 Read Question</button>
    ${item.answers.map(a=>`
      <button class="option" onclick="checkAnswer(this,'${a}','${item.correct}')">${a}</button>
    `).join("")}
  `;
  area.appendChild(div);
}

function checkAnswer(btn,answer,correct){
  const buttons=btn.parentElement.querySelectorAll(".option");
  buttons.forEach(b=>b.disabled=true);
  total++;
  if(answer===correct){
    score++;
    btn.classList.add("correct");
    speak("Correct. Good job!");
  }else{
    btn.classList.add("wrong");
    speak("Try again next time. The correct answer is "+correct);
  }
  showResult();
}

function showResult(){
  const area=document.getElementById("resultArea");
  area.innerHTML=`
  <div class="card">
    <h2>Score</h2>
    <div class="big-letter">${score}/${total}</div>
    <p>${score>=8?"Excellent work!":"Keep practicing!"}</p>
    <span class="badge">⭐ Alphabet</span>
    <span class="badge">⭐ ESL</span>
    <span class="badge">⭐ Reading</span>
    <span class="badge">⭐ Vocabulary</span>
    <br><br>
    <button onclick="renderQuiz()">🔁 Restart Test</button>
  </div>`;
}

showSection("alphabet");
</script>

<footer>
<p>Pre-K 3 & 4 ESL Learning Program • Local HTML Practice Tool</p>
</footer>

</body>
</html>
