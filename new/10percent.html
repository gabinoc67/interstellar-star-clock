<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CST Neural Connection Training Simulator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1118;
  color:#fff;
  font-size:12px;
}
header{
  text-align:center;
  padding:10px;
  background:#111;
  border-bottom:2px solid #d6b45c;
}
h1{color:#f5d06f;margin:0;}

.container{
  width:95%;
  margin:auto;
}

.masonry{
  column-count:3;
  column-gap:10px;
}

.panel{
  background:#162230;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
  display:inline-block;
  width:100%;
}

h2{color:#f5d06f;font-size:14px;}

.stat{
  background:#0f1822;
  padding:8px;
  margin-bottom:8px;
  border-radius:6px;
}

.bar{
  height:12px;
  background:#333;
  border-radius:20px;
}
.fill{
  height:100%;
  width:0%;
  background:#f5d06f;
}

button{
  background:#d6b45c;
  padding:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.full{
  width:100%;
  display:block;
  margin-top:10px;
}

.testGrid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

.question{
  background:#0f1822;
  padding:8px;
  border-radius:6px;
}

input{
  width:100%;
  padding:5px;
}

.correctAnswer{
  display:none;
  color:#8ff0a4;
}
</style>
</head>

<body>

<header>
<h1>CST Neural Connection Training Simulator</h1>
</header>

<div class="container">

<div class="masonry">

<div class="panel">
<h2>Training Guidance</h2>
<ul>
<li>Use recall instead of rereading</li>
<li>Correct mistakes with feedback</li>
<li>Sleep helps memory</li>
<li>Use moderate challenge</li>
</ul>
</div>

<!-- ✅ MOVED HERE CORRECTLY -->
<div class="panel">
<h2>Efficiency Estimate</h2>

<div class="stat">
<p>Network Efficiency</p>
<div class="bar"><div id="effFill" class="fill"></div></div>
<p id="effScore">0%</p>
</div>

<div class="stat">
<p>Connection Quality</p>
<div class="bar"><div id="connFill" class="fill"></div></div>
<p id="connScore">0%</p>
</div>

<div class="stat">
<p>Synchronization</p>
<div class="bar"><div id="syncFill" class="fill"></div></div>
<p id="syncScore">0%</p>
</div>

</div>

</div>

<div class="panel full">
<h2>20 Question Test</h2>
<button onclick="startTest()">Start</button>
<button onclick="gradeTest()">Grade</button>

<div id="testArea" class="testGrid"></div>
<p id="scoreOutput"></p>
</div>

</div>

<script>
let questions=[
["2+2","4"],["3+3","6"],["5+5","10"],["10+10","20"],
["cat plural","cats"],["dog plural","dogs"],
["water formula","h2o"],["earth orbits","sun"],
["memory test word","brain"],["practice improves?","yes"],
["force formula","mass"],["recall better than reread?","yes"],
["sleep helps?","yes"],["brain cells","neurons"],
["connect better?","yes"],["challenge too hard?","no"],
["learning improves?","yes"],["training daily?","yes"],
["signal faster?","myelination"],["efficient vs many?","efficient"]
];

function startTest(){
let html="";
questions.forEach((q,i)=>{
html+=`
<div class="question">
<p>${q[0]}</p>
<input id="a${i}">
<div class="correctAnswer" id="c${i}">Correct: ${q[1]}</div>
</div>`;
});
testArea.innerHTML=html;
}

function gradeTest(){
let score=0;
questions.forEach((q,i)=>{
let val=document.getElementById("a"+i).value.toLowerCase();
let correct=document.getElementById("c"+i);
correct.style.display="block";
if(val===q[1]) score++;
});
scoreOutput.innerText="Score: "+score+"/20";
updateBars(score);
}

function updateBars(score){
let percent=score*5;
effFill.style.width=percent+"%";
connFill.style.width=percent+"%";
syncFill.style.width=percent+"%";

effScore.innerText=percent+"%";
connScore.innerText=percent+"%";
syncScore.innerText=percent+"%";
}
</script>

</body>
</html>
