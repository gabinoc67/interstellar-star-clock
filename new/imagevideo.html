<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>57 Image Video Maker</title>
<style>
  body {
    margin: 0;
    background: #05070d;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
  }

  h1 {
    margin-top: 20px;
  }

  .panel {
    width: 95%;
    max-width: 1000px;
    margin: 20px auto;
    background: #111827;
    border: 1px solid #334155;
    border-radius: 14px;
    padding: 16px;
  }

  canvas {
    width: 100%;
    max-width: 900px;
    aspect-ratio: 16 / 9;
    background: black;
    border: 2px solid white;
    border-radius: 12px;
  }

  button, input {
    padding: 10px 14px;
    margin: 6px;
    font-size: 15px;
    border-radius: 8px;
    border: none;
  }

  button {
    cursor: pointer;
    background: #2563eb;
    color: white;
  }

  button:hover {
    background: #1d4ed8;
  }

  .danger {
    background: #dc2626;
  }

  .good {
    background: #16a34a;
  }

  .info {
    margin-top: 10px;
    font-size: 14px;
    color: #cbd5e1;
  }
</style>
</head>

<body>

<h1>57 Image Video Maker</h1>

<div class="panel">
  <p>Upload your 57 PNG or JPG images. Name them in order like image01.png, image02.png, image03.png...</p>

  <input type="file" id="imageInput" multiple accept="image/png,image/jpeg,image/jpg,image/webp">

  <br>

  <label>Seconds per image:</label>
  <input type="number" id="secondsPerImage" value="4" min="0.5" step="0.5">

  <label>Video FPS:</label>
  <input type="number" id="fps" value="30" min="10" max="60">

  <br><br>

  <canvas id="videoCanvas" width="1920" height="1080"></canvas>

  <div>
    <button onclick="startPreview()">Start</button>
    <button onclick="pausePreview()">Pause</button>
    <button onclick="resetPreview()" class="danger">Reset</button>
    <button onclick="downloadVideo()" class="good">Download Video</button>
  </div>

  <div class="info" id="status">No images loaded.</div>
</div>

<script>
const input = document.getElementById("imageInput");
const canvas = document.getElementById("videoCanvas");
const ctx = canvas.getContext("2d");
const statusText = document.getElementById("status");

let images = [];
let currentIndex = 0;
let previewTimer = null;
let isPaused = false;

input.addEventListener("change", async function(event) {
  images = [];
  currentIndex = 0;
  clearInterval(previewTimer);

  const files = Array.from(event.target.files);

  files.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

  for (const file of files) {
    const img = new Image();
    img.src = URL.createObjectURL(file);

    await new Promise(resolve => {
      img.onload = resolve;
    });

    images.push(img);
  }

  if (images.length > 0) {
    drawImageToCanvas(images[0]);
    updateStatus();
  } else {
    statusText.innerText = "No images loaded.";
  }
});

function drawImageToCanvas(img) {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const canvasRatio = canvas.width / canvas.height;
  const imageRatio = img.width / img.height;

  let drawWidth, drawHeight, x, y;

  if (imageRatio > canvasRatio) {
    drawWidth = canvas.width;
    drawHeight = canvas.width / imageRatio;
    x = 0;
    y = (canvas.height - drawHeight) / 2;
  } else {
    drawHeight = canvas.height;
    drawWidth = canvas.height * imageRatio;
    x = (canvas.width - drawWidth) / 2;
    y = 0;
  }

  ctx.drawImage(img, x, y, drawWidth, drawHeight);
}

function startPreview() {
  if (images.length === 0) {
    alert("Please upload your images first.");
    return;
  }

  clearInterval(previewTimer);
  isPaused = false;

  const seconds = parseFloat(document.getElementById("secondsPerImage").value);
  const delay = seconds * 1000;

  previewTimer = setInterval(() => {
    if (!isPaused) {
      drawImageToCanvas(images[currentIndex]);
      updateStatus();

      currentIndex++;

      if (currentIndex >= images.length) {
        currentIndex = images.length - 1;
        clearInterval(previewTimer);
      }
    }
  }, delay);
}

function pausePreview() {
  isPaused = true;
  statusText.innerText = "Paused at image " + (currentIndex + 1) + " / " + images.length;
}

function resetPreview() {
  clearInterval(previewTimer);
  currentIndex = 0;
  isPaused = false;

  if (images.length > 0) {
    drawImageToCanvas(images[0]);
  }

  updateStatus();
}

function updateStatus() {
  statusText.innerText =
    "Image " + (currentIndex + 1) + " / " + images.length +
    " | Total video time: " +
    Math.round(images.length * parseFloat(document.getElementById("secondsPerImage").value)) +
    " seconds";
}

async function downloadVideo() {
  if (images.length === 0) {
    alert("Please upload your images first.");
    return;
  }

  const secondsPerImage = parseFloat(document.getElementById("secondsPerImage").value);
  const fps = parseInt(document.getElementById("fps").value);

  const stream = canvas.captureStream(fps);
  const recorder = new MediaRecorder(stream, {
    mimeType: "video/webm"
  });

  let chunks = [];

  recorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: "video/webm" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "57-image-video.webm";
    a.click();

    URL.revokeObjectURL(url);
    statusText.innerText = "Video downloaded: 57-image-video.webm";
  };

  recorder.start();

  statusText.innerText = "Recording video...";

  for (let i = 0; i < images.length; i++) {
    drawImageToCanvas(images[i]);
    currentIndex = i;
    updateStatus();

    await wait(secondsPerImage * 1000);
  }

  recorder.stop();
}

function wait(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}
</script>

</body>
</html>
