<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Video Builder (57 Frames)</title>
<style>
    body {
        background: #000;
        color: #fff;
        font-family: Arial;
        text-align: center;
    }

    #viewer {
        width: 80%;
        max-width: 900px;
        height: 500px;
        margin: 20px auto;
        border: 3px solid #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        background: black;
    }

    #viewer img {
        max-width: 100%;
        max-height: 100%;
    }

    .controls {
        margin-top: 20px;
    }

    button, input {
        padding: 10px;
        margin: 5px;
        font-size: 16px;
    }

    #info {
        margin-top: 10px;
        font-size: 14px;
    }
</style>
</head>

<body>

<h2>🎬 Image to Video (57 Images)</h2>

<input type="file" id="upload" multiple accept="image/*">

<div id="viewer">
    <img id="frame" src="">
</div>

<div class="controls">
    <button onclick="start()">▶ Start</button>
    <button onclick="pause()">⏸ Pause</button>
    <button onclick="reset()">🔄 Reset</button>

    Speed (seconds per image):
    <input type="number" id="speed" value="4" step="0.5" min="0.5">
</div>

<div id="info">
    Frame: 0 / 0
</div>

<script>
let images = [];
let index = 0;
let interval = null;

const frame = document.getElementById("frame");
const info = document.getElementById("info");

// Upload images
document.getElementById("upload").addEventListener("change", function(e) {
    images = [];
    index = 0;

    const files = Array.from(e.target.files);

    // Sort images by name (important for order)
    files.sort((a, b) => a.name.localeCompare(b.name));

    files.forEach(file => {
        images.push(URL.createObjectURL(file));
    });

    if (images.length > 0) {
        frame.src = images[0];
        updateInfo();
    }
});

// Start playback
function start() {
    if (interval) clearInterval(interval);

    let speed = parseFloat(document.getElementById("speed").value) * 1000;

    interval = setInterval(() => {
        if (index < images.length - 1) {
            index++;
            frame.src = images[index];
            updateInfo();
        } else {
            clearInterval(interval);
        }
    }, speed);
}

// Pause
function pause() {
    clearInterval(interval);
}

// Reset
function reset() {
    clearInterval(interval);
    index = 0;
    if (images.length > 0) {
        frame.src = images[0];
    }
    updateInfo();
}

// Update display
function updateInfo() {
    info.innerText = "Frame: " + (index + 1) + " / " + images.length;
}
</script>

</body>
</html>
