<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>57 Image Video Maker</title>

<style>
body {
  margin: 0;
  background: #05070d;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

.panel {
  width: 95%;
  max-width: 1000px;
  margin: 20px auto;
  background: #111827;
  border: 1px solid #334155;
  border-radius: 14px;
  padding: 16px;
}

canvas {
  width: 100%;
  max-width: 900px;
  aspect-ratio: 16 / 9;
  background: black;
  border: 2px solid white;
  border-radius: 12px;
}

button, input {
  padding: 10px 14px;
  margin: 6px;
  font-size: 15px;
  border-radius: 8px;
  border: none;
}

button {
  cursor: pointer;
  background: #2563eb;
  color: white;
}

button:hover {
  background: #1d4ed8;
}

.good {
  background: #16a34a;
}

.danger {
  background: #dc2626;
}

.info {
  color: #cbd5e1;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>57 Image Video Maker</h1>

<div class="panel">

<p>
Upload your PNG or JPG images. Name them in order:
image01.png, image02.png, image03.png...
</p>

<input type="file" id="imageInput" multiple accept="image/png,image/jpeg,image/jpg,image/webp">

<br>

<label>Seconds per image:</label>
<input type="number" id="secondsPerImage" value="4" min="1" step="1">

<br><br>

<canvas id="canvas" width="1920" height="1080"></canvas>

<br>

<button onclick="playSlideshow()">Start</button>
<button onclick="pauseSlideshow()">Pause</button>
<button onclick="resetSlideshow()" class="danger">Reset</button>
<button onclick="downloadVideo()" class="good">Download Video</button>

<div class="info" id="status">No images loaded.</div>

</div>

<script>
const input = document.getElementById("imageInput");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const statusBox = document.getElementById("status");

let images = [];
let currentIndex = 0;
let playing = false;
let paused = false;
let timer = null;

input.addEventListener("change", async function(e) {
  images = [];
  currentIndex = 0;
  playing = false;
  paused = false;
  clearTimeout(timer);

  const files = Array.from(e.target.files);

  files.sort((a, b) =>
    a.name.localeCompare(b.name, undefined, { numeric: true })
  );

  for (const file of files) {
    const img = new Image();
    img.src = URL.createObjectURL(file);

    await new Promise(resolve => {
      img.onload = resolve;
    });

    images.push(img);
  }

  if (images.length > 0) {
    drawImage(images[0]);
    updateStatus();
  }
});

function drawImage(img) {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const canvasRatio = canvas.width / canvas.height;
  const imageRatio = img.width / img.height;

  let w, h, x, y;

  if (imageRatio > canvasRatio) {
    w = canvas.width;
    h = canvas.width / imageRatio;
    x = 0;
    y = (canvas.height - h) / 2;
  } else {
    h = canvas.height;
    w = canvas.height * imageRatio;
    x = (canvas.width - w) / 2;
    y = 0;
  }

  ctx.drawImage(img, x, y, w, h);
}

function playSlideshow() {
  if (images.length === 0) {
    alert("Upload images first.");
    return;
  }

  playing = true;
  paused = false;

  showCurrentImage();
}

function showCurrentImage() {
  if (!playing || paused) return;

  drawImage(images[currentIndex]);
  updateStatus();

  const seconds = Number(document.getElementById("secondsPerImage").value);

  timer = setTimeout(() => {
    currentIndex++;

    if (currentIndex >= images.length) {
      currentIndex = images.length - 1;
      playing = false;
      updateStatus("Finished.");
      return;
    }

    showCurrentImage();

  }, seconds * 1000);
}

function pauseSlideshow() {
  paused = true;
  playing = false;
  clearTimeout(timer);
  updateStatus("Paused.");
}

function resetSlideshow() {
  clearTimeout(timer);
  currentIndex = 0;
  playing = false;
  paused = false;

  if (images.length > 0) {
    drawImage(images[0]);
  }

  updateStatus("Reset.");
}

function updateStatus(extra = "") {
  const seconds = Number(document.getElementById("secondsPerImage").value);
  const totalSeconds = images.length * seconds;

  statusBox.innerText =
    extra + " Image " + (currentIndex + 1) + " / " + images.length +
    " | " + seconds + " seconds per image" +
    " | Total: " + totalSeconds + " seconds";
}

async function downloadVideo() {
  if (images.length === 0) {
    alert("Upload images first.");
    return;
  }

  clearTimeout(timer);
  playing = false;
  paused = false;

  const seconds = Number(document.getElementById("secondsPerImage").value);
  const fps = 30;

  let mimeType = "";

  if (MediaRecorder.isTypeSupported("video/mp4")) {
    mimeType = "video/mp4";
  } else if (MediaRecorder.isTypeSupported("video/webm;codecs=vp9")) {
    mimeType = "video/webm;codecs=vp9";
  } else {
    mimeType = "video/webm";
  }

  const stream = canvas.captureStream(fps);
  const recorder = new MediaRecorder(stream, { mimeType });

  let chunks = [];

  recorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.onstop = () => {
    const type = mimeType.includes("mp4") ? "video/mp4" : "video/webm";
    const extension = mimeType.includes("mp4") ? "mp4" : "webm";

    const blob = new Blob(chunks, { type });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "57-image-video." + extension;
    a.click();

    URL.revokeObjectURL(url);

    statusBox.innerText =
      "Downloaded video as ." + extension +
      ". If you need true MP4 and it downloaded WebM, convert it in Clipchamp, Canva, or CapCut.";
  };

  recorder.start();

  statusBox.innerText = "Recording video...";

  for (let i = 0; i < images.length; i++) {
    currentIndex = i;
    drawImage(images[i]);
    updateStatus("Recording.");

    await wait(seconds * 1000);
  }

  recorder.stop();
}

function wait(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}
</script>

</body>
</html>
