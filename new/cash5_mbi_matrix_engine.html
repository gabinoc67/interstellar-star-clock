<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cash 5 Step-by-Step Matrix Engine</title>
<style>
body{font-family:Arial;margin:0;color:#172033;background:#fff}
header{text-align:center;padding:20px;border-bottom:1px solid #cfd8e6}
main{max-width:1250px;margin:auto;padding:18px}
.card{border:1px solid #cfd8e6;border-radius:14px;padding:15px;margin-bottom:15px;box-shadow:0 6px 18px #0001}
textarea{width:100%;min-height:130px;font-family:Consolas;padding:10px;border-radius:10px;border:1px solid #cfd8e6}
#dataInput{min-height:240px}
button{padding:12px 15px;border:0;border-radius:10px;background:#174ea6;color:white;font-weight:bold;margin:5px;cursor:pointer}
button:nth-of-type(2){background:#0b6e4f}
button:nth-of-type(3){background:#403899}
button:nth-of-type(4){background:#9a6a00}
button:nth-of-type(5){background:#444}
.good{background:#eaf8f1}
.bad{background:#fff0f0}
.warn{background:#fff8e6}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border:1px solid #cfd8e6;padding:6px;text-align:center}
th{background:#eef3f9}
.scroll{max-height:460px;overflow:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.stat{background:#f7f9fc;border:1px solid #cfd8e6;border-radius:10px;padding:10px}
.small{font-size:12px;color:#5c6b82}
</style>
</head>

<body>
<header>
<h1>Cash 5 Step-by-Step Matrix Engine</h1>
<p>Anchor Cap + Pair Bridge + Missed Draw Recovery + visible calculations.</p>
</header>

<main>
<div class="card">
<h2>1. Official Cash 5 Draw History</h2>
<textarea id="dataInput" placeholder="6/26/2026 01 11 22 24 35"></textarea>

<h2>2. Machine Pretest History</h2>
<textarea id="pretestInput" placeholder="Optional pretest numbers"></textarea>

<h2>3. Previous Generated Tickets</h2>
<textarea id="previousTicketsInput" placeholder="Paste previous generated tickets here"></textarea>

<button onclick="step1LoadData()">Step 1 Load Data</button>
<button onclick="step2BasicMatrix()">Step 2 Basic Matrix</button>
<button onclick="step3UpgradeScores()">Step 3 Upgrade Scores</button>
<button onclick="step4BuildPools()">Step 4 Build Pools</button>
<button onclick="step5BuildTickets()">Step 5 Build Top 40</button>
<button onclick="printTop40()">Print</button>
<button onclick="exportExcel()">Excel</button>
</div>

<div id="msg" class="card warn">Start with Step 1.</div>
<div id="summary" class="card"></div>
<div id="matrix" class="card"></div>
<div id="upgrade" class="card"></div>
<div id="pools" class="card"></div>
<div id="top40" class="card"></div>
</main>

<script>
const PORTFOLIO_SIZE=40;
const HARD_CAP=18;
const STRONG_CAP=16;
const SECONDARY_CAP=10;
const WILD_CAP=8;

let S={
draws:[],
pretests:[],
previous:[],
freq:Array(36).fill(0),
last:Array(36).fill(-1),
gaps:Array.from({length:36},()=>[]),
pairs:{},
triples:{},
rows:[],
pairRows:[],
strong:[],
secondary:[],
wild:[],
recovery:[],
bridge4:[],
top40:[],
usage:Array(36).fill(0),
pairUse:{},
triUse:{},
log:[]
};

function msg(t,cls="warn"){
document.getElementById("msg").className="card "+cls;
document.getElementById("msg").innerHTML=t;
}

function fmt(a){
return a.slice().sort((x,y)=>x-y).map(n=>String(n).padStart(2,"0")).join(" - ");
}

function key(a){
return a.slice().sort((x,y)=>x-y).join("-");
}

function pairKey(a,b){
return a<b?a+"-"+b:b+"-"+a;
}

function triKey(a,b,c){
return [a,b,c].sort((x,y)=>x-y).join("-");
}

function avg(a){
return a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
}

function norm(v,min,max){
if(max===min)return 0;
return Math.max(0,Math.min(1,(v-min)/(max-min)));
}

function overlap(a,b){
return a.filter(n=>b.includes(n)).length;
}

function parseLines(raw){
let out=[];
if(!raw.trim())return out;

raw.split(/\n+/).forEach(line=>{
let nums=(line.match(/\d+/g)||[]).map(Number).filter(n=>n>=1&&n<=35);

if(nums.length>=5){
let last5=nums.slice(-5);
let d=[...new Set(last5)].sort((a,b)=>a-b);
if(d.length===5)out.push(d);
}
});

return out;
}

function resetAll(){
S.freq=Array(36).fill(0);
S.last=Array(36).fill(-1);
S.gaps=Array.from({length:36},()=>[]);
S.pairs={};
S.triples={};
S.rows=[];
S.pairRows=[];
S.strong=[];
S.secondary=[];
S.wild=[];
S.recovery=[];
S.bridge4=[];
S.top40=[];
S.usage=Array(36).fill(0);
S.pairUse={};
S.triUse={};
S.log=[];
}

function step1LoadData(){
S.draws=parseLines(document.getElementById("dataInput").value);
S.pretests=parseLines(document.getElementById("pretestInput").value);
S.previous=parseLines(document.getElementById("previousTicketsInput").value);

resetAll();

document.getElementById("matrix").innerHTML="";
document.getElementById("upgrade").innerHTML="";
document.getElementById("pools").innerHTML="";
document.getElementById("top40").innerHTML="";

if(S.draws.length<20){
msg("Need at least 20 official draw lines. Each line must contain five Cash 5 numbers from 1 to 35.","bad");
return;
}

document.getElementById("summary").innerHTML=
`<h2>Step 1 Loaded</h2>
<div class="grid">
<div class="stat"><b>${S.draws.length}</b><br>Official draws</div>
<div class="stat"><b>${S.pretests.length}</b><br>Pretest rows</div>
<div class="stat"><b>${S.previous.length}</b><br>Previous tickets</div>
<div class="stat"><b>${fmt(S.draws[S.draws.length-1])}</b><br>Last draw used for recovery</div>
</div>`;

msg("Step 1 complete. Run Step 2.","good");
}

function step2BasicMatrix(){
if(S.draws.length<20){
msg("Run Step 1 first.","bad");
return;
}

let total=S.draws.length;

S.draws.forEach((d,i)=>{
d.forEach(n=>{
S.freq[n]++;
if(S.last[n]>=0){
S.gaps[n].push(i-S.last[n]);
}
S.last[n]=i;
});

for(let a=0;a<5;a++){
for(let b=a+1;b<5;b++){
let pk=pairKey(d[a],d[b]);
S.pairs[pk]=(S.pairs[pk]||0)+1;
}
}

for(let a=0;a<5;a++){
for(let b=a+1;b<5;b++){
for(let c=b+1;c<5;c++){
let tk=triKey(d[a],d[b],d[c]);
S.triples[tk]=(S.triples[tk]||0)+1;
}
}
}
});

let avgFreq=total*5/35;
let rows=[];

for(let n=1;n<=35;n++){
let delay=S.last[n]<0?total:total-1-S.last[n];
let gap=avg(S.gaps[n])||total;
let hot=S.freq[n]/avgFreq;
let time=(delay+1)/(gap+1);

let baseScore=
0.40*norm(hot,0,2.5)+
0.35*norm(time,0,3.5)+
0.25*norm(delay,0,25);

rows.push({
n:n,
freq:S.freq[n],
delay:delay,
gap:gap,
hot:hot,
time:time,
baseScore:baseScore,
score:baseScore
});
}

rows.sort((a,b)=>b.score-a.score || a.n-b.n);
S.rows=rows;

document.getElementById("matrix").innerHTML=
"<h2>Step 2 Basic Matrix</h2>"+
"<div class='scroll'><table>"+
"<tr><th>Rank</th><th>#</th><th>Freq</th><th>Delay</th><th>Avg Gap</th><th>Hot</th><th>Time Ratio</th><th>Base Score</th></tr>"+
S.rows.map((r,i)=>`
<tr>
<td>${i+1}</td>
<td><b>${String(r.n).padStart(2,"0")}</b></td>
<td>${r.freq}</td>
<td>${r.delay}</td>
<td>${r.gap.toFixed(1)}</td>
<td>${r.hot.toFixed(2)}</td>
<td>${r.time.toFixed(2)}</td>
<td>${r.baseScore.toFixed(3)}</td>
</tr>`).join("")+
"</table></div>";

msg("Step 2 complete. Run Step 3.","good");
}

function step3UpgradeScores(){
if(!S.rows.length){
msg("Run Step 2 first.","bad");
return;
}

let pairRows=buildPairMomentum();
S.pairRows=pairRows;

S.rows.forEach(r=>{
let n=r.n;

let positionScore=positionConfidence(n);
let clusterScore=clusterPower(n);
let oscillationScore=oscillationPower(n);
let pairScore=bestPairScore(n);

r.positionScore=positionScore;
r.clusterScore=clusterScore;
r.oscillationScore=oscillationScore;
r.pairScore=pairScore;

r.score=
r.baseScore+
0.18*positionScore+
0.18*clusterScore+
0.12*oscillationScore+
0.20*pairScore;
});

S.rows.sort((a,b)=>b.score-a.score || a.n-b.n);

document.getElementById("upgrade").innerHTML=
"<h2>Step 3 Individual Upgrade Scores</h2>"+
"<div class='scroll'><table>"+
"<tr><th>Rank</th><th>#</th><th>Base</th><th>Position</th><th>Cluster</th><th>Oscillation</th><th>Pair</th><th>Total</th></tr>"+
S.rows.map((r,i)=>`
<tr>
<td>${i+1}</td>
<td><b>${String(r.n).padStart(2,"0")}</b></td>
<td>${r.baseScore.toFixed(3)}</td>
<td>${r.positionScore.toFixed(3)}</td>
<td>${r.clusterScore.toFixed(3)}</td>
<td>${r.oscillationScore.toFixed(3)}</td>
<td>${r.pairScore.toFixed(3)}</td>
<td><b>${r.score.toFixed(3)}</b></td>
</tr>`).join("")+
"</table></div>";

msg("Step 3 complete. Run Step 4.","good");
}
  function buildPairMomentum(){
let windows=[5,10,20,60];
let all={};

windows.forEach(w=>{
let slice=S.draws.slice(-Math.min(w,S.draws.length));
let count={};

slice.forEach(d=>{
for(let i=0;i<5;i++){
for(let j=i+1;j<5;j++){
let pk=pairKey(d[i],d[j]);
count[pk]=(count[pk]||0)+1;
}
}
});

Object.keys(count).forEach(k=>{
if(!all[k])all[k]={key:k,score:0,w5:0,w10:0,w20:0,w60:0};
let rate=count[k]/slice.length;
if(w===5)all[k].w5=rate;
if(w===10)all[k].w10=rate;
if(w===20)all[k].w20=rate;
if(w===60)all[k].w60=rate;
});
});

Object.values(all).forEach(p=>{
let accel=(p.w5-p.w20)+(p.w10-p.w60);
p.score=
0.42*p.w5+
0.30*p.w10+
0.18*p.w20+
0.10*p.w60+
Math.max(0,accel)*1.25;

p.nums=p.key.split("-").map(Number);
});

return Object.values(all).sort((a,b)=>b.score-a.score || a.key.localeCompare(b.key));
}

function positionConfidence(n){
let windows=[
{w:10,wt:.45},
{w:20,wt:.35},
{w:50,wt:.20}
];

let final=[0,0,0,0,0];

windows.forEach(o=>{
let slice=S.draws.slice(-Math.min(o.w,S.draws.length));
let c=[0,0,0,0,0];
let app=0;

slice.forEach(d=>{
d.slice().sort((a,b)=>a-b).forEach((x,i)=>{
if(x===n){
c[i]++;
app++;
}
});
});

if(app>0){
for(let i=0;i<5;i++){
final[i]+=(c[i]/app)*o.wt;
}
}
});

let sorted=final.slice().sort((a,b)=>b-a);
return sorted[0]-(sorted[1]||0);
}

function clusterPower(n){
let configs=[
{w:10,wt:.45},
{w:25,wt:.35},
{w:60,wt:.20}
];

let score=0;

configs.forEach(o=>{
let slice=S.draws.slice(-Math.min(o.w,S.draws.length));
let f=Array(36).fill(0);

slice.forEach(d=>{
d.forEach(x=>f[x]++);
});

let left=f[n-1]||0;
let mid=f[n]||0;
let right=f[n+1]||0;

let cluster=(left*.75+mid*1.25+right*.75)/(slice.length||1);
let center=mid/(left+mid+right+1);

score+=(cluster*.6+center*.4)*o.wt;
});

return score;
}

function oscillationPower(n){
let r=S.draws.slice(-Math.min(25,S.draws.length));
let wave=0;

for(let i=1;i<r.length;i++){
if(r[i-1].includes(n-1)&&r[i].includes(n))wave+=1.3;
if(r[i-1].includes(n+1)&&r[i].includes(n))wave+=1.3;
if(r[i].includes(n-1)||r[i].includes(n+1))wave+=.25;
}

return wave/(r.length||1);
}

function bestPairScore(n){
let best=0;

S.pairRows.forEach(p=>{
if(p.nums.includes(n)){
best=Math.max(best,p.score);
}
});

return best;
}

function step4BuildPools(){
if(!S.rows.length || !S.pairRows.length){
msg("Run Step 3 first.","bad");
return;
}

let ranked=S.rows.map(r=>r.n);

S.strong=ranked.slice(0,10);
S.secondary=ranked.slice(10,22);
S.wild=ranked.slice(22,35);

S.recovery=[];

let lastDraw=S.draws[S.draws.length-1]||[];

lastDraw.forEach(n=>{
let used=S.previous.filter(t=>t.includes(n)).length;
if(used<5 && !S.recovery.includes(n)){
S.recovery.push(n);
}
});

ranked.forEach(n=>{
if(S.recovery.length<12 && !S.recovery.includes(n) && S.wild.includes(n)){
S.recovery.push(n);
}
});

ranked.forEach(n=>{
if(S.recovery.length<12 && !S.recovery.includes(n)){
S.recovery.push(n);
}
});

S.bridge4=buildBridge4();

document.getElementById("pools").innerHTML=
`<h2>Step 4 Pools Built Individually</h2>
<div class="grid">
<div class="stat"><b>${S.strong.map(n=>String(n).padStart(2,"0")).join(" - ")}</b><br>Strong Pool: top 10</div>
<div class="stat"><b>${S.secondary.map(n=>String(n).padStart(2,"0")).join(" - ")}</b><br>Secondary Pool: rank 11-22</div>
<div class="stat"><b>${S.wild.map(n=>String(n).padStart(2,"0")).join(" - ")}</b><br>Wildcard Pool: rank 23-35</div>
<div class="stat"><b>${S.recovery.map(n=>String(n).padStart(2,"0")).join(" - ")}</b><br>Missed Draw Recovery</div>
</div>

<h3>Top Pair Momentum</h3>
<div class="scroll"><table>
<tr><th>Rank</th><th>Pair</th><th>Score</th></tr>
${S.pairRows.slice(0,30).map((p,i)=>`
<tr>
<td>${i+1}</td>
<td><b>${p.key}</b></td>
<td>${p.score.toFixed(3)}</td>
</tr>`).join("")}
</table></div>

<h3>4-Number Bridge Groups</h3>
<div class="scroll"><table>
<tr><th>Rank</th><th>Bridge Group</th><th>Score</th></tr>
${S.bridge4.slice(0,40).map((b,i)=>`
<tr>
<td>${i+1}</td>
<td><b>${fmt(b.nums)}</b></td>
<td>${b.score.toFixed(3)}</td>
</tr>`).join("")}
</table></div>`;

msg("Step 4 complete. Run Step 5.","good");
}

function buildBridge4(){
let out=[];

for(let a=0;a<S.strong.length;a++){
for(let b=a+1;b<S.strong.length;b++){
for(let c=b+1;c<S.strong.length;c++){
for(let d=c+1;d<S.strong.length;d++){
let nums=[S.strong[a],S.strong[b],S.strong[c],S.strong[d]].sort((x,y)=>x-y);
out.push({nums:nums,score:bridgeScore(nums)});
}
}
}
}

out.sort((x,y)=>y.score-x.score || key(x.nums).localeCompare(key(y.nums)));
return out;
}

function bridgeScore(nums){
let score=0;

nums.forEach(n=>{
let r=S.rows.find(x=>x.n===n);
score+=(r?r.score:0);
});

for(let i=0;i<nums.length;i++){
for(let j=i+1;j<nums.length;j++){
let pk=pairKey(nums[i],nums[j]);
let p=S.pairRows.find(x=>x.key===pk);
score+=(p?p.score:0)*1.75;
score+=(S.pairs[pk]||0)*0.02;
}
}

return score;
}
  function step5BuildTickets(){
if(!S.bridge4.length){
msg("Run Step 4 first.","bad");
return;
}

S.top40=[];
S.usage=Array(36).fill(0);
S.pairUse={};
S.triUse={};
S.log=[];

build4Plus1();
build3Plus2();
buildBalanced();
buildRecovery();
finishTop40();

document.getElementById("top40").innerHTML=renderTickets();

msg("Step 5 complete. Top 40 created step by step.","good");
}

function build4Plus1(){
let challengers=[...S.secondary,...S.wild,...S.recovery];
let made=0;

for(let i=0;i<S.bridge4.length && made<12;i++){
let bridge=S.bridge4[i].nums;

for(let j=0;j<challengers.length;j++){
let ch=challengers[(i+j)%challengers.length];

if(addTicket([...bridge,ch],"4+1 Bridge","4 matrix numbers + 1 challenger",true)){
made++;
break;
}
}
}
}

function build3Plus2(){
let made=0;
let outsiders=[...S.secondary,...S.recovery,...S.wild];

for(let i=0;i<60 && made<10;i++){
let nums=[
S.strong[i%S.strong.length],
S.strong[(i+3)%S.strong.length],
S.strong[(i+6)%S.strong.length],
outsiders[(i+2)%outsiders.length],
outsiders[(i+8)%outsiders.length]
];

if(addTicket(nums,"3+2 Blend","3 matrix numbers + 2 challengers",true)){
made++;
}
}
}

function buildBalanced(){
let made=0;
let hot=S.strong.slice(0,6);
let medium=[...S.strong.slice(6),...S.secondary];
let cold=[...S.wild,...S.recovery];

for(let i=0;i<80 && made<10;i++){
let nums=[
hot[i%hot.length],
hot[(i+3)%hot.length],
medium[(i+2)%medium.length],
medium[(i+7)%medium.length],
cold[(i+5)%cold.length]
];

if(addTicket(nums,"2+2+1 Balanced","2 hot + 2 medium + 1 cold recovery",true)){
made++;
}
}
}

function buildRecovery(){
let made=0;

for(let i=0;i<80 && made<8;i++){
let nums=[
S.recovery[i%S.recovery.length],
S.recovery[(i+4)%S.recovery.length],
S.strong[(i+2)%S.strong.length],
S.secondary[(i+5)%S.secondary.length],
S.wild[(i+3)%S.wild.length]
];

if(addTicket(nums,"Recovery Wildcard","missed draw recovery + wildcard protection",true)){
made++;
}
}
}

function finishTop40(){
let ranked=S.rows.map(r=>r.n);

for(let a=0;a<ranked.length && S.top40.length<40;a++){
for(let b=a+1;b<ranked.length && S.top40.length<40;b++){
for(let c=b+1;c<ranked.length && S.top40.length<40;c++){
for(let d=c+1;d<ranked.length && S.top40.length<40;d++){
for(let e=d+1;e<ranked.length && S.top40.length<40;e++){
let nums=[ranked[a],ranked[b],ranked[c],ranked[d],ranked[e]];
addTicket(nums,"Safe Fill","deterministic fill to complete Top 40",false);
}
}
}
}
}
}

function addTicket(nums,type,role,strict){
nums=[...new Set(nums)].filter(n=>n>=1&&n<=35).sort((a,b)=>a-b);

if(nums.length!==5){
S.log.push(["reject",fmt(nums),type,"duplicate or invalid length"]);
return false;
}

if(S.top40.some(t=>key(t.nums)===key(nums))){
S.log.push(["reject",fmt(nums),type,"duplicate ticket"]);
return false;
}

if(!balance(nums,strict)){
S.log.push(["reject",fmt(nums),type,"balance rule"]);
return false;
}

if(nums.some(n=>S.usage[n]>=HARD_CAP)){
S.log.push(["reject",fmt(nums),type,"hard cap"]);
return false;
}

if(strict && !classCapAllowed(nums)){
S.log.push(["reject",fmt(nums),type,"class cap"]);
return false;
}

let pairs=ticketPairs(nums);
let triples=ticketTriples(nums);

if(strict && pairs.some(p=>(S.pairUse[p]||0)>=5)){
S.log.push(["reject",fmt(nums),type,"pair cap"]);
return false;
}

if(strict && triples.some(t=>(S.triUse[t]||0)>=2)){
S.log.push(["reject",fmt(nums),type,"triple cap"]);
return false;
}

S.top40.push({
nums:nums,
type:type,
role:role,
score:ticketScore(nums,type)
});

nums.forEach(n=>S.usage[n]++);
pairs.forEach(p=>S.pairUse[p]=(S.pairUse[p]||0)+1);
triples.forEach(t=>S.triUse[t]=(S.triUse[t]||0)+1);

S.log.push(["accept",fmt(nums),type,"accepted"]);
return true;
}

function classCapAllowed(nums){
for(let n of nums){
if(S.strong.includes(n) && S.usage[n]>=STRONG_CAP)return false;
if(S.secondary.includes(n) && S.usage[n]>=SECONDARY_CAP)return false;
if(S.wild.includes(n) && S.usage[n]>=WILD_CAP)return false;
}
return true;
}

function balance(nums,strict){
let sum=nums.reduce((a,b)=>a+b,0);
if(sum<35 || sum>155)return false;

let odd=nums.filter(n=>n%2).length;
if(odd===0 || odd===5)return false;

let low=nums.filter(n=>n<=17).length;
if(low===0 || low===5)return false;

let zones=[
nums.filter(n=>n>=1&&n<=7).length,
nums.filter(n=>n>=8&&n<=14).length,
nums.filter(n=>n>=15&&n<=21).length,
nums.filter(n=>n>=22&&n<=28).length,
nums.filter(n=>n>=29&&n<=35).length
];

if(Math.max(...zones)>3)return false;

if(strict){
let last=S.draws[S.draws.length-1];
if(last && overlap(nums,last)>3)return false;

let maxPrev=Math.max(0,...S.previous.map(p=>overlap(nums,p)));
if(maxPrev>=4)return false;
}

return true;
}

function ticketScore(nums,type){
let score=0;

nums.forEach(n=>{
let r=S.rows.find(x=>x.n===n);
score+=(r?r.score:0);
});

for(let i=0;i<5;i++){
for(let j=i+1;j<5;j++){
let pk=pairKey(nums[i],nums[j]);
let pr=S.pairRows.find(p=>p.key===pk);
score+=(pr?pr.score:0)*1.25;
score+=(S.pairs[pk]||0)*0.015;
}
}

for(let i=0;i<5;i++){
for(let j=i+1;j<5;j++){
for(let k=j+1;k<5;k++){
let tk=triKey(nums[i],nums[j],nums[k]);
score+=(S.triples[tk]||0)*0.025;
}
}
}

if(type==="4+1 Bridge")score+=.90;
if(type==="3+2 Blend")score+=.65;
if(type==="2+2+1 Balanced")score+=.45;
if(type==="Recovery Wildcard")score+=.35;
if(type==="Safe Fill")score+=.10;

return score;
}

function countType(t){
return S.top40.filter(x=>x.type===t).length;
}
