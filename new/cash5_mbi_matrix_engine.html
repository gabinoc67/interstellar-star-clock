<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Goodbye - Cash 5 Deterministic Matrix Engine</title>
<style>
body{font-family:Arial;margin:0;color:#172033;background:#fff}
header{text-align:center;padding:20px;border-bottom:1px solid #cfd8e6}
main{max-width:1250px;margin:auto;padding:18px}
.card{border:1px solid #cfd8e6;border-radius:14px;padding:15px;margin-bottom:15px;box-shadow:0 6px 18px #0001}
textarea{width:100%;min-height:130px;font-family:Consolas;padding:10px;border-radius:10px;border:1px solid #cfd8e6}
#dataInput{min-height:240px}
button{padding:12px 15px;border:0;border-radius:10px;background:#174ea6;color:white;font-weight:bold;margin:5px;cursor:pointer}
button:nth-child(2){background:#0b6e4f}
button:nth-child(3){background:#403899}
button:nth-child(4){background:#9a6a00}
button:nth-child(5){background:#444}
.good{background:#eaf8f1}
.bad{background:#fff0f0}
.warn{background:#fff8e6}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border:1px solid #cfd8e6;padding:6px;text-align:center}
th{background:#eef3f9}
.scroll{max-height:450px;overflow:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.stat{background:#f7f9fc;border:1px solid #cfd8e6;border-radius:10px;padding:10px}
.small{font-size:12px;color:#5c6b82}
</style>
</head>

<body>
<header>
<h1>Goodbye - Cash 5 Deterministic Matrix Engine</h1>
<p>No-loop optimizer. Same input data = same Top 40 every time.</p>
</header>

<main>
<div class="card">
<h2>1. Official Cash 5 Draw History</h2>
<textarea id="dataInput" placeholder="09/20/2018 01 11 22 24 35"></textarea>

<h2>2. Machine Pretest History</h2>
<textarea id="pretestInput" placeholder="6/25/2026 Test#1 30 - 25 - 3 - 6 - 11"></textarea>

<h2>3. Previous Generated Tickets</h2>
<textarea id="previousTicketsInput" placeholder="Paste old generated tickets here"></textarea>

<button onclick="step1LoadData()">Step 1 Load Data</button>
<button onclick="step2BasicMatrix()">Step 2 Basic Matrix</button>
<button onclick="step3UpgradeLayers()">Step 3 Upgrade Layers</button>
<button onclick="step4TripleEvolution()">Step 4 Triple Evolution</button>
<button onclick="step5BuildCandidates()">Step 5 Build Candidates</button>
<button onclick="step6NoLoopOptimizer()">Step 6 Goodbye Top 40</button>
<button onclick="printTop40()">Print Goodbye Top 40</button>
<button onclick="exportExcel()">Download Excel</button>
</div>

<div id="msg" class="card warn">Start with Step 1.</div>
<div id="summary" class="card"></div>
<div id="matrix" class="card"></div>
<div id="upgrade" class="card"></div>
<div id="evolution" class="card"></div>
<div id="candidates" class="card"></div>
<div id="optimizer" class="card"></div>
<div id="top40" class="card"></div>
</main>

<script>
const MIN=1;
const MAX=35;
const MAX_CANDIDATES=350;
const PORTFOLIO_SIZE=40;

let S={
draws:[],
pretests:[],
previous:[],
basic:null,
position:null,
position20:null,
cluster:null,
osc:null,
pairMomentum:null,
tripleEvolution:null,
rows:[],
candidates:[],
top40:[],
optimizer:null
};

function msg(t,cls="warn"){
document.getElementById("msg").className="card "+cls;
document.getElementById("msg").innerHTML=t;
}

function fmt(a){
return a.slice().sort((x,y)=>x-y).map(n=>String(n).padStart(2,"0")).join(" - ");
}

function key(a){
return a.slice().sort((x,y)=>x-y).join("-");
}

function pairKey(a,b){
return a<b?a+"-"+b:b+"-"+a;
}

function triKey(a,b,c){
return [a,b,c].sort((x,y)=>x-y).join("-");
}

function avg(a){
return a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
}

function norm(v,min,max){
return max===min?0:Math.max(0,Math.min(1,(v-min)/(max-min)));
}

function parseLines(raw){
if(!raw.trim())return [];
let out=[];

raw.split(/\n+/).forEach(line=>{
let nums=(line.match(/\d+/g)||[]).map(Number).filter(n=>n>=1&&n<=35);

if(nums.length>=5){
let d=[...new Set(nums.slice(-5))].sort((a,b)=>a-b);
if(d.length===5)out.push(d);
}
});

return out;
}

function overlap(a,b){
return a.filter(n=>b.includes(n)).length;
}

function prevOverlap(t){
return Math.max(0,...S.previous.map(p=>overlap(t,p)));
}

function step1LoadData(){
S.draws=parseLines(document.getElementById("dataInput").value);
S.pretests=parseLines(document.getElementById("pretestInput").value).slice(0,80);
S.previous=parseLines(document.getElementById("previousTicketsInput").value);

S.basic=null;
S.position=null;
S.position20=null;
S.cluster=null;
S.osc=null;
S.pairMomentum=null;
S.tripleEvolution=null;
S.rows=[];
S.candidates=[];
S.top40=[];
S.optimizer=null;

document.getElementById("matrix").innerHTML="";
document.getElementById("upgrade").innerHTML="";
document.getElementById("evolution").innerHTML="";
document.getElementById("candidates").innerHTML="";
document.getElementById("optimizer").innerHTML="";
document.getElementById("top40").innerHTML="";

if(S.draws.length<20){
msg("Need at least 20 official draws.","bad");
return;
}

document.getElementById("summary").innerHTML=
`<h2>Loaded Data</h2>
<div class="grid">
<div class="stat"><b>${S.draws.length}</b><br>Official draws</div>
<div class="stat"><b>${S.pretests.length}</b><br>Pretests loaded</div>
<div class="stat"><b>${S.previous.length}</b><br>Previous tickets loaded</div>
<div class="stat"><b>${fmt(S.draws[S.draws.length-1])}</b><br>Last draw bridge only</div>
</div>`;

msg("Step 1 complete. Now run Step 2.","good");
}

function step2BasicMatrix(){
if(!S.draws.length){
msg("Run Step 1 first.","bad");
return;
}

let total=S.draws.length;
let freq=Array(36).fill(0);
let last=Array(36).fill(-1);
let gaps=Array.from({length:36},()=>[]);
let pairs={};
let triples={};

S.draws.forEach((d,i)=>{
d.forEach(n=>{
freq[n]++;
if(last[n]>=0)gaps[n].push(i-last[n]);
last[n]=i;
});

for(let a=0;a<5;a++){
for(let b=a+1;b<5;b++){
let pk=pairKey(d[a],d[b]);
pairs[pk]=(pairs[pk]||0)+1;
}
}

for(let a=0;a<5;a++){
for(let b=a+1;b<5;b++){
for(let c=b+1;c<5;c++){
let tk=triKey(d[a],d[b],d[c]);
triples[tk]=(triples[tk]||0)+1;
}
}
}
});

let avgFreq=total*5/35;
S.basic={freq,last,gaps,pairs,triples,total};

let rows=[];
for(let n=1;n<=35;n++){
let delay=last[n]<0?total:total-1-last[n];
let gap=avg(gaps[n])||total;
let hot=freq[n]/avgFreq;
let time=(delay+1)/(gap+1);

rows.push({
n:n,
freq:freq[n],
delay:delay,
gap:gap,
hot:hot,
time:time,
score:.35*norm(hot,0,2.5)+.35*norm(time,0,3.5)
});
}

rows.sort((a,b)=>b.score-a.score || a.n-b.n);
S.rows=rows;

document.getElementById("matrix").innerHTML=
"<h2>Basic Matrix</h2>"+
"<div class='scroll'><table>"+
"<tr><th>Rank</th><th>#</th><th>Freq</th><th>Delay</th><th>Gap</th><th>Hot</th><th>Time</th><th>Base Score</th></tr>"+
rows.map((r,i)=>`
<tr>
<td>${i+1}</td>
<td><b>${String(r.n).padStart(2,"0")}</b></td>
<td>${r.freq}</td>
<td>${r.delay}</td>
<td>${r.gap.toFixed(1)}</td>
<td>${r.hot.toFixed(2)}</td>
<td>${r.time.toFixed(2)}</td>
<td>${r.score.toFixed(3)}</td>
</tr>`).join("")+
"</table></div>";

msg("Step 2 complete. Now run Step 3.","good");
}
  function step3UpgradeLayers(){
if(!S.basic){
msg("Run Step 2 first.","bad");
return;
}

S.position=makePosition();
S.position20=makePosition20();
S.cluster=makeCluster();
S.osc=makeOscillation();
S.pairMomentum=makePairMomentum();

S.rows.forEach(r=>{
let n=r.n;
r.posScore=S.position20[n].confidence;
r.clusterScore=S.cluster[n].centerPower;
r.oscScore=S.osc[n].score;
r.pairMom=S.pairMomentum.byNum[n].score;

r.score+=
.18*r.posScore+
.18*r.clusterScore+
.12*r.oscScore+
.16*r.pairMom;
});

S.rows.sort((a,b)=>b.score-a.score || a.n-b.n);

document.getElementById("upgrade").innerHTML=
"<h2>Upgrade Layers</h2>"+
"<div class='scroll'><table>"+
"<tr><th>Rank</th><th>#</th><th>Pos 2.0</th><th>Cluster</th><th>Osc</th><th>Pair Mom</th><th>Total Score</th></tr>"+
S.rows.map((r,i)=>`
<tr>
<td>${i+1}</td>
<td><b>${String(r.n).padStart(2,"0")}</b></td>
<td>${r.posScore.toFixed(3)}</td>
<td>${r.clusterScore.toFixed(3)}</td>
<td>${r.oscScore.toFixed(3)}</td>
<td>${r.pairMom.toFixed(3)}</td>
<td>${r.score.toFixed(3)}</td>
</tr>`).join("")+
"</table></div>";

msg("Step 3 complete. Now run Step 4.","good");
}

function makePosition(){
let counts=Array.from({length:36},()=>Array(5).fill(0));

S.draws.forEach(d=>{
d.slice().sort((a,b)=>a-b).forEach((n,i)=>{
counts[n][i]++;
});
});

return counts;
}

function makePosition20(){
let out={};

for(let n=1;n<=35;n++){
out[n]={best:0,confidence:0};
}

[10,20,50].forEach((w,wi)=>{
let weight=wi===0?.45:wi===1?.35:.20;
let slice=S.draws.slice(-Math.min(w,S.draws.length));

for(let n=1;n<=35;n++){
let c=Array(5).fill(0);
let app=0;

slice.forEach(d=>{
d.slice().sort((a,b)=>a-b).forEach((x,i)=>{
if(x===n){
c[i]++;
app++;
}
});
});

let probs=c.map(x=>app?x/app:0);

probs.forEach((p,i)=>{
out[n]["p"+i]=(out[n]["p"+i]||0)+p*weight;
});
}
});

for(let n=1;n<=35;n++){
let arr=[0,1,2,3,4].map(i=>out[n]["p"+i]||0);
let sorted=arr.slice().sort((a,b)=>b-a);
out[n].best=arr.indexOf(sorted[0]);
out[n].confidence=sorted[0]-(sorted[1]||0);
}

return out;
}

function makeCluster(){
let out={};

for(let n=1;n<=35;n++){
out[n]={centerPower:0};
}

[
{w:10,wt:.45},
{w:25,wt:.35},
{w:60,wt:.20}
].forEach(o=>{
let f=Array(36).fill(0);
let slice=S.draws.slice(-Math.min(o.w,S.draws.length));

slice.forEach(d=>{
d.forEach(n=>f[n]++);
});

for(let n=1;n<=35;n++){
let left=f[n-1]||0;
let mid=f[n]||0;
let right=f[n+1]||0;

let cluster=(left*.75+mid*1.25+right*.75)/(slice.length||1);
let center=mid/(left+mid+right+1);

out[n].centerPower+=(cluster*.6+center*.4)*o.wt;
}
});

return out;
}

function makeOscillation(){
let out={};

for(let n=1;n<=35;n++){
out[n]={score:0};
}

let r=S.draws.slice(-Math.min(25,S.draws.length));

for(let n=1;n<=35;n++){
let wave=0;

for(let i=1;i<r.length;i++){
if(r[i-1].includes(n-1)&&r[i].includes(n))wave+=1.3;
if(r[i-1].includes(n+1)&&r[i].includes(n))wave+=1.3;
if(r[i].includes(n-1)||r[i].includes(n+1))wave+=.25;
}

out[n].score=wave/(r.length||1);
}

return out;
}

function makePairMomentum(){
let windows=[5,10,20,60].map(w=>pairWindow(w));
let pairs=[];
let byPair={};
let byNum={};

for(let n=1;n<=35;n++){
byNum[n]={score:0,pair:""};
}

let keys=new Set();

windows.forEach(w=>{
Object.keys(w.c).forEach(k=>keys.add(k));
});

keys.forEach(k=>{
let r5=(windows[0].c[k]||0)/windows[0].s;
let r10=(windows[1].c[k]||0)/windows[1].s;
let r20=(windows[2].c[k]||0)/windows[2].s;
let r60=(windows[3].c[k]||0)/windows[3].s;

let accel=(r5-r20)+(r10-r60);

let score=
r5*.42+
r10*.30+
r20*.18+
r60*.10+
Math.max(0,accel)*1.25;

let nums=k.split("-").map(Number);
let row={key:k,nums:nums,score:score,accel:accel};

pairs.push(row);
byPair[k]=row;

nums.forEach(n=>{
if(score>byNum[n].score){
byNum[n]={score:score,pair:k};
}
});
});

pairs.sort((a,b)=>b.score-a.score || a.key.localeCompare(b.key));

return {pairs:pairs,byPair:byPair,byNum:byNum};
}

function pairWindow(w){
let c={};
let slice=S.draws.slice(-Math.min(w,S.draws.length));

slice.forEach(d=>{
for(let i=0;i<5;i++){
for(let j=i+1;j<5;j++){
let pk=pairKey(d[i],d[j]);
c[pk]=(c[pk]||0)+1;
}
}
});

return {c:c,s:slice.length||1};
}

function step4TripleEvolution(){
if(!S.pairMomentum){
msg("Run Step 3 first.","bad");
return;
}

let rows=[];

S.pairMomentum.pairs.slice(0,70).forEach(p=>{
let nums=p.nums;

for(let third=1;third<=35;third++){
if(nums.includes(third))continue;

let hist=0;
let total=0;

S.draws.forEach(d=>{
if(d.includes(nums[0])&&d.includes(nums[1])){
total++;
if(d.includes(third))hist++;
}
});

let histRate=total?hist/total:0;

let score=
.30*p.score+
.25*histRate+
.18*S.position20[third].confidence+
.17*S.cluster[third].centerPower+
.10*S.osc[third].score;

rows.push({
pair:p.key,
third:third,
triple:[nums[0],nums[1],third].sort((a,b)=>a-b),
hist:hist,
total:total,
histRate:histRate,
score:score
});
}
});

rows.sort((a,b)=>b.score-a.score || triKey(...a.triple).localeCompare(triKey(...b.triple)));
S.tripleEvolution=rows.slice(0,140);

S.rows.forEach(r=>{
let best=S.tripleEvolution.find(e=>e.third===r.n);
r.evoScore=best?best.score:0;
r.score+=.18*r.evoScore;
});

S.rows.sort((a,b)=>b.score-a.score || a.n-b.n);

document.getElementById("evolution").innerHTML=
"<h2>Pair-to-Triple Evolution Matrix</h2>"+
"<div class='scroll'><table>"+
"<tr><th>Rank</th><th>Pair</th><th>Third</th><th>Triple</th><th>Hist</th><th>Completion</th><th>Score</th></tr>"+
S.tripleEvolution.slice(0,50).map((e,i)=>`
<tr>
<td>${i+1}</td>
<td>${e.pair}</td>
<td><b>${String(e.third).padStart(2,"0")}</b></td>
<td><b>${fmt(e.triple)}</b></td>
<td>${e.hist}/${e.total}</td>
<td>${(e.histRate*100).toFixed(1)}%</td>
<td>${e.score.toFixed(3)}</td>
</tr>`).join("")+
"</table></div>";

msg("Step 4 complete. Now run Step 5.","good");
}

function step5BuildCandidates(){
if(!S.tripleEvolution){
msg("Run Step 4 first.","bad");
return;
}

let seen=new Set();
let out=[];
let topPool=S.rows.slice(0,15).map(r=>r.n);
let broadPool=S.rows.slice(0,24).map(r=>r.n);

function add(nums,type){
nums=[...new Set(nums)].filter(n=>n>=1&&n<=35).sort((a,b)=>a-b);

if(nums.length!==5)return;
if(!balance(nums))return;

let k=key(nums);
if(seen.has(k))return;

seen.add(k);
out.push({
nums:nums,
type:type,
score:ticketScore(nums,type)
});
}

S.tripleEvolution.slice(0,100).forEach((e,i)=>{
add([...e.triple,broadPool[(i+3)%broadPool.length],broadPool[(i+10)%broadPool.length]],"Triple Evolution");
add([...e.triple,topPool[(i+2)%topPool.length],topPool[(i+7)%topPool.length]],"Top 15 Triple Blend");
});

S.pairMomentum.pairs.slice(0,80).forEach((p,i)=>{
add([...p.nums,broadPool[(i+2)%broadPool.length],broadPool[(i+8)%broadPool.length],broadPool[(i+14)%broadPool.length]],"Pair Momentum");
add([...p.nums,topPool[(i+1)%topPool.length],topPool[(i+5)%topPool.length],topPool[(i+9)%topPool.length]],"Top 15 Pair Blend");
});

S.rows.slice(0,25).forEach((r,i)=>{
add([
r.n,
broadPool[(i+5)%broadPool.length],
broadPool[(i+10)%broadPool.length],
broadPool[(i+15)%broadPool.length],
broadPool[(i+20)%broadPool.length]
],"Rank Spread");
});

for(let a=0;a<topPool.length;a++){
for(let b=a+1;b<topPool.length;b++){
for(let c=b+1;c<topPool.length;c++){
let triple=[topPool[a],topPool[b],topPool[c]];
let x=broadPool[(a+b+c+3)%broadPool.length];
let y=broadPool[(a*2+b+c+9)%broadPool.length];
add([...triple,x,y],"Top 15 Simulation Base");
}
}
}

S.candidates=out.sort((a,b)=>b.score-a.score || key(a.nums).localeCompare(key(b.nums))).slice(0,MAX_CANDIDATES);

document.getElementById("candidates").innerHTML=
`<h2>Candidate Pool</h2>
<p><b>${S.candidates.length}</b> safe candidates built.</p>
<p class="small">This version uses a no-loop final optimizer to avoid browser freezing.</p>`;

msg("Step 5 complete. Now run Step 6 Goodbye Top 40.","good");
}

function ticketScore(nums,type){
let score=0;

nums.forEach(n=>{
let r=S.rows.find(x=>x.n===n);
score+=(r?r.score:0);
});

for(let i=0;i<5;i++){
for(let j=i+1;j<5;j++){
let pk=pairKey(nums[i],nums[j]);
score+=(S.pairMomentum.byPair[pk]?.score||0)*1.20;
}
}

for(let i=0;i<5;i++){
for(let j=i+1;j<5;j++){
for(let k=j+1;k<5;k++){
let tk=triKey(nums[i],nums[j],nums[k]);
score+=(S.basic.triples[tk]||0)*0.03;
}
}
}

if(type.includes("Triple"))score+=.50;
if(type.includes("Top 15"))score+=.30;
if(type.includes("Pair"))score+=.22;

return score;
}

function balance(t){
let sum=t.reduce((a,b)=>a+b,0);
if(sum<35||sum>155)return false;

let odd=t.filter(n=>n%2).length;
if(odd===0||odd===5)return false;

let low=t.filter(n=>n<=17).length;
if(low===0||low===5)return false;

if(prevOverlap(t)>=4)return false;

let last=S.draws[S.draws.length-1];
if(last&&overlap(t,last)>3)return false;

return true;
}
  function step6NoLoopOptimizer(){
if(!S.candidates.length){
msg("Run Step 5 first.","bad");
return;
}

let base=S.candidates.slice().sort((a,b)=>b.score-a.score || key(a.nums).localeCompare(key(b.nums)));

let usage=Array(36).fill(0);
let pairUse={};
let triUse={};
let top=[];

for(const c of base){
if(top.length>=PORTFOLIO_SIZE)break;
if(!canAddToPortfolio(c,top,usage,pairUse,triUse))continue;

top.push(c);
c.nums.forEach(n=>usage[n]++);
ticketPairs(c.nums).forEach(p=>pairUse[p]=(pairUse[p]||0)+1);
ticketTriples(c.nums).forEach(t=>triUse[t]=(triUse[t]||0)+1);
}

if(top.length<PORTFOLIO_SIZE){
for(const c of base){
if(top.length>=PORTFOLIO_SIZE)break;
if(top.some(x=>key(x.nums)===key(c.nums)))continue;
if(c.nums.some(n=>usage[n]>=14))continue;
if(top.some(t=>overlap(t.nums,c.nums)>=5))continue;

top.push(c);
c.nums.forEach(n=>usage[n]++);
ticketPairs(c.nums).forEach(p=>pairUse[p]=(pairUse[p]||0)+1);
ticketTriples(c.nums).forEach(t=>triUse[t]=(triUse[t]||0)+1);
}
}

S.top40=top;
let finalScore=portfolioScore(top,usage,pairUse,triUse);
S.optimizer={score:finalScore};

document.getElementById("optimizer").innerHTML=
`<h2>Goodbye No-Loop Portfolio Optimizer</h2>
<div class="grid">
<div class="stat"><b>No repeated loop</b><br>Browser-safe final optimizer</div>
<div class="stat"><b>${S.candidates.length}</b><br>Candidate tickets reviewed</div>
<div class="stat"><b>${finalScore.toFixed(3)}</b><br>Portfolio score</div>
<div class="stat"><b>${S.rows.slice(0,15).map(r=>String(r.n).padStart(2,"0")).join(" - ")}</b><br>Top 15 core pool</div>
</div>
<p class="small">This version is deterministic and avoids the freeze problem. Same input produces the same Top 40 every time.</p>`;

document.getElementById("top40").innerHTML=
"<h2>Goodbye Top 40 Tickets - Deterministic No-Loop</h2>"+
"<div class='scroll'><table>"+
"<tr><th>#</th><th>Numbers</th><th>Type</th><th>Ticket Score</th><th>Portfolio Role</th></tr>"+
S.top40.map((t,i)=>`
<tr>
<td>${i+1}</td>
<td><b>${fmt(t.nums)}</b></td>
<td>${t.type}</td>
<td>${t.score.toFixed(3)}</td>
<td>${portfolioRole(t.nums,usage)}</td>
</tr>`).join("")+
"</table></div>"+
"<h2>Number Usage</h2>"+
"<div class='scroll'><table>"+
"<tr><th>Number</th><th>Used</th></tr>"+
Array.from({length:35},(_,i)=>i+1).map(n=>`
<tr>
<td><b>${String(n).padStart(2,"0")}</b></td>
<td>${usage[n]}</td>
</tr>`).join("")+
"</table></div>";

msg("Step 6 complete. Goodbye Top 40 created without browser-freezing loops.","good");
}

function canAddToPortfolio(c,portfolio,usage,pairUse,triUse){
if(c.nums.some(n=>usage[n]>=13))return false;
if(portfolio.some(t=>overlap(t.nums,c.nums)>=4))return false;

let pairs=ticketPairs(c.nums);
let triples=ticketTriples(c.nums);

if(pairs.some(p=>(pairUse[p]||0)>=3))return false;
if(triples.some(t=>(triUse[t]||0)>=1))return false;

let odd=c.nums.filter(n=>n%2).length;
if(odd<1||odd>4)return false;

let zones=[
c.nums.filter(n=>n>=1&&n<=7).length,
c.nums.filter(n=>n>=8&&n<=14).length,
c.nums.filter(n=>n>=15&&n<=21).length,
c.nums.filter(n=>n>=22&&n<=28).length,
c.nums.filter(n=>n>=29&&n<=35).length
];

if(Math.max(...zones)>3)return false;

return true;
}

function portfolioScore(portfolio,usage,pairUse,triUse){
let score=0;

portfolio.forEach(t=>{
score+=t.score;
});

let usedNums=usage.filter((x,i)=>i>0&&x>0).length;
score+=usedNums*2.25;

let target=PORTFOLIO_SIZE*5/35;

for(let n=1;n<=35;n++){
score-=Math.abs(usage[n]-target)*.55;

if(usage[n]>13){
score-=(usage[n]-13)*4.0;
}

if(usage[n]===0){
score-=2.0;
}
}

Object.values(pairUse).forEach(v=>{
if(v===1)score+=.08;
if(v>3)score-=(v-3)*1.75;
});

Object.values(triUse).forEach(v=>{
if(v>1)score-=(v-1)*4.5;
});

for(let i=0;i<portfolio.length;i++){
for(let j=i+1;j<portfolio.length;j++){
let ov=overlap(portfolio[i].nums,portfolio[j].nums);

if(ov===0)score+=.10;
if(ov===1)score+=.20;
if(ov===2)score+=.10;
if(ov>=3)score-=ov*1.25;
}
}

if(portfolio.length<PORTFOLIO_SIZE){
score-=(PORTFOLIO_SIZE-portfolio.length)*25;
}

return score;
}

function ticketPairs(nums){
let out=[];

for(let i=0;i<5;i++){
for(let j=i+1;j<5;j++){
out.push(pairKey(nums[i],nums[j]));
}
}

return out;
}

function ticketTriples(nums){
let out=[];

for(let i=0;i<5;i++){
for(let j=i+1;j<5;j++){
for(let k=j+1;k<5;k++){
out.push(triKey(nums[i],nums[j],nums[k]));
}
}
}

return out;
}

function portfolioRole(nums,usage){
let top15=S.rows.slice(0,15).map(r=>r.n);
let topHits=nums.filter(n=>top15.includes(n)).length;
let low=nums.filter(n=>n<=17).length;
let high=5-low;

if(topHits>=4)return "Top-core ticket";
if(low>=3)return "Low-side coverage";
if(high>=3)return "High-side coverage";
return "Balanced coverage";
}
