<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cash 5 Step-by-Step Matrix Engine</title>
<style>
body{font-family:Arial;margin:0;color:#172033;background:#fff}
header{text-align:center;padding:20px;border-bottom:1px solid #cfd8e6}
main{max-width:1250px;margin:auto;padding:18px}
.card{border:1px solid #cfd8e6;border-radius:14px;padding:15px;margin-bottom:15px;box-shadow:0 6px 18px #0001}
textarea{width:100%;min-height:130px;font-family:Consolas;padding:10px;border-radius:10px;border:1px solid #cfd8e6}
#dataInput{min-height:240px}
button{padding:12px 15px;border:0;border-radius:10px;background:#174ea6;color:white;font-weight:bold;margin:5px;cursor:pointer}
button:nth-child(2){background:#0b6e4f}
button:nth-child(3){background:#403899}
button:nth-child(4){background:#9a6a00}
button:nth-child(5){background:#444}
.good{background:#eaf8f1}.bad{background:#fff0f0}.warn{background:#fff8e6}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border:1px solid #cfd8e6;padding:6px;text-align:center}
th{background:#eef3f9}
.scroll{max-height:450px;overflow:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.stat{background:#f7f9fc;border:1px solid #cfd8e6;border-radius:10px;padding:10px}
</style>
</head>
<body>
<header>
<h1>Goodbye - Cash 5 Step-by-Step Matrix Engine</h1>
<p>Independent steps: Basic Matrix → Upgrade Layers → Pair-to-Triple Evolution → Candidate Pool → Top 40.</p>
</header>

<main>
<div class="card">
<h2>1. Official Cash 5 Draw History</h2>
<textarea id="dataInput" placeholder="09/20/2018 01 11 22 24 35"></textarea>

<h2>2. Machine Pretest History</h2>
<textarea id="pretestInput" placeholder="6/25/2026 Test#1 30 - 25 - 3 - 6 - 11"></textarea>

<h2>3. Previous Generated Tickets</h2>
<textarea id="previousTicketsInput" placeholder="Paste old generated tickets here"></textarea>

<button onclick="step1LoadData()">Step 1 Load Data</button>
<button onclick="step2BasicMatrix()">Step 2 Basic Matrix</button>
<button onclick="step3UpgradeLayers()">Step 3 Upgrade Layers</button>
<button onclick="step4TripleEvolution()">Step 4 Triple Evolution</button>
<button onclick="step5BuildCandidates()">Step 5 Build Candidates</button>
<button onclick="step6Top40()">Step 6 Generate Top 40</button>
<button onclick="printTop40()">Print Top 40</button>
<button onclick="exportExcel()">Download Excel</button>
</div>

<div id="msg" class="card warn">Start with Step 1.</div>
<div id="summary" class="card"></div>
<div id="matrix" class="card"></div>
<div id="upgrade" class="card"></div>
<div id="evolution" class="card"></div>
<div id="candidates" class="card"></div>
<div id="top40" class="card"></div>
</main>

<script>
const MIN=1,MAX=35;
const POS=["A","B","C","D","E"];
const MAX_CANDIDATES=350;

let S={
draws:[],pretests:[],previous:[],
basic:null,position:null,position20:null,
cluster:null,osc:null,pairMomentum:null,tripleEvolution:null,
rows:[],candidates:[],top40:[]
};

function msg(t,cls="warn"){document.getElementById("msg").className="card "+cls;document.getElementById("msg").innerHTML=t}
function fmt(a){return a.slice().sort((x,y)=>x-y).map(n=>String(n).padStart(2,"0")).join(" - ")}
function key(a){return a.slice().sort((x,y)=>x-y).join("-")}
function pairKey(a,b){return a<b?a+"-"+b:b+"-"+a}
function triKey(a,b,c){return [a,b,c].sort((x,y)=>x-y).join("-")}
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0}
function norm(v,min,max){return max===min?0:Math.max(0,Math.min(1,(v-min)/(max-min)))}

function parseLines(raw){
if(!raw.trim())return [];
let out=[];
raw.split(/\n+/).forEach(line=>{
let nums=(line.match(/\d+/g)||[]).map(Number).filter(n=>n>=1&&n<=35);
if(nums.length>=5){
let d=[...new Set(nums.slice(-5))].sort((a,b)=>a-b);
if(d.length===5)out.push(d);
}
});
return out;
}

function overlap(a,b){return a.filter(n=>b.includes(n)).length}
function prevOverlap(t){return Math.max(0,...S.previous.map(p=>overlap(t,p)))}

function step1LoadData(){
S.draws=parseLines(document.getElementById("dataInput").value);
S.pretests=parseLines(document.getElementById("pretestInput").value).slice(0,80);
S.previous=parseLines(document.getElementById("previousTicketsInput").value);

if(S.draws.length<20){msg("Need at least 20 official draws.","bad");return}

document.getElementById("summary").innerHTML=
`<h2>Loaded Data</h2><div class="grid">
<div class="stat"><b>${S.draws.length}</b><br>Official draws</div>
<div class="stat"><b>${S.pretests.length}</b><br>Pretests</div>
<div class="stat"><b>${S.previous.length}</b><br>Previous tickets</div>
<div class="stat"><b>${fmt(S.draws[S.draws.length-1])}</b><br>Last draw bridge only</div>
</div>`;
msg("Step 1 complete. Now run Step 2.","good");
}

function step2BasicMatrix(){
if(!S.draws.length){msg("Run Step 1 first.","bad");return}

let total=S.draws.length;
let freq=Array(36).fill(0), last=Array(36).fill(-1), gaps=Array.from({length:36},()=>[]);
let pairs={}, triples={};

S.draws.forEach((d,i)=>{
d.forEach(n=>{freq[n]++; if(last[n]>=0)gaps[n].push(i-last[n]); last[n]=i});
for(let a=0;a<5;a++)for(let b=a+1;b<5;b++)pairs[pairKey(d[a],d[b])]=(pairs[pairKey(d[a],d[b])]||0)+1;
for(let a=0;a<5;a++)for(let b=a+1;b<5;b++)for(let c=b+1;c<5;c++)triples[triKey(d[a],d[b],d[c])]=(triples[triKey(d[a],d[b],d[c])]||0)+1;
});

let avgFreq=total*5/35;
S.basic={freq,last,gaps,pairs,triples,total};

let rows=[];
for(let n=1;n<=35;n++){
let delay=last[n]<0?total:total-1-last[n];
let gap=avg(gaps[n])||total;
let hot=freq[n]/avgFreq;
let time=(delay+1)/(gap+1);
rows.push({n,freq:freq[n],delay,gap,hot,time,score:.35*norm(hot,0,2.5)+.35*norm(time,0,3.5)});
}
rows.sort((a,b)=>b.score-a.score);
S.rows=rows;

document.getElementById("matrix").innerHTML="<h2>Basic Matrix</h2><div class='scroll'><table><tr><th>Rank</th><th>#</th><th>Freq</th><th>Delay</th><th>Gap</th><th>Hot</th><th>Time</th></tr>"+
rows.map((r,i)=>`<tr><td>${i+1}</td><td><b>${String(r.n).padStart(2,"0")}</b></td><td>${r.freq}</td><td>${r.delay}</td><td>${r.gap.toFixed(1)}</td><td>${r.hot.toFixed(2)}</td><td>${r.time.toFixed(2)}</td></tr>`).join("")+
"</table></div>";

msg("Step 2 complete. Now run Step 3.","good");
}

function step3UpgradeLayers(){
if(!S.basic){msg("Run Step 2 first.","bad");return}

S.position=makePosition();
S.position20=makePosition20();
S.cluster=makeCluster();
S.osc=makeOscillation();
S.pairMomentum=makePairMomentum();

S.rows.forEach(r=>{
let n=r.n;
r.posScore=S.position20[n].confidence;
r.clusterScore=S.cluster[n].centerPower;
r.oscScore=S.osc[n].score;
r.pairMom=S.pairMomentum.byNum[n].score;
r.score+=.18*r.posScore+.18*r.clusterScore+.12*r.oscScore+.16*r.pairMom;
});
S.rows.sort((a,b)=>b.score-a.score);

document.getElementById("upgrade").innerHTML="<h2>Upgrade Layers</h2><div class='scroll'><table><tr><th>Rank</th><th>#</th><th>Pos 2.0</th><th>Cluster</th><th>Osc</th><th>Pair Mom</th><th>Total</th></tr>"+
S.rows.map((r,i)=>`<tr><td>${i+1}</td><td><b>${String(r.n).padStart(2,"0")}</b></td><td>${r.posScore.toFixed(3)}</td><td>${r.clusterScore.toFixed(3)}</td><td>${r.oscScore.toFixed(3)}</td><td>${r.pairMom.toFixed(3)}</td><td>${r.score.toFixed(3)}</td></tr>`).join("")+
"</table></div>";

msg("Step 3 complete. Now run Step 4.","good");
}

function makePosition(){
let counts=Array.from({length:36},()=>Array(5).fill(0));
S.draws.forEach(d=>d.slice().sort((a,b)=>a-b).forEach((n,i)=>counts[n][i]++));
return counts;
}

function makePosition20(){
let out={};
for(let n=1;n<=35;n++)out[n]={best:0,confidence:0};
[10,20,50].forEach((w,wi)=>{
let weight=wi===0?.45:wi===1?.35:.20;
let slice=S.draws.slice(-Math.min(w,S.draws.length));
for(let n=1;n<=35;n++){
let c=Array(5).fill(0), app=0;
slice.forEach(d=>d.slice().sort((a,b)=>a-b).forEach((x,i)=>{if(x===n){c[i]++;app++}}));
let probs=c.map(x=>app?x/app:0);
probs.forEach((p,i)=>out[n]["p"+i]=(out[n]["p"+i]||0)+p*weight);
}
});
for(let n=1;n<=35;n++){
let arr=[0,1,2,3,4].map(i=>out[n]["p"+i]||0);
let sorted=arr.slice().sort((a,b)=>b-a);
out[n].best=arr.indexOf(sorted[0]);
out[n].confidence=sorted[0]-(sorted[1]||0);
}
return out;
}

function makeCluster(){
let out={};
for(let n=1;n<=35;n++)out[n]={centerPower:0};
[{w:10,wt:.45},{w:25,wt:.35},{w:60,wt:.20}].forEach(o=>{
let f=Array(36).fill(0), slice=S.draws.slice(-Math.min(o.w,S.draws.length));
slice.forEach(d=>d.forEach(n=>f[n]++));
for(let n=1;n<=35;n++){
let left=f[n-1]||0, mid=f[n]||0, right=f[n+1]||0;
let cluster=(left*.75+mid*1.25+right*.75)/(slice.length||1);
let center=mid/(left+mid+right+1);
out[n].centerPower+=(cluster*.6+center*.4)*o.wt;
}
});
return out;
}

function makeOscillation(){
let out={};
for(let n=1;n<=35;n++)out[n]={score:0};
let r=S.draws.slice(-Math.min(25,S.draws.length));
for(let n=1;n<=35;n++){
let wave=0;
for(let i=1;i<r.length;i++){
if(r[i-1].includes(n-1)&&r[i].includes(n))wave+=1.3;
if(r[i-1].includes(n+1)&&r[i].includes(n))wave+=1.3;
if(r[i].includes(n-1)||r[i].includes(n+1))wave+=.25;
}
out[n].score=wave/(r.length||1);
}
return out;
}

function makePairMomentum(){
let windows=[5,10,20,60].map(w=>pairWindow(w));
let pairs=[], byPair={}, byNum={};
for(let n=1;n<=35;n++)byNum[n]={score:0,pair:""};

let keys=new Set();
windows.forEach(w=>Object.keys(w.c).forEach(k=>keys.add(k)));

keys.forEach(k=>{
let r5=(windows[0].c[k]||0)/windows[0].s;
let r10=(windows[1].c[k]||0)/windows[1].s;
let r20=(windows[2].c[k]||0)/windows[2].s;
let r60=(windows[3].c[k]||0)/windows[3].s;
let accel=(r5-r20)+(r10-r60);
let score=r5*.42+r10*.30+r20*.18+r60*.10+Math.max(0,accel)*1.25;
let nums=k.split("-").map(Number);
let row={key:k,nums,score,accel};
pairs.push(row);byPair[k]=row;
nums.forEach(n=>{if(score>byNum[n].score)byNum[n]={score,pair:k}});
});
pairs.sort((a,b)=>b.score-a.score);
return {pairs,byPair,byNum};
}

function pairWindow(w){
let c={}, slice=S.draws.slice(-Math.min(w,S.draws.length));
slice.forEach(d=>{for(let i=0;i<5;i++)for(let j=i+1;j<5;j++)c[pairKey(d[i],d[j])]=(c[pairKey(d[i],d[j])]||0)+1});
return {c,s:slice.length||1};
}

function step4TripleEvolution(){
if(!S.pairMomentum){msg("Run Step 3 first.","bad");return}

let rows=[];
S.pairMomentum.pairs.slice(0,80).forEach(p=>{
let nums=p.nums;
for(let third=1;third<=35;third++){
if(nums.includes(third))continue;
let hist=0,total=0;
S.draws.forEach(d=>{
if(d.includes(nums[0])&&d.includes(nums[1])){
total++;
if(d.includes(third))hist++;
}
});
let histRate=total?hist/total:0;
let score=.30*p.score+.25*histRate+.18*S.position20[third].confidence+.17*S.cluster[third].centerPower+.10*S.osc[third].score;
rows.push({pair:p.key,third,triple:[nums[0],nums[1],third].sort((a,b)=>a-b),hist,total,histRate,score});
}
});
rows.sort((a,b)=>b.score-a.score);
S.tripleEvolution=rows.slice(0,180);

S.rows.forEach(r=>{
let best=S.tripleEvolution.find(e=>e.third===r.n);
r.evoScore=best?best.score:0;
r.score+=.18*r.evoScore;
});
S.rows.sort((a,b)=>b.score-a.score);

document.getElementById("evolution").innerHTML="<h2>Pair-to-Triple Evolution Matrix</h2><div class='scroll'><table><tr><th>Rank</th><th>Pair</th><th>Third</th><th>Triple</th><th>Hist</th><th>Completion</th><th>Score</th></tr>"+
S.tripleEvolution.slice(0,60).map((e,i)=>`<tr><td>${i+1}</td><td>${e.pair}</td><td><b>${String(e.third).padStart(2,"0")}</b></td><td><b>${fmt(e.triple)}</b></td><td>${e.hist}/${e.total}</td><td>${(e.histRate*100).toFixed(1)}%</td><td>${e.score.toFixed(3)}</td></tr>`).join("")+
"</table></div>";

msg("Step 4 complete. Now run Step 5.","good");
}

function step5BuildCandidates(){
if(!S.tripleEvolution){msg("Run Step 4 first.","bad");return}

let seen=new Set(), out=[];
function add(nums,type){
nums=[...new Set(nums)].filter(n=>n>=1&&n<=35).sort((a,b)=>a-b);
if(nums.length!==5)return;
if(!balance(nums))return;
let k=key(nums); if(seen.has(k))return;
seen.add(k); out.push({nums,type,score:0});
}

let pool=S.rows.slice(0,25).map(r=>r.n);

S.tripleEvolution.slice(0,120).forEach((e,i)=>{
add([...e.triple,pool[(i+3)%pool.length],pool[(i+9)%pool.length]],"Triple Evolution");
});

S.pairMomentum.pairs.slice(0,80).forEach((p,i)=>{
add([...p.nums,pool[(i+2)%pool.length],pool[(i+8)%pool.length],pool[(i+14)%pool.length]],"Pair Momentum");
});

S.rows.slice(0,30).forEach((r,i)=>{
add([r.n,pool[(i+5)%pool.length],pool[(i+10)%pool.length],pool[(i+15)%pool.length],pool[(i+20)%pool.length]],"Rank Spread");
});

S.candidates=out.slice(0,MAX_CANDIDATES);

document.getElementById("candidates").innerHTML=`<h2>Candidate Pool</h2><p>${S.candidates.length} safe candidates built. No large loop. No endless generation.</p>`;
msg("Step 5 complete. Now run Step 6.","good");
}

function balance(t){
let sum=t.reduce((a,b)=>a+b,0);
if(sum<35||sum>155)return false;
let odd=t.filter(n=>n%2).length;
if(odd===0||odd===5)return false;
let low=t.filter(n=>n<=17).length;
if(low===0||low===5)return false;
if(prevOverlap(t)>=4)return false;
let last=S.draws[S.draws.length-1];
if(last&&overlap(t,last)>3)return false;
return true;
}

function step6Top40(){
if(!S.candidates.length){msg("Run Step 5 first.","bad");return}

let usage=Array(36).fill(0);

S.candidates.forEach(c=>{
let score=0;
c.nums.forEach(n=>{
let r=S.rows.find(x=>x.n===n);
score+=(r?r.score:0);
score-=usage[n]*.05;
});
if(c.type==="Triple Evolution")score+=.5;
c.score=score;
});

S.candidates.sort((a,b)=>b.score-a.score);

let top=[];
for(const c of S.candidates){
if(top.length>=40)break;
if(c.nums.some(n=>usage[n]>=14))continue;
if(top.some(t=>overlap(t.nums,c.nums)>=4))continue;
top.push(c);
c.nums.forEach(n=>usage[n]++);
}

S.top40=top;

document.getElementById("top40").innerHTML="<h2>Top 40 Tickets</h2><div class='scroll'><table><tr><th>#</th><th>Numbers</th><th>Type</th><th>Score</th></tr>"+
top.map((t,i)=>`<tr><td>${i+1}</td><td><b>${fmt(t.nums)}</b></td><td>${t.type}</td><td>${t.score.toFixed(3)}</td></tr>`).join("")+
"</table></div>";

msg("Top 40 complete. This version runs step-by-step and avoids browser freezing.","good");
}

function printTop40(){window.print()}

function exportExcel(){
let html="<table border='1'><tr><th>#</th><th>Numbers</th><th>Type</th><th>Score</th></tr>";
S.top40.forEach((t,i)=>html+=`<tr><td>${i+1}</td><td>${fmt(t.nums)}</td><td>${t.type}</td><td>${t.score.toFixed(3)}</td></tr>`);
html+="</table>";
let blob=new Blob([html],{type:"application/vnd.ms-excel"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="Cash5_Step_By_Step_Top40.xls";
a.click();
}
</script>
</body>
</html>
