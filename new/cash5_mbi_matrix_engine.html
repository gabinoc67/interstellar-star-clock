<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cash 5 Clean Matrix Engine</title>
<style>
body{font-family:Arial;margin:0;color:#172033;background:#fff}
header{text-align:center;padding:20px;border-bottom:1px solid #cfd8e6}
main{max-width:1250px;margin:auto;padding:18px}
.card{border:1px solid #cfd8e6;border-radius:14px;padding:15px;margin-bottom:15px;box-shadow:0 6px 18px #0001}
textarea{width:100%;min-height:130px;font-family:Consolas;padding:10px;border-radius:10px;border:1px solid #cfd8e6}
#dataInput{min-height:240px}
button{padding:12px 15px;border:0;border-radius:10px;background:#174ea6;color:white;font-weight:bold;margin:5px;cursor:pointer}
.good{background:#eaf8f1}
.bad{background:#fff0f0}
.warn{background:#fff8e6}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border:1px solid #cfd8e6;padding:6px;text-align:center}
th{background:#eef3f9}
.scroll{max-height:460px;overflow:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.stat{background:#f7f9fc;border:1px solid #cfd8e6;border-radius:10px;padding:10px}
.small{font-size:12px;color:#5c6b82}
</style>
</head>

<body>
<header>
<h1>Cash 5 Clean Matrix Engine</h1>
<p>Anchor Cap + Pair Bridge + Recovery Top 40</p>
</header>

<main>
<div class="card">
<h2>1. Official Cash 5 Draw History</h2>
<textarea id="dataInput" placeholder="6/26/2026 01 11 22 24 35"></textarea>

<h2>2. Previous Generated Tickets</h2>
<textarea id="previousTicketsInput" placeholder="Paste previous tickets here"></textarea>

<button onclick="loadData()">Step 1 Load Data</button>
<button onclick="basicMatrix()">Step 2 Basic Matrix</button>
<button onclick="upgradeMatrix()">Step 3 Upgrade Matrix</button>
<button onclick="buildPools()">Step 4 Build Pools</button>
<button onclick="buildTop40()">Step 5 Build Top 40</button>
<button onclick="window.print()">Print</button>
<button onclick="exportExcel()">Excel</button>
</div>

<div id="msg" class="card warn">Start with Step 1.</div>
<div id="summary" class="card"></div>
<div id="matrix" class="card"></div>
<div id="upgrade" class="card"></div>
<div id="pools" class="card"></div>
<div id="top40" class="card"></div>
</main>

<script>
var PORTFOLIO_SIZE=40;
var HARD_CAP=18;
var STRONG_CAP=16;
var SECONDARY_CAP=10;
var WILD_CAP=8;

var S={
draws:[],
previous:[],
freq:[],
last:[],
gaps:[],
pairs:{},
triples:{},
rows:[],
pairRows:[],
strong:[],
secondary:[],
wild:[],
recovery:[],
bridge4:[],
top40:[],
usage:[],
pairUse:{},
triUse:{},
log:[]
};

function resetState(){
S.freq=Array(36).fill(0);
S.last=Array(36).fill(-1);
S.gaps=[];
for(var i=0;i<36;i++){S.gaps.push([]);}
S.pairs={};
S.triples={};
S.rows=[];
S.pairRows=[];
S.strong=[];
S.secondary=[];
S.wild=[];
S.recovery=[];
S.bridge4=[];
S.top40=[];
S.usage=Array(36).fill(0);
S.pairUse={};
S.triUse={};
S.log=[];
}

function msg(t,cls){
if(!cls){cls="warn";}
document.getElementById("msg").className="card "+cls;
document.getElementById("msg").innerHTML=t;
}

function fmt(a){
return a.slice().sort(function(x,y){return x-y;}).map(function(n){
return String(n).padStart(2,"0");
}).join(" - ");
}

function key(a){
return a.slice().sort(function(x,y){return x-y;}).join("-");
}

function pairKey(a,b){
return a<b ? a+"-"+b : b+"-"+a;
}

function triKey(a,b,c){
return [a,b,c].sort(function(x,y){return x-y;}).join("-");
}

function avg(a){
if(!a.length){return 0;}
var s=0;
for(var i=0;i<a.length;i++){s+=a[i];}
return s/a.length;
}

function norm(v,min,max){
if(max===min){return 0;}
var x=(v-min)/(max-min);
if(x<0){x=0;}
if(x>1){x=1;}
return x;
}

function overlap(a,b){
var c=0;
for(var i=0;i<a.length;i++){
if(b.indexOf(a[i])>=0){c++;}
}
return c;
}

function parseLines(raw){
var out=[];
if(!raw || !raw.trim()){return out;}
var lines=raw.split(/\n+/);

for(var i=0;i<lines.length;i++){
var m=lines[i].match(/\d+/g);
if(!m){continue;}
var nums=[];
for(var j=0;j<m.length;j++){
var n=parseInt(m[j],10);
if(n>=1 && n<=35){nums.push(n);}
}
if(nums.length>=5){
var last5=nums.slice(nums.length-5);
var unique=[];
for(var k=0;k<last5.length;k++){
if(unique.indexOf(last5[k])<0){unique.push(last5[k]);}
}
unique.sort(function(a,b){return a-b;});
if(unique.length===5){out.push(unique);}
}
}
return out;
}

function loadData(){
S.draws=parseLines(document.getElementById("dataInput").value);
S.previous=parseLines(document.getElementById("previousTicketsInput").value);
resetState();

document.getElementById("matrix").innerHTML="";
document.getElementById("upgrade").innerHTML="";
document.getElementById("pools").innerHTML="";
document.getElementById("top40").innerHTML="";

if(S.draws.length<20){
msg("Need at least 20 official Cash 5 draw lines.","bad");
return;
}

document.getElementById("summary").innerHTML=
"<h2>Step 1 Loaded</h2>"+
"<div class='grid'>"+
"<div class='stat'><b>"+S.draws.length+"</b><br>Official draws</div>"+
"<div class='stat'><b>"+S.previous.length+"</b><br>Previous tickets</div>"+
"<div class='stat'><b>"+fmt(S.draws[S.draws.length-1])+"</b><br>Last draw</div>"+
"</div>";

msg("Step 1 complete. Run Step 2.","good");
}

function basicMatrix(){
if(S.draws.length<20){
msg("Run Step 1 first.","bad");
return;
}

var total=S.draws.length;

for(var i=0;i<S.draws.length;i++){
var d=S.draws[i];

for(var j=0;j<5;j++){
var n=d[j];
S.freq[n]++;
if(S.last[n]>=0){S.gaps[n].push(i-S.last[n]);}
S.last[n]=i;
}

for(var a=0;a<5;a++){
for(var b=a+1;b<5;b++){
var pk=pairKey(d[a],d[b]);
S.pairs[pk]=(S.pairs[pk]||0)+1;
}
}

for(var x=0;x<5;x++){
for(var y=x+1;y<5;y++){
for(var z=y+1;z<5;z++){
var tk=triKey(d[x],d[y],d[z]);
S.triples[tk]=(S.triples[tk]||0)+1;
}
}
}
}

var avgFreq=total*5/35;
S.rows=[];

for(var num=1;num<=35;num++){
var delay=S.last[num]<0 ? total : total-1-S.last[num];
var gap=avg(S.gaps[num]) || total;
var hot=S.freq[num]/avgFreq;
var time=(delay+1)/(gap+1);
var base=0.40*norm(hot,0,2.5)+0.35*norm(time,0,3.5)+0.25*norm(delay,0,25);

S.rows.push({
n:num,
freq:S.freq[num],
delay:delay,
gap:gap,
hot:hot,
time:time,
base:base,
score:base
});
}

S.rows.sort(function(a,b){
if(b.score!==a.score){return b.score-a.score;}
return a.n-b.n;
});

var html="<h2>Step 2 Basic Matrix</h2><div class='scroll'><table>";
html+="<tr><th>Rank</th><th>#</th><th>Freq</th><th>Delay</th><th>Gap</th><th>Hot</th><th>Time</th><th>Base</th></tr>";

for(var r=0;r<S.rows.length;r++){
var row=S.rows[r];
html+="<tr><td>"+(r+1)+"</td><td><b>"+String(row.n).padStart(2,"0")+"</b></td><td>"+row.freq+"</td><td>"+row.delay+"</td><td>"+row.gap.toFixed(1)+"</td><td>"+row.hot.toFixed(2)+"</td><td>"+row.time.toFixed(2)+"</td><td>"+row.base.toFixed(3)+"</td></tr>";
}

html+="</table></div>";
document.getElementById("matrix").innerHTML=html;
msg("Step 2 complete. Run Step 3.","good");
}
  function upgradeMatrix(){
if(!S.rows.length){
msg("Run Step 2 first.","bad");
return;
}

S.pairRows=buildPairMomentum();

for(var i=0;i<S.rows.length;i++){
var r=S.rows[i];
var ps=positionScore(r.n);
var cs=clusterScore(r.n);
var os=oscillationScore(r.n);
var bs=bestPairScore(r.n);

r.position=ps;
r.cluster=cs;
r.osc=os;
r.pair=bs;

r.score=r.base+0.18*ps+0.18*cs+0.12*os+0.20*bs;
}

S.rows.sort(function(a,b){
if(b.score!==a.score){return b.score-a.score;}
return a.n-b.n;
});

var html="<h2>Step 3 Upgrade Matrix</h2><div class='scroll'><table>";
html+="<tr><th>Rank</th><th>#</th><th>Base</th><th>Position</th><th>Cluster</th><th>Osc</th><th>Pair</th><th>Total</th></tr>";

for(var i=0;i<S.rows.length;i++){
var r=S.rows[i];
html+="<tr><td>"+(i+1)+"</td><td><b>"+String(r.n).padStart(2,"0")+"</b></td><td>"+r.base.toFixed(3)+"</td><td>"+r.position.toFixed(3)+"</td><td>"+r.cluster.toFixed(3)+"</td><td>"+r.osc.toFixed(3)+"</td><td>"+r.pair.toFixed(3)+"</td><td><b>"+r.score.toFixed(3)+"</b></td></tr>";
}

html+="</table></div>";
document.getElementById("upgrade").innerHTML=html;

msg("Step 3 complete. Run Step 4.","good");
}

function buildPairMomentum(){
var windows=[5,10,20,60];
var all={};

for(var wi=0;wi<windows.length;wi++){
var w=windows[wi];
var start=Math.max(0,S.draws.length-w);
var count={};
var size=S.draws.length-start;

for(var i=start;i<S.draws.length;i++){
var d=S.draws[i];

for(var a=0;a<5;a++){
for(var b=a+1;b<5;b++){
var pk=pairKey(d[a],d[b]);
count[pk]=(count[pk]||0)+1;
}
}
}

for(var k in count){
if(!all[k]){
all[k]={key:k,score:0,w5:0,w10:0,w20:0,w60:0,nums:k.split("-").map(function(x){return parseInt(x,10);})};
}

var rate=count[k]/size;
if(w===5){all[k].w5=rate;}
if(w===10){all[k].w10=rate;}
if(w===20){all[k].w20=rate;}
if(w===60){all[k].w60=rate;}
}
}

var arr=[];

for(var p in all){
var row=all[p];
var accel=(row.w5-row.w20)+(row.w10-row.w60);

row.score=
0.42*row.w5+
0.30*row.w10+
0.18*row.w20+
0.10*row.w60+
Math.max(0,accel)*1.25;

arr.push(row);
}

arr.sort(function(a,b){
if(b.score!==a.score){return b.score-a.score;}
return a.key.localeCompare(b.key);
});

return arr;
}

function positionScore(n){
var windows=[
{w:10,wt:0.45},
{w:20,wt:0.35},
{w:50,wt:0.20}
];

var final=[0,0,0,0,0];

for(var wi=0;wi<windows.length;wi++){
var o=windows[wi];
var start=Math.max(0,S.draws.length-o.w);
var c=[0,0,0,0,0];
var app=0;

for(var i=start;i<S.draws.length;i++){
var d=S.draws[i].slice().sort(function(a,b){return a-b;});

for(var j=0;j<5;j++){
if(d[j]===n){
c[j]++;
app++;
}
}
}

if(app>0){
for(var x=0;x<5;x++){
final[x]+=(c[x]/app)*o.wt;
}
}
}

var sorted=final.slice().sort(function(a,b){return b-a;});
return sorted[0]-(sorted[1]||0);
}

function clusterScore(n){
var configs=[
{w:10,wt:0.45},
{w:25,wt:0.35},
{w:60,wt:0.20}
];

var score=0;

for(var ci=0;ci<configs.length;ci++){
var o=configs[ci];
var start=Math.max(0,S.draws.length-o.w);
var f=Array(36).fill(0);
var size=S.draws.length-start;

for(var i=start;i<S.draws.length;i++){
var d=S.draws[i];

for(var j=0;j<5;j++){
f[d[j]]++;
}
}

var left=f[n-1]||0;
var mid=f[n]||0;
var right=f[n+1]||0;

var cluster=(left*0.75+mid*1.25+right*0.75)/(size||1);
var center=mid/(left+mid+right+1);

score+=(cluster*0.6+center*0.4)*o.wt;
}

return score;
}

function oscillationScore(n){
var start=Math.max(0,S.draws.length-25);
var wave=0;
var size=S.draws.length-start;

for(var i=start+1;i<S.draws.length;i++){
var prev=S.draws[i-1];
var cur=S.draws[i];

if(prev.indexOf(n-1)>=0 && cur.indexOf(n)>=0){wave+=1.3;}
if(prev.indexOf(n+1)>=0 && cur.indexOf(n)>=0){wave+=1.3;}
if(cur.indexOf(n-1)>=0 || cur.indexOf(n+1)>=0){wave+=0.25;}
}

return wave/(size||1);
}

function bestPairScore(n){
var best=0;

for(var i=0;i<S.pairRows.length;i++){
var p=S.pairRows[i];

if(p.nums.indexOf(n)>=0 && p.score>best){
best=p.score;
}
}

return best;
}

function buildPools(){
if(!S.rows.length || !S.pairRows.length){
msg("Run Step 3 first.","bad");
return;
}

var ranked=[];
for(var i=0;i<S.rows.length;i++){
ranked.push(S.rows[i].n);
}

S.strong=ranked.slice(0,10);
S.secondary=ranked.slice(10,22);
S.wild=ranked.slice(22,35);
S.recovery=[];

var lastDraw=S.draws[S.draws.length-1];

for(var i=0;i<lastDraw.length;i++){
var n=lastDraw[i];
var used=0;

for(var j=0;j<S.previous.length;j++){
if(S.previous[j].indexOf(n)>=0){used++;}
}

if(used<5 && S.recovery.indexOf(n)<0){
S.recovery.push(n);
}
}

for(var i=0;i<ranked.length && S.recovery.length<12;i++){
var n=ranked[i];

if(S.wild.indexOf(n)>=0 && S.recovery.indexOf(n)<0){
S.recovery.push(n);
}
}

for(var i=0;i<ranked.length && S.recovery.length<12;i++){
var n=ranked[i];

if(S.recovery.indexOf(n)<0){
S.recovery.push(n);
}
}

S.bridge4=buildBridge4();

var html="<h2>Step 4 Pools</h2>";
html+="<div class='grid'>";
html+="<div class='stat'><b>"+S.strong.map(function(n){return String(n).padStart(2,'0');}).join(" - ")+"</b><br>Strong Pool</div>";
html+="<div class='stat'><b>"+S.secondary.map(function(n){return String(n).padStart(2,'0');}).join(" - ")+"</b><br>Secondary Pool</div>";
html+="<div class='stat'><b>"+S.wild.map(function(n){return String(n).padStart(2,'0');}).join(" - ")+"</b><br>Wildcard Pool</div>";
html+="<div class='stat'><b>"+S.recovery.map(function(n){return String(n).padStart(2,'0');}).join(" - ")+"</b><br>Recovery Pool</div>";
html+="</div>";

html+="<h3>Top Pair Momentum</h3><div class='scroll'><table>";
html+="<tr><th>Rank</th><th>Pair</th><th>Score</th></tr>";

for(var i=0;i<Math.min(30,S.pairRows.length);i++){
html+="<tr><td>"+(i+1)+"</td><td><b>"+S.pairRows[i].key+"</b></td><td>"+S.pairRows[i].score.toFixed(3)+"</td></tr>";
}

html+="</table></div>";

html+="<h3>Top 4-Number Bridge Groups</h3><div class='scroll'><table>";
html+="<tr><th>Rank</th><th>Bridge</th><th>Score</th></tr>";

for(var i=0;i<Math.min(40,S.bridge4.length);i++){
html+="<tr><td>"+(i+1)+"</td><td><b>"+fmt(S.bridge4[i].nums)+"</b></td><td>"+S.bridge4[i].score.toFixed(3)+"</td></tr>";
}

html+="</table></div>";

document.getElementById("pools").innerHTML=html;

msg("Step 4 complete. Run Step 5.","good");
}

function buildBridge4(){
var out=[];

for(var a=0;a<S.strong.length;a++){
for(var b=a+1;b<S.strong.length;b++){
for(var c=b+1;c<S.strong.length;c++){
for(var d=c+1;d<S.strong.length;d++){
var nums=[S.strong[a],S.strong[b],S.strong[c],S.strong[d]].sort(function(x,y){return x-y;});
out.push({nums:nums,score:bridgeScore(nums)});
}
}
}
}

out.sort(function(x,y){
if(y.score!==x.score){return y.score-x.score;}
return key(x.nums).localeCompare(key(y.nums));
});

return out;
}

function bridgeScore(nums){
var score=0;

for(var i=0;i<nums.length;i++){
var n=nums[i];

for(var r=0;r<S.rows.length;r++){
if(S.rows[r].n===n){
score+=S.rows[r].score;
break;
}
}
}

for(var i=0;i<nums.length;i++){
for(var j=i+1;j<nums.length;j++){
var pk=pairKey(nums[i],nums[j]);
var pairScore=0;

for(var p=0;p<S.pairRows.length;p++){
if(S.pairRows[p].key===pk){
pairScore=S.pairRows[p].score;
break;
}
}

score+=pairScore*1.75;
score+=(S.pairs[pk]||0)*0.02;
}
}

return score;
}
  function buildTop40(){
if(!S.bridge4.length){
msg("Run Step 4 first.","bad");
return;
}

S.top40=[];
S.usage=Array(36).fill(0);
S.pairUse={};
S.triUse={};
S.log=[];

build4Plus1();
build3Plus2();
buildBalanced();
buildRecovery();
finishTop40();

renderTop40();
msg("Step 5 complete. Top 40 created.","good");
}

function build4Plus1(){
var challengers=S.secondary.concat(S.wild).concat(S.recovery);
var made=0;

for(var i=0;i<S.bridge4.length && made<12;i++){
var bridge=S.bridge4[i].nums;

for(var j=0;j<challengers.length;j++){
var ch=challengers[(i+j)%challengers.length];

if(addTicket(bridge.concat([ch]),"4+1 Bridge","4 matrix numbers + 1 challenger",true)){
made++;
break;
}
}
}
}

function build3Plus2(){
var outsiders=S.secondary.concat(S.recovery).concat(S.wild);
var made=0;

for(var i=0;i<80 && made<10;i++){
var nums=[
S.strong[i%S.strong.length],
S.strong[(i+3)%S.strong.length],
S.strong[(i+6)%S.strong.length],
outsiders[(i+2)%outsiders.length],
outsiders[(i+8)%outsiders.length]
];

if(addTicket(nums,"3+2 Blend","3 matrix numbers + 2 challengers",true)){
made++;
}
}
}

function buildBalanced(){
var hot=S.strong.slice(0,6);
var medium=S.strong.slice(6).concat(S.secondary);
var cold=S.wild.concat(S.recovery);
var made=0;

for(var i=0;i<100 && made<10;i++){
var nums=[
hot[i%hot.length],
hot[(i+3)%hot.length],
medium[(i+2)%medium.length],
medium[(i+7)%medium.length],
cold[(i+5)%cold.length]
];

if(addTicket(nums,"2+2+1 Balanced","2 hot + 2 medium + 1 cold recovery",true)){
made++;
}
}
}

function buildRecovery(){
var made=0;

for(var i=0;i<100 && made<8;i++){
var nums=[
S.recovery[i%S.recovery.length],
S.recovery[(i+4)%S.recovery.length],
S.strong[(i+2)%S.strong.length],
S.secondary[(i+5)%S.secondary.length],
S.wild[(i+3)%S.wild.length]
];

if(addTicket(nums,"Recovery Wildcard","missed draw recovery + wildcard protection",true)){
made++;
}
}
}

function finishTop40(){
var ranked=[];

for(var i=0;i<S.rows.length;i++){
ranked.push(S.rows[i].n);
}

for(var a=0;a<ranked.length && S.top40.length<PORTFOLIO_SIZE;a++){
for(var b=a+1;b<ranked.length && S.top40.length<PORTFOLIO_SIZE;b++){
for(var c=b+1;c<ranked.length && S.top40.length<PORTFOLIO_SIZE;c++){
for(var d=c+1;d<ranked.length && S.top40.length<PORTFOLIO_SIZE;d++){
for(var e=d+1;e<ranked.length && S.top40.length<PORTFOLIO_SIZE;e++){
var nums=[ranked[a],ranked[b],ranked[c],ranked[d],ranked[e]];
addTicket(nums,"Safe Fill","deterministic fill to complete Top 40",false);
}
}
}
}
}
}

function addTicket(nums,type,role,strict){
nums=uniqueSorted(nums);

if(nums.length!==5){
S.log.push(["reject",fmt(nums),type,"invalid or duplicate number"]);
return false;
}

if(ticketExists(nums)){
S.log.push(["reject",fmt(nums),type,"duplicate ticket"]);
return false;
}

if(!balanceOK(nums,strict)){
S.log.push(["reject",fmt(nums),type,"balance rule"]);
return false;
}

if(overHardCap(nums)){
S.log.push(["reject",fmt(nums),type,"hard cap"]);
return false;
}

if(strict && !classCapOK(nums)){
S.log.push(["reject",fmt(nums),type,"class cap"]);
return false;
}

var pairs=ticketPairs(nums);
var triples=ticketTriples(nums);

if(strict && pairCapBlocked(pairs)){
S.log.push(["reject",fmt(nums),type,"pair cap"]);
return false;
}

if(strict && tripleCapBlocked(triples)){
S.log.push(["reject",fmt(nums),type,"triple cap"]);
return false;
}

S.top40.push({
nums:nums,
type:type,
role:role,
score:ticketScore(nums,type)
});

for(var i=0;i<nums.length;i++){
S.usage[nums[i]]++;
}

for(var p=0;p<pairs.length;p++){
S.pairUse[pairs[p]]=(S.pairUse[pairs[p]]||0)+1;
}

for(var t=0;t<triples.length;t++){
S.triUse[triples[t]]=(S.triUse[triples[t]]||0)+1;
}

S.log.push(["accept",fmt(nums),type,"accepted"]);
return true;
}

function uniqueSorted(nums){
var out=[];

for(var i=0;i<nums.length;i++){
var n=parseInt(nums[i],10);

if(n>=1 && n<=35 && out.indexOf(n)<0){
out.push(n);
}
}

out.sort(function(a,b){return a-b;});
return out;
}

function ticketExists(nums){
var k=key(nums);

for(var i=0;i<S.top40.length;i++){
if(key(S.top40[i].nums)===k){
return true;
}
}

return false;
}

function balanceOK(nums,strict){
var sum=0;

for(var i=0;i<nums.length;i++){
sum+=nums[i];
}

if(sum<35 || sum>155){
return false;
}

var odd=0;
var low=0;
var zones=[0,0,0,0,0];

for(var i=0;i<nums.length;i++){
var n=nums[i];

if(n%2===1){odd++;}
if(n<=17){low++;}

if(n>=1 && n<=7){zones[0]++;}
else if(n>=8 && n<=14){zones[1]++;}
else if(n>=15 && n<=21){zones[2]++;}
else if(n>=22 && n<=28){zones[3]++;}
else if(n>=29 && n<=35){zones[4]++;}
}

if(odd===0 || odd===5){
return false;
}

if(low===0 || low===5){
return false;
}

var maxZone=0;

for(var z=0;z<zones.length;z++){
if(zones[z]>maxZone){maxZone=zones[z];}
}

if(maxZone>3){
return false;
}

if(strict){
var last=S.draws[S.draws.length-1];

if(last && overlap(nums,last)>3){
return false;
}

var maxPrev=0;

for(var p=0;p<S.previous.length;p++){
var ov=overlap(nums,S.previous[p]);
if(ov>maxPrev){maxPrev=ov;}
}

if(maxPrev>=4){
return false;
}
}

return true;
}

function overHardCap(nums){
for(var i=0;i<nums.length;i++){
if(S.usage[nums[i]]>=HARD_CAP){
return true;
}
}
return false;
}

function classCapOK(nums){
for(var i=0;i<nums.length;i++){
var n=nums[i];

if(S.strong.indexOf(n)>=0 && S.usage[n]>=STRONG_CAP){
return false;
}

if(S.secondary.indexOf(n)>=0 && S.usage[n]>=SECONDARY_CAP){
return false;
}

if(S.wild.indexOf(n)>=0 && S.usage[n]>=WILD_CAP){
return false;
}
}

return true;
}

function pairCapBlocked(pairs){
for(var i=0;i<pairs.length;i++){
if((S.pairUse[pairs[i]]||0)>=5){
return true;
}
}
return false;
}

function tripleCapBlocked(triples){
for(var i=0;i<triples.length;i++){
if((S.triUse[triples[i]]||0)>=2){
return true;
}
}
return false;
}

function ticketPairs(nums){
var out=[];

for(var i=0;i<5;i++){
for(var j=i+1;j<5;j++){
out.push(pairKey(nums[i],nums[j]));
}
}

return out;
}

function ticketTriples(nums){
var out=[];

for(var i=0;i<5;i++){
for(var j=i+1;j<5;j++){
for(var k=j+1;k<5;k++){
out.push(triKey(nums[i],nums[j],nums[k]));
}
}
}

return out;
}

function ticketScore(nums,type){
var score=0;

for(var i=0;i<nums.length;i++){
for(var r=0;r<S.rows.length;r++){
if(S.rows[r].n===nums[i]){
score+=S.rows[r].score;
break;
}
}
}

for(var a=0;a<5;a++){
for(var b=a+1;b<5;b++){
var pk=pairKey(nums[a],nums[b]);
var pairScore=0;

for(var p=0;p<S.pairRows.length;p++){
if(S.pairRows[p].key===pk){
pairScore=S.pairRows[p].score;
break;
}
}

score+=pairScore*1.25;
score+=(S.pairs[pk]||0)*0.015;
}
}

for(var x=0;x<5;x++){
for(var y=x+1;y<5;y++){
for(var z=y+1;z<5;z++){
var tk=triKey(nums[x],nums[y],nums[z]);
score+=(S.triples[tk]||0)*0.025;
}
}
}

if(type==="4+1 Bridge"){score+=0.90;}
if(type==="3+2 Blend"){score+=0.65;}
if(type==="2+2+1 Balanced"){score+=0.45;}
if(type==="Recovery Wildcard"){score+=0.35;}
if(type==="Safe Fill"){score+=0.10;}

return score;
}

function countType(type){
var c=0;

for(var i=0;i<S.top40.length;i++){
if(S.top40[i].type===type){
c++;
}
}

return c;
}
