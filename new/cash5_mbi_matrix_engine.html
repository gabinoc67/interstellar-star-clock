<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cash 5 Anchor Cap Pair Bridge Recovery Engine</title>
<style>
body{font-family:Arial;margin:0;color:#172033;background:#fff}
header{text-align:center;padding:20px;border-bottom:1px solid #cfd8e6}
main{max-width:1250px;margin:auto;padding:18px}
.card{border:1px solid #cfd8e6;border-radius:14px;padding:15px;margin-bottom:15px;box-shadow:0 6px 18px #0001}
textarea{width:100%;min-height:130px;font-family:Consolas;padding:10px;border-radius:10px;border:1px solid #cfd8e6}
#dataInput{min-height:240px}
button{padding:12px 15px;border:0;border-radius:10px;background:#174ea6;color:white;font-weight:bold;margin:5px;cursor:pointer}
button:nth-of-type(2){background:#0b6e4f}
button:nth-of-type(3){background:#403899}
button:nth-of-type(4){background:#9a6a00}
button:nth-of-type(5){background:#444}
.good{background:#eaf8f1}
.bad{background:#fff0f0}
.warn{background:#fff8e6}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border:1px solid #cfd8e6;padding:6px;text-align:center}
th{background:#eef3f9}
.scroll{max-height:450px;overflow:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.stat{background:#f7f9fc;border:1px solid #cfd8e6;border-radius:10px;padding:10px}
.small{font-size:12px;color:#5c6b82}
</style>
</head>

<body>
<header>
<h1>Cash 5 Anchor Cap Pair Bridge Recovery Engine</h1>
<p>Deterministic Top 40. Anchor Cap + Pair Bridge + Missed Draw Recovery.</p>
</header>

<main>
<div class="card">
<h2>1. Official Cash 5 Draw History</h2>
<textarea id="dataInput" placeholder="09/20/2018 01 11 22 24 35"></textarea>

<h2>2. Machine Pretest History</h2>
<textarea id="pretestInput" placeholder="6/25/2026 Test#1 30 - 25 - 3 - 6 - 11"></textarea>

<h2>3. Previous Generated Tickets</h2>
<textarea id="previousTicketsInput" placeholder="Paste old generated tickets here"></textarea>

<button onclick="step1LoadData()">Step 1 Load Data</button>
<button onclick="step2BasicMatrix()">Step 2 Basic Matrix</button>
<button onclick="step3UpgradeLayers()">Step 3 Upgrade Layers</button>
<button onclick="step4BridgeRecovery()">Step 4 Bridge Recovery</button>
<button onclick="step5BuildTop40()">Step 5 Build Top 40</button>
<button onclick="printTop40()">Print Top 40</button>
<button onclick="exportExcel()">Download Excel</button>
</div>

<div id="msg" class="card warn">Start with Step 1.</div>
<div id="summary" class="card"></div>
<div id="matrix" class="card"></div>
<div id="upgrade" class="card"></div>
<div id="bridge" class="card"></div>
<div id="top40" class="card"></div>
</main>

<script>
const PORTFOLIO_SIZE=40;

const STRONG_MAX=16;
const SECONDARY_MAX=10;
const WILDCARD_MAX=6;
const HARD_CAP=18;

let S={
draws:[],
pretests:[],
previous:[],
basic:null,
rows:[],
position20:null,
cluster:null,
osc:null,
pairMomentum:null,
strongPool:[],
secondaryPool:[],
wildPool:[],
recoveryPool:[],
bridge4:[],
top40:[],
usage:Array(36).fill(0),
pairUse:{},
triUse:{}
};

function msg(t,cls="warn"){
document.getElementById("msg").className="card "+cls;
document.getElementById("msg").innerHTML=t;
}

function fmt(a){
return a.slice().sort((x,y)=>x-y).map(n=>String(n).padStart(2,"0")).join(" - ");
}

function key(a){
return a.slice().sort((x,y)=>x-y).join("-");
}

function pairKey(a,b){
return a<b?a+"-"+b:b+"-"+a;
}

function triKey(a,b,c){
return [a,b,c].sort((x,y)=>x-y).join("-");
}

function avg(a){
return a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
}

function norm(v,min,max){
return max===min?0:Math.max(0,Math.min(1,(v-min)/(max-min)));
}

function parseLines(raw){
if(!raw.trim())return [];
let out=[];
raw.split(/\n+/).forEach(line=>{
let nums=(line.match(/\d+/g)||[]).map(Number).filter(n=>n>=1&&n<=35);
if(nums.length>=5){
let d=[...new Set(nums.slice(-5))].sort((a,b)=>a-b);
if(d.length===5)out.push(d);
}
});
return out;
}

function overlap(a,b){
return a.filter(n=>b.includes(n)).length;
}

function prevOverlap(t){
return Math.max(0,...S.previous.map(p=>overlap(t,p)));
}

function ticketPairs(nums){
let out=[];
for(let i=0;i<5;i++){
for(let j=i+1;j<5;j++){
out.push(pairKey(nums[i],nums[j]));
}
}
return out;
}

function ticketTriples(nums){
let out=[];
for(let i=0;i<5;i++){
for(let j=i+1;j<5;j++){
for(let k=j+1;k<5;k++){
out.push(triKey(nums[i],nums[j],nums[k]));
}
}
}
return out;
}

function step1LoadData(){
S.draws=parseLines(document.getElementById("dataInput").value);
S.pretests=parseLines(document.getElementById("pretestInput").value).slice(0,80);
S.previous=parseLines(document.getElementById("previousTicketsInput").value);

S.basic=null;
S.rows=[];
S.position20=null;
S.cluster=null;
S.osc=null;
S.pairMomentum=null;
S.strongPool=[];
S.secondaryPool=[];
S.wildPool=[];
S.recoveryPool=[];
S.bridge4=[];
S.top40=[];
S.usage=Array(36).fill(0);
S.pairUse={};
S.triUse={};

document.getElementById("matrix").innerHTML="";
document.getElementById("upgrade").innerHTML="";
document.getElementById("bridge").innerHTML="";
document.getElementById("top40").innerHTML="";

if(S.draws.length<20){
msg("Need at least 20 official draws.","bad");
return;
}

document.getElementById("summary").innerHTML=
`<h2>Loaded Data</h2>
<div class="grid">
<div class="stat"><b>${S.draws.length}</b><br>Official draws</div>
<div class="stat"><b>${S.pretests.length}</b><br>Pretests loaded</div>
<div class="stat"><b>${S.previous.length}</b><br>Previous tickets loaded</div>
<div class="stat"><b>${fmt(S.draws[S.draws.length-1])}</b><br>Last official draw</div>
</div>`;

msg("Step 1 complete. Now run Step 2.","good");
}

function step2BasicMatrix(){
if(!S.draws.length){
msg("Run Step 1 first.","bad");
return;
}

let total=S.draws.length;
let freq=Array(36).fill(0);
let last=Array(36).fill(-1);
let gaps=Array.from({length:36},()=>[]);
let pairs={};
let triples={};

S.draws.forEach((d,i)=>{
d.forEach(n=>{
freq[n]++;
if(last[n]>=0)gaps[n].push(i-last[n]);
last[n]=i;
});

for(let a=0;a<5;a++){
for(let b=a+1;b<5;b++){
let pk=pairKey(d[a],d[b]);
pairs[pk]=(pairs[pk]||0)+1;
}
}

for(let a=0;a<5;a++){
for(let b=a+1;b<5;b++){
for(let c=b+1;c<5;c++){
let tk=triKey(d[a],d[b],d[c]);
triples[tk]=(triples[tk]||0)+1;
}
}
}
});

S.basic={freq,last,gaps,pairs,triples,total};

let avgFreq=total*5/35;
let rows=[];

for(let n=1;n<=35;n++){
let delay=last[n]<0?total:total-1-last[n];
let gap=avg(gaps[n])||total;
let hot=freq[n]/avgFreq;
let time=(delay+1)/(gap+1);

rows.push({
n:n,
freq:freq[n],
delay:delay,
gap:gap,
hot:hot,
time:time,
score:.35*norm(hot,0,2.5)+.35*norm(time,0,3.5)
});
}

rows.sort((a,b)=>b.score-a.score || a.n-b.n);
S.rows=rows;

document.getElementById("matrix").innerHTML=
"<h2>Basic Matrix</h2>"+
"<div class='scroll'><table>"+
"<tr><th>Rank</th><th>#</th><th>Freq</th><th>Delay</th><th>Gap</th><th>Hot</th><th>Time</th><th>Base Score</th></tr>"+
rows.map((r,i)=>`
<tr>
<td>${i+1}</td>
<td><b>${String(r.n).padStart(2,"0")}</b></td>
<td>${r.freq}</td>
<td>${r.delay}</td>
<td>${r.gap.toFixed(1)}</td>
<td>${r.hot.toFixed(2)}</td>
<td>${r.time.toFixed(2)}</td>
<td>${r.score.toFixed(3)}</td>
</tr>`).join("")+
"</table></div>";

msg("Step 2 complete. Now run Step 3.","good");
}
  function step3UpgradeLayers(){
if(!S.basic){
msg("Run Step 2 first.","bad");
return;
}

S.position20=makePosition20();
S.cluster=makeCluster();
S.osc=makeOscillation();
S.pairMomentum=makePairMomentum();

S.rows.forEach(r=>{
let n=r.n;
r.posScore=S.position20[n].confidence;
r.clusterScore=S.cluster[n].centerPower;
r.oscScore=S.osc[n].score;
r.pairMom=S.pairMomentum.byNum[n].score;

r.score+=
.18*r.posScore+
.18*r.clusterScore+
.12*r.oscScore+
.16*r.pairMom;
});

S.rows.sort((a,b)=>b.score-a.score || a.n-b.n);

document.getElementById("upgrade").innerHTML=
"<h2>Upgrade Layers</h2>"+
"<div class='scroll'><table>"+
"<tr><th>Rank</th><th>#</th><th>Pos 2.0</th><th>Cluster</th><th>Osc</th><th>Pair Mom</th><th>Total Score</th></tr>"+
S.rows.map((r,i)=>`
<tr>
<td>${i+1}</td>
<td><b>${String(r.n).padStart(2,"0")}</b></td>
<td>${r.posScore.toFixed(3)}</td>
<td>${r.clusterScore.toFixed(3)}</td>
<td>${r.oscScore.toFixed(3)}</td>
<td>${r.pairMom.toFixed(3)}</td>
<td>${r.score.toFixed(3)}</td>
</tr>`).join("")+
"</table></div>";

msg("Step 3 complete. Now run Step 4.","good");
}

function makePosition20(){
let out={};

for(let n=1;n<=35;n++){
out[n]={best:0,confidence:0};
}

[10,20,50].forEach((w,wi)=>{
let weight=wi===0?.45:wi===1?.35:.20;
let slice=S.draws.slice(-Math.min(w,S.draws.length));

for(let n=1;n<=35;n++){
let c=Array(5).fill(0);
let app=0;

slice.forEach(d=>{
d.slice().sort((a,b)=>a-b).forEach((x,i)=>{
if(x===n){
c[i]++;
app++;
}
});
});

let probs=c.map(x=>app?x/app:0);

probs.forEach((p,i)=>{
out[n]["p"+i]=(out[n]["p"+i]||0)+p*weight;
});
}
});

for(let n=1;n<=35;n++){
let arr=[0,1,2,3,4].map(i=>out[n]["p"+i]||0);
let sorted=arr.slice().sort((a,b)=>b-a);
out[n].best=arr.indexOf(sorted[0]);
out[n].confidence=sorted[0]-(sorted[1]||0);
}

return out;
}

function makeCluster(){
let out={};

for(let n=1;n<=35;n++){
out[n]={centerPower:0};
}

[
{w:10,wt:.45},
{w:25,wt:.35},
{w:60,wt:.20}
].forEach(o=>{
let f=Array(36).fill(0);
let slice=S.draws.slice(-Math.min(o.w,S.draws.length));

slice.forEach(d=>{
d.forEach(n=>f[n]++);
});

for(let n=1;n<=35;n++){
let left=f[n-1]||0;
let mid=f[n]||0;
let right=f[n+1]||0;

let cluster=(left*.75+mid*1.25+right*.75)/(slice.length||1);
let center=mid/(left+mid+right+1);

out[n].centerPower+=(cluster*.6+center*.4)*o.wt;
}
});

return out;
}

function makeOscillation(){
let out={};

for(let n=1;n<=35;n++){
out[n]={score:0};
}

let r=S.draws.slice(-Math.min(25,S.draws.length));

for(let n=1;n<=35;n++){
let wave=0;

for(let i=1;i<r.length;i++){
if(r[i-1].includes(n-1)&&r[i].includes(n))wave+=1.3;
if(r[i-1].includes(n+1)&&r[i].includes(n))wave+=1.3;
if(r[i].includes(n-1)||r[i].includes(n+1))wave+=.25;
}

out[n].score=wave/(r.length||1);
}

return out;
}

function makePairMomentum(){
let windows=[5,10,20,60].map(w=>pairWindow(w));
let pairs=[];
let byPair={};
let byNum={};

for(let n=1;n<=35;n++){
byNum[n]={score:0,pair:""};
}

let keys=new Set();

windows.forEach(w=>{
Object.keys(w.c).forEach(k=>keys.add(k));
});

keys.forEach(k=>{
let r5=(windows[0].c[k]||0)/windows[0].s;
let r10=(windows[1].c[k]||0)/windows[1].s;
let r20=(windows[2].c[k]||0)/windows[2].s;
let r60=(windows[3].c[k]||0)/windows[3].s;
let accel=(r5-r20)+(r10-r60);

let score=
r5*.42+
r10*.30+
r20*.18+
r60*.10+
Math.max(0,accel)*1.25;

let nums=k.split("-").map(Number);
let row={key:k,nums:nums,score:score,accel:accel};

pairs.push(row);
byPair[k]=row;

nums.forEach(n=>{
if(score>byNum[n].score){
byNum[n]={score:score,pair:k};
}
});
});

pairs.sort((a,b)=>b.score-a.score || a.key.localeCompare(b.key));

return {pairs:pairs,byPair:byPair,byNum:byNum};
}

function pairWindow(w){
let c={};
let slice=S.draws.slice(-Math.min(w,S.draws.length));

slice.forEach(d=>{
for(let i=0;i<5;i++){
for(let j=i+1;j<5;j++){
let pk=pairKey(d[i],d[j]);
c[pk]=(c[pk]||0)+1;
}
}
});

return {c:c,s:slice.length||1};
}

function step4BridgeRecovery(){
if(!S.pairMomentum){
msg("Run Step 3 first.","bad");
return;
}

let ranked=S.rows.map(r=>r.n);

S.strongPool=ranked.slice(0,10);
S.secondaryPool=ranked.slice(10,22);
S.wildPool=ranked.slice(22,35);

let lastDraw=S.draws[S.draws.length-1]||[];
let prevTickets=S.previous||[];

let recovery=[];

lastDraw.forEach(n=>{
let used=prevTickets.filter(t=>t.includes(n)).length;
if(used<5)recovery.push(n);
});

ranked.forEach(n=>{
if(recovery.length<10 && !recovery.includes(n) && S.wildPool.includes(n)){
recovery.push(n);
}
});

ranked.forEach(n=>{
if(recovery.length<12 && !recovery.includes(n)){
recovery.push(n);
}
});

S.recoveryPool=recovery.slice(0,12);
S.bridge4=makeBridge4Groups(S.strongPool);

document.getElementById("bridge").innerHTML=
`<h2>Anchor Cap + Pair Bridge + Missed Draw Recovery</h2>
<div class="grid">
<div class="stat"><b>${S.strongPool.map(n=>String(n).padStart(2,"0")).join(" - ")}</b><br>Strong Pool 10</div>
<div class="stat"><b>${S.secondaryPool.map(n=>String(n).padStart(2,"0")).join(" - ")}</b><br>Secondary Pool</div>
<div class="stat"><b>${S.wildPool.map(n=>String(n).padStart(2,"0")).join(" - ")}</b><br>Wildcard Pool</div>
<div class="stat"><b>${S.recoveryPool.map(n=>String(n).padStart(2,"0")).join(" - ")}</b><br>Missed Draw Recovery Pool</div>
</div>

<h3>4-Number Bridge Groups</h3>
<div class="scroll"><table>
<tr><th>#</th><th>4-Number Bridge</th><th>Bridge Score</th></tr>
${S.bridge4.map((b,i)=>`
<tr>
<td>${i+1}</td>
<td><b>${fmt(b.nums)}</b></td>
<td>${b.score.toFixed(3)}</td>
</tr>`).join("")}
</table></div>

<p class="small">
This step builds the 4-number bridge groups from the top 10 matrix numbers.
The next step uses them to build 12 tickets with 4 matrix numbers + 1 challenger.
</p>`;

msg("Step 4 complete. Now run Step 5.","good");
}

function makeBridge4Groups(pool){
let out=[];

for(let a=0;a<pool.length;a++){
for(let b=a+1;b<pool.length;b++){
for(let c=b+1;c<pool.length;c++){
for(let d=c+1;d<pool.length;d++){
let nums=[pool[a],pool[b],pool[c],pool[d]].sort((x,y)=>x-y);
let score=bridgeScore(nums);
out.push({nums:nums,score:score});
}
}
}
}

out.sort((x,y)=>y.score-x.score || key(x.nums).localeCompare(key(y.nums)));

let selected=[];
let use=Array(36).fill(0);

for(let i=0;i<out.length && selected.length<30;i++){
let g=out[i];
if(g.nums.some(n=>use[n]>=12))continue;
selected.push(g);
g.nums.forEach(n=>use[n]++);
}

if(selected.length<30){
for(let i=0;i<out.length && selected.length<30;i++){
let g=out[i];
if(selected.some(x=>key(x.nums)===key(g.nums)))continue;
selected.push(g);
}
}

return selected;
}

function bridgeScore(nums){
let score=0;

nums.forEach(n=>{
let r=S.rows.find(x=>x.n===n);
score+=(r?r.score:0);
});

for(let i=0;i<nums.length;i++){
for(let j=i+1;j<nums.length;j++){
let pk=pairKey(nums[i],nums[j]);
score+=(S.pairMomentum.byPair[pk]?.score||0)*2.0;
score+=(S.basic.pairs[pk]||0)*0.02;
}
}

return score;
}
  function step5BuildTop40(){
if(!S.bridge4.length){
msg("Run Step 4 first.","bad");
return;
}

S.top40=[];
S.usage=Array(36).fill(0);
S.pairUse={};
S.triUse={};

buildBucketBridge12();
buildBucketThreeTwo10();
buildBucketBalanced10();
buildBucketRecovery8();
fillMissingDeterministic();

document.getElementById("top40").innerHTML=renderTop40();

msg("Step 5 complete. Top 40 built with deterministic fallback protection.","good");
}

function buildBucketBridge12(){
let challengers=[...S.secondaryPool,...S.wildPool,...S.recoveryPool];

for(let i=0;i<S.bridge4.length && countRole("4+1 Bridge")<12;i++){
let bridge=S.bridge4[i].nums;

for(let j=0;j<challengers.length;j++){
let ch=challengers[(i+j)%challengers.length];

if(addTicket([...bridge,ch],"4+1 Bridge","4 matrix numbers + 1 challenger",true))break;
}
}
}

function buildBucketThreeTwo10(){
let strong=S.strongPool;
let outsiders=[...S.secondaryPool,...S.recoveryPool,...S.wildPool];
let made=0;

for(let i=0;i<30 && made<10;i++){
let a=strong[i%strong.length];
let b=strong[(i+3)%strong.length];
let c=strong[(i+6)%strong.length];
let x=outsiders[(i+2)%outsiders.length];
let y=outsiders[(i+8)%outsiders.length];

if(addTicket([a,b,c,x,y],"3+2 Blend","3 matrix numbers + 2 challengers",true)){
made++;
}
}
}

function buildBucketBalanced10(){
let hot=S.strongPool.slice(0,6);
let medium=[...S.strongPool.slice(6),...S.secondaryPool];
let cold=[...S.wildPool,...S.recoveryPool];
let made=0;

for(let i=0;i<40 && made<10;i++){
let h1=hot[i%hot.length];
let h2=hot[(i+3)%hot.length];
let m1=medium[(i+2)%medium.length];
let m2=medium[(i+7)%medium.length];
let c1=cold[(i+5)%cold.length];

if(addTicket([h1,h2,m1,m2,c1],"2+2+1 Balanced","2 hot + 2 medium + 1 cold recovery",true)){
made++;
}
}
}

function buildBucketRecovery8(){
let recovery=S.recoveryPool;
let strong=S.strongPool;
let secondary=S.secondaryPool;
let wild=S.wildPool;
let made=0;

for(let i=0;i<50 && made<8;i++){
let r1=recovery[i%recovery.length];
let r2=recovery[(i+4)%recovery.length];
let s1=strong[(i+2)%strong.length];
let s2=secondary[(i+5)%secondary.length];
let w1=wild[(i+3)%wild.length];

if(addTicket([r1,r2,s1,s2,w1],"Recovery Wildcard","missed draw recovery + wildcard protection",true)){
made++;
}
}
}

function fillMissingDeterministic(){
let ranked=S.rows.map(r=>r.n);
let attempts=0;

for(let a=0;a<ranked.length && S.top40.length<PORTFOLIO_SIZE;a++){
for(let b=a+1;b<ranked.length && S.top40.length<PORTFOLIO_SIZE;b++){
for(let c=b+1;c<ranked.length && S.top40.length<PORTFOLIO_SIZE;c++){
for(let d=c+1;d<ranked.length && S.top40.length<PORTFOLIO_SIZE;d++){
for(let e=d+1;e<ranked.length && S.top40.length<PORTFOLIO_SIZE;e++){
attempts++;
if(attempts>9000)return;

let nums=[ranked[a],ranked[b],ranked[c],ranked[d],ranked[e]];

addTicket(nums,"Deterministic Fill","safe fill ticket to complete Top 40",false);
}
}
}
}
}
}

function countRole(role){
return S.top40.filter(t=>t.type===role).length;
}

function addTicket(nums,type,role,strict){
nums=[...new Set(nums)].filter(n=>n>=1&&n<=35).sort((a,b)=>a-b);

if(nums.length!==5)return false;
if(S.top40.some(t=>key(t.nums)===key(nums)))return false;
if(!balance(nums,strict))return false;

if(nums.some(n=>S.usage[n]>=HARD_CAP))return false;

if(strict && !softUsageAllowed(nums))return false;

let pairs=ticketPairs(nums);
let triples=ticketTriples(nums);

if(strict && pairs.some(p=>(S.pairUse[p]||0)>=4))return false;
if(strict && triples.some(t=>(S.triUse[t]||0)>=2))return false;

S.top40.push({
nums:nums,
type:type,
role:role,
score:ticketScore(nums,type)
});

nums.forEach(n=>S.usage[n]++);
pairs.forEach(p=>S.pairUse[p]=(S.pairUse[p]||0)+1);
triples.forEach(t=>S.triUse[t]=(S.triUse[t]||0)+1);

return true;
}

function softUsageAllowed(nums){
for(let n of nums){
if(S.strongPool.includes(n) && S.usage[n]>=STRONG_MAX)return false;
if(S.secondaryPool.includes(n) && S.usage[n]>=SECONDARY_MAX)return false;
if(S.wildPool.includes(n) && S.usage[n]>=WILDCARD_MAX)return false;
}
return true;
}

function balance(t,strict){
let sum=t.reduce((a,b)=>a+b,0);
if(sum<35||sum>155)return false;

let odd=t.filter(n=>n%2).length;
if(odd===0||odd===5)return false;

let low=t.filter(n=>n<=17).length;
if(low===0||low===5)return false;

let zones=[
t.filter(n=>n>=1&&n<=7).length,
t.filter(n=>n>=8&&n<=14).length,
t.filter(n=>n>=15&&n<=21).length,
t.filter(n=>n>=22&&n<=28).length,
t.filter(n=>n>=29&&n<=35).length
];

if(Math.max(...zones)>3)return false;

if(strict){
if(prevOverlap(t)>=4)return false;
let last=S.draws[S.draws.length-1];
if(last && overlap(t,last)>3)return false;
}

return true;
}

function ticketScore(nums,type){
let score=0;

nums.forEach(n=>{
let r=S.rows.find(x=>x.n===n);
score+=(r?r.score:0);
});

for(let i=0;i<5;i++){
for(let j=i+1;j<5;j++){
let pk=pairKey(nums[i],nums[j]);
score+=(S.pairMomentum.byPair[pk]?.score||0)*1.35;
score+=(S.basic.pairs[pk]||0)*0.015;
}
}

for(let i=0;i<5;i++){
for(let j=i+1;j<5;j++){
for(let k=j+1;k<5;k++){
let tk=triKey(nums[i],nums[j],nums[k]);
score+=(S.basic.triples[tk]||0)*0.03;
}
}
}

if(type==="4+1 Bridge")score+=.90;
if(type==="3+2 Blend")score+=.65;
if(type==="2+2+1 Balanced")score+=.45;
if(type==="Recovery Wildcard")score+=.35;
if(type==="Deterministic Fill")score+=.10;

return score;
}

</div>`;

if(missing>0){

}

html+=
"<div class='scroll'><table>"+

S.top40.map((t,i)=>`

</tr>`).join("")+
"</table></div>";

html+=
"<h2>Number Usage Control</h2>"+
"<div class='scroll'><table>"+
"<tr><th>Number</th><th>Used</th><th>Class</th><th>Target Rule</th></tr>"+
Array.from({length:35},(_,i)=>i+1).map(n=>{
let cls="Outside";
let rule="0+";
if(S.strongPool.includes(n)){cls="Strong";rule="10-16 preferred";}
else if(S.secondaryPool.includes(n)){cls="Secondary";rule="6-10 preferred";}
else if(S.wildPool.includes(n)){cls="Wildcard";rule="3-6 preferred";}
if(S.recoveryPool.includes(n)){cls+=" / Recovery";}
return `
<tr>
<td><b>${String(n).padStart(2,"0")}</b></td>
<td>${S.usage[n]}</td>
<td>${cls}</td>
<td>${rule}</td>
</tr>`;
}).join("")+
"</table></div>";

html+=
`<h2>Algorithm Summary</h2>

This corrected version uses Anchor Cap + Pair Bridge + Missed Draw Recovery.
It first tries the strict bucket structure, then uses a deterministic safe-fill method only if strict rules block the full Top 40.
</p>
<p class="small">
No random generator is used. Same input gives the same Top 40. Cash 5 is random, so this cannot guarantee a winning result.
</p>`;

return html;
}
