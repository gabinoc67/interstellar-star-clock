<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash 5 Plain Matrix Engine With Pretests</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#ffffff;color:#172033}
header{text-align:center;padding:20px;border-bottom:1px solid #cfd8e6}
main{max-width:1250px;margin:auto;padding:18px}
.card{border:1px solid #cfd8e6;border-radius:14px;padding:15px;margin-bottom:15px;box-shadow:0 6px 18px rgba(0,0,0,.07)}
textarea{width:100%;min-height:130px;font-family:Consolas,monospace;padding:10px;border-radius:10px;border:1px solid #cfd8e6}
#dataInput{min-height:260px}
button{padding:12px 15px;border:0;border-radius:10px;background:#174ea6;color:white;font-weight:bold;margin:5px;cursor:pointer}
.good{background:#eaf8f1}
.bad{background:#fff0f0}
.warn{background:#fff8e6}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border:1px solid #cfd8e6;padding:6px;text-align:center}
th{background:#eef3f9}
.scroll{max-height:460px;overflow:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.stat{background:#f7f9fc;border:1px solid #cfd8e6;border-radius:10px;padding:10px}
.small{font-size:12px;color:#5c6b82}
</style>
</head>

<body>
<header>
<h1>Cash 5 Plain Matrix Engine With Pretests</h1>
<p>Anchor Cap + Pair Bridge + Recovery Top 40 + Small Pretest Boost</p>
</header>

<main>
<div class="card">
<h2>1. Official Cash 5 Draw History</h2>
<textarea id="dataInput" placeholder="6/26/2026 01 11 22 24 35"></textarea>

<h2>2. Machine Pretest History</h2>
<textarea id="pretestInput" placeholder="Paste machine pretest draws here, one draw per line"></textarea>

<h2>3. Previous Generated Tickets</h2>
<textarea id="previousTicketsInput" placeholder="Paste previous generated tickets here"></textarea>

<button onclick="loadData()">Step 1 Load Data</button>
<button onclick="basicMatrix()">Step 2 Basic Matrix</button>
<button onclick="upgradeMatrix()">Step 3 Upgrade Matrix</button>
<button onclick="buildPools()">Step 4 Build Pools</button>
<button onclick="buildTop40()">Step 5 Build Top 40</button>
<button onclick="window.print()">Print</button>
<button onclick="exportExcel()">Excel</button>
</div>

<div id="msg" class="card warn">Start with Step 1.</div>
<div id="summary" class="card"></div>
<div id="matrix" class="card"></div>
<div id="upgrade" class="card"></div>
<div id="pools" class="card"></div>
<div id="top40" class="card"></div>
</main>

<script>
var PORTFOLIO_SIZE = 40;
var HARD_CAP = 18;
var STRONG_CAP = 16;
var SECONDARY_CAP = 10;
var WILD_CAP = 8;
var PRETEST_WEIGHT = 0.15;

var S = {
draws:[],
pretests:[],
previous:[],
freq:[],
last:[],
gaps:[],
pairs:{},
triples:{},
preFreq:[],
prePairs:{},
preTriples:{},
rows:[],
pairRows:[],
strong:[],
secondary:[],
wild:[],
recovery:[],
bridge4:[],
top40:[],
usage:[],
pairUse:{},
triUse:{},
log:[]
};

function two(n){
n = parseInt(n,10);
if(n < 10){return "0" + n;}
return "" + n;
}

function resetState(){
var i;
S.freq = [];
S.last = [];
S.gaps = [];
S.preFreq = [];

for(i=0;i<36;i++){
S.freq.push(0);
S.last.push(-1);
S.gaps.push([]);
S.preFreq.push(0);
}

S.pairs = {};
S.triples = {};
S.prePairs = {};
S.preTriples = {};
S.rows = [];
S.pairRows = [];
S.strong = [];
S.secondary = [];
S.wild = [];
S.recovery = [];
S.bridge4 = [];
S.top40 = [];
S.usage = [];

for(i=0;i<36;i++){S.usage.push(0);}

S.pairUse = {};
S.triUse = {};
S.log = [];
}

function msg(t,cls){
if(!cls){cls = "warn";}
document.getElementById("msg").className = "card " + cls;
document.getElementById("msg").innerHTML = t;
}

function sortNums(a){
return a.slice().sort(function(x,y){return x-y;});
}

function fmt(a){
var b = sortNums(a);
var out = [];
var i;
for(i=0;i<b.length;i++){out.push(two(b[i]));}
return out.join(" - ");
}

function key(a){
var b = sortNums(a);
return b.join("-");
}

function pairKey(a,b){
if(a < b){return a + "-" + b;}
return b + "-" + a;
}

function triKey(a,b,c){
var arr = [a,b,c];
arr.sort(function(x,y){return x-y;});
return arr.join("-");
}

function avg(a){
var i,s;
if(!a || a.length===0){return 0;}
s = 0;
for(i=0;i<a.length;i++){s += a[i];}
return s / a.length;
}

function norm(v,min,max){
var x;
if(max===min){return 0;}
x = (v-min)/(max-min);
if(x < 0){x = 0;}
if(x > 1){x = 1;}
return x;
}

function overlap(a,b){
var i,c;
c = 0;
for(i=0;i<a.length;i++){
if(b.indexOf(a[i]) >= 0){c++;}
}
return c;
}
  function parseLines(raw){
var out = [];
var lines,m,nums,n,last5,unique,i,j,k;

if(!raw || !raw.trim()){return out;}

lines = raw.split(/\n+/);

for(i=0;i<lines.length;i++){
m = lines[i].match(/\d+/g);
if(!m){continue;}

nums = [];
for(j=0;j<m.length;j++){
n = parseInt(m[j],10);
if(n >= 1 && n <= 35){nums.push(n);}
}

if(nums.length >= 5){
last5 = nums.slice(nums.length-5);
unique = [];

for(k=0;k<last5.length;k++){
if(unique.indexOf(last5[k]) < 0){unique.push(last5[k]);}
}

unique.sort(function(a,b){return a-b;});

if(unique.length === 5){
out.push(unique);
}
}
}

return out;
}

function loadData(){
S.draws = parseLines(document.getElementById("dataInput").value);
S.pretests = parseLines(document.getElementById("pretestInput").value);
S.previous = parseLines(document.getElementById("previousTicketsInput").value);

resetState();

document.getElementById("matrix").innerHTML = "";
document.getElementById("upgrade").innerHTML = "";
document.getElementById("pools").innerHTML = "";
document.getElementById("top40").innerHTML = "";

if(S.draws.length < 20){
msg("Need at least 20 official Cash 5 draw lines.","bad");
return;
}

document.getElementById("summary").innerHTML =
"<h2>Step 1 Loaded</h2>" +
"<div class='grid'>" +
"<div class='stat'><b>" + S.draws.length + "</b><br>Official draws</div>" +
"<div class='stat'><b>" + S.pretests.length + "</b><br>Machine pretest draws</div>" +
"<div class='stat'><b>" + S.previous.length + "</b><br>Previous generated tickets</div>" +
"<div class='stat'><b>" + fmt(S.draws[S.draws.length-1]) + "</b><br>Last official draw</div>" +
"</div>" +
"<p class='small'>Pretests are used as a small boost only. Official draw history remains the main source.</p>";

msg("Step 1 complete. Run Step 2.","good");
}

function basicMatrix(){
var total,avgFreq,i,j,a,b,x,y,z,d,n,pk,tk,num,delay,gap,hot,time,base,row,html,r;

if(S.draws.length < 20){
msg("Run Step 1 first.","bad");
return;
}

total = S.draws.length;

for(i=0;i<S.draws.length;i++){
d = S.draws[i];

for(j=0;j<5;j++){
n = d[j];
S.freq[n] = S.freq[n] + 1;

if(S.last[n] >= 0){
S.gaps[n].push(i - S.last[n]);
}

S.last[n] = i;
}

for(a=0;a<5;a++){
for(b=a+1;b<5;b++){
pk = pairKey(d[a],d[b]);
if(!S.pairs[pk]){S.pairs[pk] = 0;}
S.pairs[pk] = S.pairs[pk] + 1;
}
}

for(x=0;x<5;x++){
for(y=x+1;y<5;y++){
for(z=y+1;z<5;z++){
tk = triKey(d[x],d[y],d[z]);
if(!S.triples[tk]){S.triples[tk] = 0;}
S.triples[tk] = S.triples[tk] + 1;
}
}
}
}

analyzePretests();

avgFreq = total * 5 / 35;
S.rows = [];

for(num=1;num<=35;num++){
if(S.last[num] < 0){
delay = total;
}else{
delay = total - 1 - S.last[num];
}

gap = avg(S.gaps[num]);
if(!gap){gap = total;}

hot = S.freq[num] / avgFreq;
time = (delay + 1) / (gap + 1);

base =
0.40 * norm(hot,0,2.5) +
0.35 * norm(time,0,3.5) +
0.25 * norm(delay,0,25);

S.rows.push({
n:num,
freq:S.freq[num],
delay:delay,
gap:gap,
hot:hot,
time:time,
base:base,
pretest:pretestNumberScore(num),
score:base
});
}

S.rows.sort(function(a,b){
if(b.score !== a.score){return b.score - a.score;}
return a.n - b.n;
});

html = "<h2>Step 2 Basic Matrix</h2>";
html += "<div class='scroll'><table>";
html += "<tr><th>Rank</th><th>#</th><th>Freq</th><th>Delay</th><th>Gap</th><th>Hot</th><th>Time</th><th>Base</th><th>Pretest</th></tr>";

for(r=0;r<S.rows.length;r++){
row = S.rows[r];

html += "<tr>";
html += "<td>" + (r+1) + "</td>";
html += "<td><b>" + two(row.n) + "</b></td>";
html += "<td>" + row.freq + "</td>";
html += "<td>" + row.delay + "</td>";
html += "<td>" + row.gap.toFixed(1) + "</td>";
html += "<td>" + row.hot.toFixed(2) + "</td>";
html += "<td>" + row.time.toFixed(2) + "</td>";
html += "<td>" + row.base.toFixed(3) + "</td>";
html += "<td>" + row.pretest.toFixed(3) + "</td>";
html += "</tr>";
}

html += "</table></div>";

document.getElementById("matrix").innerHTML = html;
msg("Step 2 complete. Run Step 3.","good");
}

function analyzePretests(){
var i,j,a,b,c,d,n,pk,tk;

for(i=0;i<S.pretests.length;i++){
d = S.pretests[i];

for(j=0;j<5;j++){
n = d[j];
S.preFreq[n] = S.preFreq[n] + 1;
}

for(a=0;a<5;a++){
for(b=a+1;b<5;b++){
pk = pairKey(d[a],d[b]);
if(!S.prePairs[pk]){S.prePairs[pk] = 0;}
S.prePairs[pk] = S.prePairs[pk] + 1;
}
}

for(a=0;a<5;a++){
for(b=a+1;b<5;b++){
for(c=b+1;c<5;c++){
tk = triKey(d[a],d[b],d[c]);
if(!S.preTriples[tk]){S.preTriples[tk] = 0;}
S.preTriples[tk] = S.preTriples[tk] + 1;
}
}
}
}
}

function pretestNumberScore(n){
var avgPre,rate;

if(S.pretests.length === 0){return 0;}

avgPre = S.pretests.length * 5 / 35;
if(avgPre <= 0){return 0;}

rate = S.preFreq[n] / avgPre;

return norm(rate,0,2.5);
}

function upgradeMatrix(){
var i,r,ps,cs,os,bs,pre,html;

if(S.rows.length === 0){
msg("Run Step 2 first.","bad");
return;
}

S.pairRows = buildPairMomentum();

for(i=0;i<S.rows.length;i++){
r = S.rows[i];

ps = positionScore(r.n);
cs = clusterScore(r.n);
os = oscillationScore(r.n);
bs = bestPairScore(r.n);
pre = pretestNumberScore(r.n);

r.position = ps;
r.cluster = cs;
r.osc = os;
r.pair = bs;
r.pretest = pre;

r.score = r.base + 0.18*ps + 0.18*cs + 0.12*os + 0.20*bs + PRETEST_WEIGHT*pre;
}

S.rows.sort(function(a,b){
if(b.score !== a.score){return b.score - a.score;}
return a.n - b.n;
});

html = "<h2>Step 3 Upgrade Matrix With Pretest Boost</h2>";
html += "<div class='scroll'><table>";
html += "<tr><th>Rank</th><th>#</th><th>Base</th><th>Position</th><th>Cluster</th><th>Osc</th><th>Pair</th><th>Pretest</th><th>Total</th></tr>";

for(i=0;i<S.rows.length;i++){
r = S.rows[i];

html += "<tr>";
html += "<td>" + (i+1) + "</td>";
html += "<td><b>" + two(r.n) + "</b></td>";
html += "<td>" + r.base.toFixed(3) + "</td>";
html += "<td>" + r.position.toFixed(3) + "</td>";
html += "<td>" + r.cluster.toFixed(3) + "</td>";
html += "<td>" + r.osc.toFixed(3) + "</td>";
html += "<td>" + r.pair.toFixed(3) + "</td>";
html += "<td>" + r.pretest.toFixed(3) + "</td>";
html += "<td><b>" + r.score.toFixed(3) + "</b></td>";
html += "</tr>";
}

html += "</table></div>";

document.getElementById("upgrade").innerHTML = html;
msg("Step 3 complete. Run Step 4.","good");
}
  function buildPairMomentum(){
var windows,all,wi,w,start,count,size,i,d,a,b,pk,k,rate,arr,p,row,accel,preBoost;

windows = [5,10,20,60];
all = {};

for(wi=0;wi<windows.length;wi++){
w = windows[wi];
start = Math.max(0,S.draws.length - w);
count = {};
size = S.draws.length - start;

for(i=start;i<S.draws.length;i++){
d = S.draws[i];

for(a=0;a<5;a++){
for(b=a+1;b<5;b++){
pk = pairKey(d[a],d[b]);
if(!count[pk]){count[pk] = 0;}
count[pk] = count[pk] + 1;
}
}
}

for(k in count){
if(count.hasOwnProperty(k)){
if(!all[k]){
all[k] = {
key:k,
score:0,
w5:0,
w10:0,
w20:0,
w60:0,
pre:0,
nums:k.split("-").map(function(x){return parseInt(x,10);})
};
}

rate = count[k] / size;

if(w === 5){all[k].w5 = rate;}
if(w === 10){all[k].w10 = rate;}
if(w === 20){all[k].w20 = rate;}
if(w === 60){all[k].w60 = rate;}
}
}
}

arr = [];

for(p in all){
if(all.hasOwnProperty(p)){
row = all[p];
accel = (row.w5 - row.w20) + (row.w10 - row.w60);
preBoost = pretestPairScore(row.key);
row.pre = preBoost;

row.score =
0.42*row.w5 +
0.30*row.w10 +
0.18*row.w20 +
0.10*row.w60 +
Math.max(0,accel)*1.25 +
PRETEST_WEIGHT*preBoost;

arr.push(row);
}
}

arr.sort(function(a,b){
if(b.score !== a.score){return b.score - a.score;}
return a.key.localeCompare(b.key);
});

return arr;
}

function pretestPairScore(pk){
var avgPair,rate;

if(S.pretests.length === 0){return 0;}

avgPair = S.pretests.length * 10 / 595;
if(avgPair <= 0){return 0;}

rate = (S.prePairs[pk] || 0) / avgPair;

return norm(rate,0,3);
}

function pretestTripleScore(tk){
var avgTri,rate;

if(S.pretests.length === 0){return 0;}

avgTri = S.pretests.length * 10 / 6545;
if(avgTri <= 0){return 0;}

rate = (S.preTriples[tk] || 0) / avgTri;

return norm(rate,0,4);
}

function positionScore(n){
var windows,final,wi,o,start,c,app,i,d,j,x,sorted;

windows = [
{w:10,wt:0.45},
{w:20,wt:0.35},
{w:50,wt:0.20}
];

final = [0,0,0,0,0];

for(wi=0;wi<windows.length;wi++){
o = windows[wi];
start = Math.max(0,S.draws.length - o.w);
c = [0,0,0,0,0];
app = 0;

for(i=start;i<S.draws.length;i++){
d = sortNums(S.draws[i]);

for(j=0;j<5;j++){
if(d[j] === n){
c[j] = c[j] + 1;
app = app + 1;
}
}
}

if(app > 0){
for(x=0;x<5;x++){
final[x] = final[x] + (c[x] / app) * o.wt;
}
}
}

sorted = final.slice().sort(function(a,b){return b-a;});
return sorted[0] - (sorted[1] || 0);
}

function clusterScore(n){
var configs,score,ci,o,start,f,size,i,d,j,left,mid,right,cluster,center;

configs = [
{w:10,wt:0.45},
{w:25,wt:0.35},
{w:60,wt:0.20}
];

score = 0;

for(ci=0;ci<configs.length;ci++){
o = configs[ci];
start = Math.max(0,S.draws.length - o.w);
f = [];
for(i=0;i<36;i++){f.push(0);}
size = S.draws.length - start;

for(i=start;i<S.draws.length;i++){
d = S.draws[i];
for(j=0;j<5;j++){
f[d[j]] = f[d[j]] + 1;
}
}

left = f[n-1] || 0;
mid = f[n] || 0;
right = f[n+1] || 0;

cluster = (left*0.75 + mid*1.25 + right*0.75) / (size || 1);
center = mid / (left + mid + right + 1);

score = score + (cluster*0.6 + center*0.4) * o.wt;
}

return score;
}

function oscillationScore(n){
var start,wave,size,i,prev,cur;

start = Math.max(0,S.draws.length - 25);
wave = 0;
size = S.draws.length - start;

for(i=start+1;i<S.draws.length;i++){
prev = S.draws[i-1];
cur = S.draws[i];

if(prev.indexOf(n-1) >= 0 && cur.indexOf(n) >= 0){wave = wave + 1.3;}
if(prev.indexOf(n+1) >= 0 && cur.indexOf(n) >= 0){wave = wave + 1.3;}
if(cur.indexOf(n-1) >= 0 || cur.indexOf(n+1) >= 0){wave = wave + 0.25;}
}

return wave / (size || 1);
}

function bestPairScore(n){
var best,i,p;

best = 0;

for(i=0;i<S.pairRows.length;i++){
p = S.pairRows[i];

if(p.nums.indexOf(n) >= 0 && p.score > best){
best = p.score;
}
}

return best;
}

function buildPools(){
var ranked,i,n,lastDraw,used,j,html;

if(S.rows.length === 0 || S.pairRows.length === 0){
msg("Run Step 3 first.","bad");
return;
}

ranked = [];
for(i=0;i<S.rows.length;i++){
ranked.push(S.rows[i].n);
}

S.strong = ranked.slice(0,10);
S.secondary = ranked.slice(10,22);
S.wild = ranked.slice(22,35);
S.recovery = [];

lastDraw = S.draws[S.draws.length-1];

for(i=0;i<lastDraw.length;i++){
n = lastDraw[i];
used = 0;

for(j=0;j<S.previous.length;j++){
if(S.previous[j].indexOf(n) >= 0){used = used + 1;}
}

if(used < 5 && S.recovery.indexOf(n) < 0){
S.recovery.push(n);
}
}

for(i=0;i<ranked.length && S.recovery.length<12;i++){
n = ranked[i];

if(S.wild.indexOf(n) >= 0 && S.recovery.indexOf(n) < 0){
S.recovery.push(n);
}
}

for(i=0;i<ranked.length && S.recovery.length<12;i++){
n = ranked[i];

if(S.recovery.indexOf(n) < 0){
S.recovery.push(n);
}
}

S.bridge4 = buildBridge4();

html = "<h2>Step 4 Pools</h2>";
html += "<div class='grid'>";
html += "<div class='stat'><b>" + numsToText(S.strong) + "</b><br>Strong Pool</div>";
html += "<div class='stat'><b>" + numsToText(S.secondary) + "</b><br>Secondary Pool</div>";
html += "<div class='stat'><b>" + numsToText(S.wild) + "</b><br>Wildcard Pool</div>";
html += "<div class='stat'><b>" + numsToText(S.recovery) + "</b><br>Recovery Pool</div>";
html += "</div>";

html += "<h3>Top Pair Momentum With Pretest Boost</h3>";
html += "<div class='scroll'><table>";
html += "<tr><th>Rank</th><th>Pair</th><th>Official+Pretest Score</th><th>Pretest Boost</th></tr>";

for(i=0;i<Math.min(30,S.pairRows.length);i++){
html += "<tr>";
html += "<td>" + (i+1) + "</td>";
html += "<td><b>" + S.pairRows[i].key + "</b></td>";
html += "<td>" + S.pairRows[i].score.toFixed(3) + "</td>";
html += "<td>" + S.pairRows[i].pre.toFixed(3) + "</td>";
html += "</tr>";
}

html += "</table></div>";

html += "<h3>Top 4-Number Bridge Groups</h3>";
html += "<div class='scroll'><table>";
html += "<tr><th>Rank</th><th>Bridge</th><th>Score</th></tr>";

for(i=0;i<Math.min(40,S.bridge4.length);i++){
html += "<tr>";
html += "<td>" + (i+1) + "</td>";
html += "<td><b>" + fmt(S.bridge4[i].nums) + "</b></td>";
html += "<td>" + S.bridge4[i].score.toFixed(3) + "</td>";
html += "</tr>";
}

html += "</table></div>";

document.getElementById("pools").innerHTML = html;

msg("Step 4 complete. Run Step 5.","good");
}
  function numsToText(arr){
var out,i;
out = [];
for(i=0;i<arr.length;i++){
out.push(two(arr[i]));
}
return out.join(" - ");
}

function buildBridge4(){
var out,a,b,c,d,nums;

out = [];

for(a=0;a<S.strong.length;a++){
for(b=a+1;b<S.strong.length;b++){
for(c=b+1;c<S.strong.length;c++){
for(d=c+1;d<S.strong.length;d++){
nums = [S.strong[a],S.strong[b],S.strong[c],S.strong[d]];
nums.sort(function(x,y){return x-y;});
out.push({nums:nums,score:bridgeScore(nums)});
}
}
}
}

out.sort(function(x,y){
if(y.score !== x.score){return y.score - x.score;}
return key(x.nums).localeCompare(key(y.nums));
});

return out;
}

function bridgeScore(nums){
var score,i,n,r,j,pk,pairScore,p,x,y,z,tk,preTriple;

score = 0;

for(i=0;i<nums.length;i++){
n = nums[i];

for(r=0;r<S.rows.length;r++){
if(S.rows[r].n === n){
score = score + S.rows[r].score;
break;
}
}
}

for(i=0;i<nums.length;i++){
for(j=i+1;j<nums.length;j++){
pk = pairKey(nums[i],nums[j]);
pairScore = 0;

for(p=0;p<S.pairRows.length;p++){
if(S.pairRows[p].key === pk){
pairScore = S.pairRows[p].score;
break;
}
}

score = score + pairScore*1.75;
score = score + (S.pairs[pk] || 0)*0.02;
score = score + PRETEST_WEIGHT*pretestPairScore(pk)*0.50;
}
}

for(x=0;x<nums.length;x++){
for(y=x+1;y<nums.length;y++){
for(z=y+1;z<nums.length;z++){
tk = triKey(nums[x],nums[y],nums[z]);
preTriple = pretestTripleScore(tk);
score = score + PRETEST_WEIGHT*preTriple*0.25;
}
}
}

return score;
}

function buildTop40(){
if(S.bridge4.length === 0){
msg("Run Step 4 first.","bad");
return;
}

S.top40 = [];
S.usage = [];
for(var i=0;i<36;i++){S.usage.push(0);}
S.pairUse = {};
S.triUse = {};
S.log = [];

build4Plus1();
build3Plus2();
buildBalanced();
buildRecovery();
finishTop40();

renderTop40();
msg("Step 5 complete. Top 40 created.","good");
}

function build4Plus1(){
var challengers,made,i,bridge,j,ch;

challengers = S.secondary.concat(S.wild).concat(S.recovery);
made = 0;

for(i=0;i<S.bridge4.length && made<12;i++){
bridge = S.bridge4[i].nums;

for(j=0;j<challengers.length;j++){
ch = challengers[(i+j)%challengers.length];

if(addTicket(bridge.concat([ch]),"4+1 Bridge","4 matrix numbers + 1 challenger",true)){
made = made + 1;
break;
}
}
}
}

function build3Plus2(){
var outsiders,made,i,nums;

outsiders = S.secondary.concat(S.recovery).concat(S.wild);
made = 0;

for(i=0;i<80 && made<10;i++){
nums = [
S.strong[i%S.strong.length],
S.strong[(i+3)%S.strong.length],
S.strong[(i+6)%S.strong.length],
outsiders[(i+2)%outsiders.length],
outsiders[(i+8)%outsiders.length]
];

if(addTicket(nums,"3+2 Blend","3 matrix numbers + 2 challengers",true)){
made = made + 1;
}
}
}

function buildBalanced(){
var hot,medium,cold,made,i,nums;

hot = S.strong.slice(0,6);
medium = S.strong.slice(6).concat(S.secondary);
cold = S.wild.concat(S.recovery);
made = 0;

for(i=0;i<100 && made<10;i++){
nums = [
hot[i%hot.length],
hot[(i+3)%hot.length],
medium[(i+2)%medium.length],
medium[(i+7)%medium.length],
cold[(i+5)%cold.length]
];

if(addTicket(nums,"2+2+1 Balanced","2 hot + 2 medium + 1 cold recovery",true)){
made = made + 1;
}
}
}

function buildRecovery(){
var made,i,nums;

made = 0;

for(i=0;i<100 && made<8;i++){
nums = [
S.recovery[i%S.recovery.length],
S.recovery[(i+4)%S.recovery.length],
S.strong[(i+2)%S.strong.length],
S.secondary[(i+5)%S.secondary.length],
S.wild[(i+3)%S.wild.length]
];

if(addTicket(nums,"Recovery Wildcard","missed draw recovery + wildcard protection",true)){
made = made + 1;
}
}
}

function finishTop40(){
var ranked,i,a,b,c,d,e,nums;

ranked = [];
for(i=0;i<S.rows.length;i++){
ranked.push(S.rows[i].n);
}

for(a=0;a<ranked.length && S.top40.length<PORTFOLIO_SIZE;a++){
for(b=a+1;b<ranked.length && S.top40.length<PORTFOLIO_SIZE;b++){
for(c=b+1;c<ranked.length && S.top40.length<PORTFOLIO_SIZE;c++){
for(d=c+1;d<ranked.length && S.top40.length<PORTFOLIO_SIZE;d++){
for(e=d+1;e<ranked.length && S.top40.length<PORTFOLIO_SIZE;e++){
nums = [ranked[a],ranked[b],ranked[c],ranked[d],ranked[e]];
addTicket(nums,"Safe Fill","deterministic fill to complete Top 40",false);
}
}
}
}
}
}

function addTicket(nums,type,role,strict){
var pairs,triples,i;

nums = uniqueSorted(nums);

if(nums.length !== 5){
S.log.push(["reject",fmt(nums),type,"invalid or duplicate number"]);
return false;
}

if(ticketExists(nums)){
S.log.push(["reject",fmt(nums),type,"duplicate ticket"]);
return false;
}

if(!balanceOK(nums,strict)){
S.log.push(["reject",fmt(nums),type,"balance rule"]);
return false;
}

if(overHardCap(nums)){
S.log.push(["reject",fmt(nums),type,"hard cap"]);
return false;
}

if(strict && !classCapOK(nums)){
S.log.push(["reject",fmt(nums),type,"class cap"]);
return false;
}

pairs = ticketPairs(nums);
triples = ticketTriples(nums);

if(strict && pairCapBlocked(pairs)){
S.log.push(["reject",fmt(nums),type,"pair cap"]);
return false;
}

if(strict && tripleCapBlocked(triples)){
S.log.push(["reject",fmt(nums),type,"triple cap"]);
return false;
}

S.top40.push({
nums:nums,
type:type,
role:role,
score:ticketScore(nums,type)
});

for(i=0;i<nums.length;i++){
S.usage[nums[i]] = S.usage[nums[i]] + 1;
}

for(i=0;i<pairs.length;i++){
if(!S.pairUse[pairs[i]]){S.pairUse[pairs[i]] = 0;}
S.pairUse[pairs[i]] = S.pairUse[pairs[i]] + 1;
}

for(i=0;i<triples.length;i++){
if(!S.triUse[triples[i]]){S.triUse[triples[i]] = 0;}
S.triUse[triples[i]] = S.triUse[triples[i]] + 1;
}

S.log.push(["accept",fmt(nums),type,"accepted"]);
return true;
}

function uniqueSorted(nums){
var out,i,n;

out = [];

for(i=0;i<nums.length;i++){
n = parseInt(nums[i],10);

if(n >= 1 && n <= 35 && out.indexOf(n) < 0){
out.push(n);
}
}

out.sort(function(a,b){return a-b;});
return out;
}

function ticketExists(nums){
var k,i;

k = key(nums);

for(i=0;i<S.top40.length;i++){
if(key(S.top40[i].nums) === k){
return true;
}
}

return false;
}

function balanceOK(nums,strict){
var sum,odd,low,zones,i,n,maxZone,last,maxPrev,p,ov;

sum = 0;
for(i=0;i<nums.length;i++){
sum = sum + nums[i];
}

if(sum < 35 || sum > 155){
return false;
}

odd = 0;
low = 0;
zones = [0,0,0,0,0];

for(i=0;i<nums.length;i++){
n = nums[i];

if(n%2 === 1){odd = odd + 1;}
if(n <= 17){low = low + 1;}

if(n>=1 && n<=7){zones[0] = zones[0] + 1;}
else if(n>=8 && n<=14){zones[1] = zones[1] + 1;}
else if(n>=15 && n<=21){zones[2] = zones[2] + 1;}
else if(n>=22 && n<=28){zones[3] = zones[3] + 1;}
else if(n>=29 && n<=35){zones[4] = zones[4] + 1;}
}

if(odd === 0 || odd === 5){
return false;
}

if(low === 0 || low === 5){
return false;
}

maxZone = 0;
for(i=0;i<zones.length;i++){
if(zones[i] > maxZone){maxZone = zones[i];}
}

if(maxZone > 3){
return false;
}

if(strict){
last = S.draws[S.draws.length-1];

if(last && overlap(nums,last) > 3){
return false;
}

maxPrev = 0;

for(p=0;p<S.previous.length;p++){
ov = overlap(nums,S.previous[p]);
if(ov > maxPrev){maxPrev = ov;}
}

if(maxPrev >= 4){
return false;
}
}

return true;
}

function overHardCap(nums){
var i;

for(i=0;i<nums.length;i++){
if(S.usage[nums[i]] >= HARD_CAP){
return true;
}
}

return false;
}

function classCapOK(nums){
var i,n;

for(i=0;i<nums.length;i++){
n = nums[i];

if(S.strong.indexOf(n) >= 0 && S.usage[n] >= STRONG_CAP){
return false;
}

if(S.secondary.indexOf(n) >= 0 && S.usage[n] >= SECONDARY_CAP){
return false;
}

if(S.wild.indexOf(n) >= 0 && S.usage[n] >= WILD_CAP){
return false;
}
}

return true;
}

function pairCapBlocked(pairs){
var i;

for(i=0;i<pairs.length;i++){
if((S.pairUse[pairs[i]] || 0) >= 5){
return true;
}
}

return false;
}

function tripleCapBlocked(triples){
var i;

for(i=0;i<triples.length;i++){
if((S.triUse[triples[i]] || 0) >= 2){
return true;
}
}

return false;
}

function ticketPairs(nums){
var out,i,j;

out = [];

for(i=0;i<5;i++){
for(j=i+1;j<5;j++){
out.push(pairKey(nums[i],nums[j]));
}
}

return out;
}

function ticketTriples(nums){
var out,i,j,k;

out = [];

for(i=0;i<5;i++){
for(j=i+1;j<5;j++){
for(k=j+1;k<5;k++){
out.push(triKey(nums[i],nums[j],nums[k]));
}
}
}

return out;
}

function ticketScore(nums,type){
var score,i,r,a,b,pk,pairScore,p,x,y,z,tk,prePair,preTri;

score = 0;

for(i=0;i<nums.length;i++){
for(r=0;r<S.rows.length;r++){
if(S.rows[r].n === nums[i]){
score = score + S.rows[r].score;
break;
}
}
}

for(a=0;a<5;a++){
for(b=a+1;b<5;b++){
pk = pairKey(nums[a],nums[b]);
pairScore = 0;

for(p=0;p<S.pairRows.length;p++){
if(S.pairRows[p].key === pk){
pairScore = S.pairRows[p].score;
break;
}
}

prePair = pretestPairScore(pk);

score = score + pairScore*1.25;
score = score + (S.pairs[pk] || 0)*0.015;
score = score + PRETEST_WEIGHT*prePair*0.25;
}
}

for(x=0;x<5;x++){
for(y=x+1;y<5;y++){
for(z=y+1;z<5;z++){
tk = triKey(nums[x],nums[y],nums[z]);
preTri = pretestTripleScore(tk);
score = score + (S.triples[tk] || 0)*0.025;
score = score + PRETEST_WEIGHT*preTri*0.10;
}
}
}

if(type === "4+1 Bridge"){score = score + 0.90;}
if(type === "3+2 Blend"){score = score + 0.65;}
if(type === "2+2+1 Balanced"){score = score + 0.45;}
if(type === "Recovery Wildcard"){score = score + 0.35;}
if(type === "Safe Fill"){score = score + 0.10;}

return score;
}

function countType(type){
var c,i;

c = 0;

for(i=0;i<S.top40.length;i++){
if(S.top40[i].type === type){
c = c + 1;
}
}

return c;
}

html += "<h2>Number Usage</h2>";

for(n=1;n<=35;n++){

if(S.strong.indexOf(n) >= 0){cls = "Strong";}
else if(S.secondary.indexOf(n) >= 0){cls = "Secondary";}

html += "<tr>";

}

html += "</table></div>";

html += "<h2>Calculation Log</h2>";

html += "<tr><th>Status</th><th>Ticket</th><th>Bucket</th><th>Reason</th></tr>";

start = Math.max(0,S.log.length-200);

for(i=start;i<S.log.length;i++){
html += "<tr>";
html += "<td>" + S.log[i][0] + "</td>";
html += "<td>" + S.log[i][1] + "</td>";
html += "<td>" + S.log[i][2] + "</td>";
html += "<td>" + S.log[i][3] + "</td>";
html += "</tr>";
}

html += "</table></div>";

html += "<p class='small'>Pretests are used only as a small boost. Same input creates the same Top 40. Cash 5 is random, so this cannot guarantee a win.</p>";

document.getElementById("top40").innerHTML = html;
}
