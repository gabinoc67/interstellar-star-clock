<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movies Library</title>
  <style>
    :root{
      --bg1:#030712;
      --bg2:#071326;
      --bg3:#0b1d3a;
      --panel:rgba(10,18,35,.86);
      --panel2:rgba(18,30,58,.94);
      --ink:#eef4ff;
      --muted:#9fb3d8;
      --line:rgba(145,180,255,.18);
      --accent:#7dd3fc;
      --stop:#fca5a5;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
      min-height:100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(124,58,237,.18), transparent 24%),
        radial-gradient(circle at 80% 10%, rgba(56,189,248,.16), transparent 22%),
        radial-gradient(circle at 70% 80%, rgba(59,130,246,.16), transparent 25%),
        linear-gradient(180deg, var(--bg3), var(--bg2) 45%, var(--bg1));
      overflow-x:hidden;
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
    }

    body::before{
      background-image:
        radial-gradient(2px 2px at 8% 14%, rgba(255,255,255,.9), transparent 60%),
        radial-gradient(1.5px 1.5px at 22% 76%, rgba(255,255,255,.8), transparent 60%),
        radial-gradient(2px 2px at 35% 28%, rgba(255,255,255,.85), transparent 60%),
        radial-gradient(1.5px 1.5px at 46% 60%, rgba(255,255,255,.75), transparent 60%),
        radial-gradient(2px 2px at 58% 22%, rgba(255,255,255,.85), transparent 60%),
        radial-gradient(1.5px 1.5px at 69% 73%, rgba(255,255,255,.75), transparent 60%),
        radial-gradient(2px 2px at 82% 34%, rgba(255,255,255,.8), transparent 60%),
        radial-gradient(1.5px 1.5px at 91% 61%, rgba(255,255,255,.85), transparent 60%);
      opacity:.95;
    }

    body::after{
      background:radial-gradient(ellipse at center, rgba(255,255,255,.03), transparent 55%);
      mix-blend-mode:screen;
    }

    .wrap{
      position:relative;
      z-index:1;
      max-width:980px;
      margin:0 auto;
      padding:28px 18px 36px;
    }

    .hero{
      background:linear-gradient(180deg, rgba(14,23,45,.86), rgba(10,18,35,.78));
      border:1px solid var(--line);
      border-radius:24px;
      padding:24px;
      box-shadow:0 0 24px rgba(125,211,252,.18);
      backdrop-filter:blur(8px);
      margin-bottom:22px;
    }

    .hero h1{
      margin:0 0 8px;
      font-size:clamp(28px,4vw,42px);
      line-height:1.08;
      letter-spacing:.4px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.6;
      max-width:900px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:18px;
    }

    .card{
      background:linear-gradient(180deg, var(--panel2), var(--panel));
      border:1px solid var(--line);
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.24);
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .card:hover{
      transform:translateY(-4px);
      border-color:rgba(125,211,252,.42);
      box-shadow:0 14px 38px rgba(0,0,0,.34), 0 0 24px rgba(125,211,252,.12);
    }

    .video-wrap{
      aspect-ratio:16/9;
      background:
        radial-gradient(circle at 30% 30%, rgba(125,211,252,.18), transparent 25%),
        radial-gradient(circle at 70% 35%, rgba(167,139,250,.18), transparent 24%),
        linear-gradient(135deg, rgba(125,211,252,.10), rgba(167,139,250,.12)),
        rgba(255,255,255,.02);
      border-bottom:1px solid var(--line);
      position:relative;
      overflow:hidden;
    }

    video{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
      background:#000;
    }

    .content{
      padding:16px 16px 18px;
    }

    .title{
      margin:0 0 8px;
      font-size:20px;
      line-height:1.25;
      color:#f7fbff;
    }

    .path{
      margin:0 0 14px;
      color:var(--muted);
      font-size:12.5px;
      line-height:1.45;
      word-break:break-word;
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      border-radius:12px;
      padding:10px 16px;
      font-weight:700;
      font-size:13px;
      cursor:pointer;
      transition:transform .15s ease, filter .15s ease;
    }

    button:hover{
      transform:translateY(-1px);
      filter:brightness(1.04);
    }

    .play-btn{
      background:linear-gradient(180deg, #9ee7ff, #7dd3fc);
      color:#08111f;
    }

    .stop-btn{
      background:linear-gradient(180deg, #fecaca, #fca5a5);
      color:#2b0c0c;
    }

    footer{
      margin-top:24px;
      padding:16px 4px 4px;
      color:var(--muted);
      font-size:13px;
      text-align:center;
    }

    @media (max-width:700px){
      .wrap{padding:16px 12px 28px}
      .hero{padding:18px}
      .content{padding:14px}
      .title{font-size:18px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Movies Library</h1>
      <p>
        Movie library with play and stop controls so users can watch the video directly on the page.
      </p>
    </section>

    <section class="grid">
      <article class="card">
        <div class="video-wrap">
          <video id="video1" preload="metadata">
            <source src="https://gabinoc67.github.io/interstellar-star-clock/warpdrive/starsmoving.mov" type="video/quicktime">
            Your browser does not support this movie format.
          </video>
        </div>
        <div class="content">
          <h2 class="title">Stars Moving</h2>
          <p class="path">/interstellar-star-clock/warpdrive/starsmoving.mov</p>
          <div class="controls">
            <button class="play-btn" onclick="playVideo('video1')">Play</button>
            <button class="stop-btn" onclick="stopVideo('video1')">Stop</button>
          </div>
        </div>
      </article>
    </section>

    <footer>
      Movies Library • 1 linked item
    </footer>
  </div>

  <script>
    const videos = document.querySelectorAll('video');

    function stopAllVideos() {
      videos.forEach(video => {
        video.pause();
        video.currentTime = 0;
      });
    }

    function playVideo(id) {
      stopAllVideos();
      const video = document.getElementById(id);
      video.play();
    }

    function stopVideo(id) {
      const video = document.getElementById(id);
      video.pause();
      video.currentTime = 0;
    }

    videos.forEach(video => {
      video.addEventListener('ended', () => {
        video.pause();
        video.currentTime = 0;
      });
    });
  </script>
</body>
</html>
