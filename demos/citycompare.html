<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<title>CST Cosmic Catastrophe Clock — Ancient Sites Explorer</title>

<style>
:root{
  --bg:#060815;
  --panel:#101528;
  --panel2:#161d34;
  --ink:#e9edff;
  --muted:#9fa8d7;
  --accent:#7dd3fc;
  --accentSoft:#0ea5e9;
  --border:#222a4d;
  --danger:#f97373;
}

body{
  margin:0;
  background:radial-gradient(circle at top,#111827 0,#020617 60%);
  color:var(--ink);
  font-family:system-ui,Segoe UI,Roboto;
  font-size:14px;
}

.wrap{
  max-width:1280px;
  margin:auto;
  padding:16px;
}

h1{font-size:20px;margin:0;}
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
}

.layout{
  display:grid;
  grid-template-columns:270px 1fr 1fr;
  gap:12px;
}
</style>
</head>

<body>
<div class="wrap">

<h1>CST Cosmic Catastrophe Clock — Ancient Sites Explorer</h1>

<div class="layout">

<!-- FILTER PANEL -->
<div class="card">
<h2>Filters</h2>
<select id="regionSelect"></select>
<input id="searchBox" placeholder="Search site..." />
</div>

<!-- TABLE -->
<div class="card">
<h2>Sites</h2>
<table>
<thead>
<tr>
<th>Site</th><th>Country</th><th>Lat</th><th>Lon</th>
</tr>
</thead>
<tbody id="siteTableBody"></tbody>
</table>
</div>

<!-- DETAILS -->
<div class="card">
<h2>Details</h2>
<div id="detailPanel"></div>
</div>

</div>

  function renderTable(){
const tbody=document.getElementById("siteTableBody");
tbody.innerHTML="";

sites.forEach(site=>{
let row=document.createElement("tr");

row.innerHTML=`
<td><button onclick="showDetails('${site.name}')">${site.name}</button></td>
<td>${site.country}</td>
<td>${site.lat}</td>
<td>${site.lon}</td>
`;

tbody.appendChild(row);
});
}

function showDetails(name){
const site=sites.find(s=>s.name===name);

document.getElementById("detailPanel").innerHTML=`
<b>${site.name}</b><br>
Region: ${site.region}<br>
Lat/Lon: ${site.lat}, ${site.lon}<br><br>

Start: ${site.start}<br>
End: ${site.end || "—"}<br><br>

Notes: ${site.notes}<br><br>
Events: ${site.events}
`;
}

renderTable();
