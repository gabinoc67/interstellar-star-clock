<script>
const raw = document.getElementById("linkData").textContent.trim();

const links = raw
  .split("\n")
  .map(line => {
    const parts = line.split("\t");
    return {
      url: (parts[0] || "").trim(),
      title: (parts.slice(1).join(" ") || "").trim()
    };
  })
  .filter(item => item.url && item.title)
  .sort((a,b) => a.title.localeCompare(b.title, undefined, {
    numeric:true,
    sensitivity:"base"
  }));

const grid = document.getElementById("grid");
const search = document.getElementById("search");
const counter = document.getElementById("counter");

function escapeHtml(text){
  return text.replace(/[&<>"']/g, char => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[char]));
}

function render(){
  const q = search.value.toLowerCase().trim();

  const filtered = links.filter(item =>
    item.title.toLowerCase().includes(q) ||
    item.url.toLowerCase().includes(q)
  );

  counter.textContent = filtered.length + " / " + links.length + " simulations";

  grid.innerHTML = filtered.map(item => `
    <a class="card" href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">
      <div class="title">${escapeHtml(item.title)}</div>
      <div class="url">${escapeHtml(item.url)}</div>
    </a>
  `).join("");
}

search.addEventListener("input", render);
render();
</script>
