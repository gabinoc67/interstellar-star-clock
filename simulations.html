<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Simulations</title>

<style>
:root{
  --bg:#061019;
  --panel:#0d1b28;
  --line:#25465f;
  --text:#eaf6ff;
  --muted:#a9bed0;
  --accent2:#7dffb3;
  --shadow:0 10px 28px rgba(0,0,0,.32);
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:
    radial-gradient(circle at top left,rgba(89,208,255,.12),transparent 36%),
    radial-gradient(circle at top right,rgba(125,255,179,.08),transparent 32%),
    linear-gradient(180deg,#050d15,#07131e 58%,#050c13);
  color:var(--text);
  font-family:Arial,Helvetica,sans-serif;
}

a{
  color:inherit;
  text-decoration:none;
}

.wrap{
  width:min(1880px,97%);
  margin:0 auto;
  padding:20px 0 30px;
}

.main-title{
  text-align:center;
  font-size:34px;
  line-height:1.2;
  margin:6px 0 18px;
  font-weight:800;
  letter-spacing:.5px;
}

.controls{
  max-width:900px;
  margin:0 auto 18px;
  border:1px solid var(--line);
  background:var(--panel);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:14px;
  display:grid;
  grid-template-columns:1fr 140px 140px;
  gap:10px;
  align-items:center;
}

.search{
  width:100%;
  padding:12px 14px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#071522;
  color:var(--text);
  outline:none;
  font-size:14px;
}

.stat{
  border:1px solid var(--line);
  border-radius:12px;
  background:#091724;
  padding:10px;
  text-align:center;
}

.stat strong{
  display:block;
  color:var(--accent2);
  font-size:20px;
}

.stat span{
  color:var(--muted);
  font-size:11px;
}

.list{
  display:grid;
  grid-template-columns:repeat(5,minmax(0,1fr));
  gap:12px;
  align-items:stretch;
}

.card{
  min-height:92px;
  border:1px solid #1d3b53;
  background:linear-gradient(180deg,#0b1a27,#081520);
  border-radius:15px;
  padding:13px 14px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  transition:.18s ease;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.18);
}

.card:hover{
  transform:translateY(-2px);
  border-color:#3a7799;
  background:#102437;
}

.card-title{
  font-weight:700;
  color:#eefaff;
  font-size:13px;
  line-height:1.32;
  overflow-wrap:anywhere;
  word-break:normal;
  hyphens:auto;
}

.empty{
  display:none;
  margin-top:16px;
  border:1px dashed var(--line);
  border-radius:16px;
  background:#091724;
  color:var(--muted);
  padding:18px;
  text-align:center;
}

@media(max-width:1500px){
  .list{grid-template-columns:repeat(4,minmax(0,1fr));}
}

@media(max-width:1120px){
  .list{grid-template-columns:repeat(3,minmax(0,1fr));}
  .controls{grid-template-columns:1fr;}
}

@media(max-width:780px){
  .list{grid-template-columns:repeat(2,minmax(0,1fr));}
  .main-title{font-size:28px;}
}

@media(max-width:540px){
  .wrap{width:95%;}
  .list{grid-template-columns:1fr;}
}
</style>
</head>

<body>
<div class="wrap">

<h1 class="main-title">Simulations</h1>

<div class="controls">
  <input class="search" id="searchBox" placeholder="Search simulations..." />

  <div class="stat">
    <strong id="totalCount">0</strong>
    <span>Total Pages</span>
  </div>

  <div class="stat">
    <strong id="visibleCount">0</strong>
    <span>Visible Pages</span>
  </div>
</div>

<div class="list" id="pageList"></div>
<div class="empty" id="emptyState">No simulations matched your search.</div>

<script>
const pages = [
  ];

const pageList = document.getElementById("pageList");
const searchBox = document.getElementById("searchBox");
const totalCount = document.getElementById("totalCount");
const visibleCount = document.getElementById("visibleCount");
const emptyState = document.getElementById("emptyState");

pages.sort((a,b) => a[1].localeCompare(b[1]));

function renderPages(){
  pageList.innerHTML = "";

  pages.forEach(([url,title]) => {
    const card = document.createElement("a");
    card.className = "card";
    card.href = url;
    card.target = "_blank";
    card.rel = "noopener noreferrer";
    card.dataset.search = `${title} ${url}`.toLowerCase();

    card.innerHTML = `
      <span class="card-title">${title}</span>
    `;

    pageList.appendChild(card);
  });
}

function applyFilter(){
  const q = searchBox.value.trim().toLowerCase();
  let count = 0;

  document.querySelectorAll(".card").forEach(card => {
    const match = card.dataset.search.includes(q);
    card.style.display = match ? "flex" : "none";
    if(match) count++;
  });

  visibleCount.textContent = count;
  emptyState.style.display = count ? "none" : "block";
}

totalCount.textContent = pages.length;
visibleCount.textContent = pages.length;

renderPages();
searchBox.addEventListener("input",applyFilter);
</script>
</div>
</body>
</html>
