<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Physics Research Lab</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#070b14;
  color:#e9eefb;
}

.wrap{
  width:90%;
  max-width:1100px;
  margin:auto;
  padding:24px 0 50px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.brand{
  font-weight:bold;
}

.nav a{
  margin-left:10px;
  color:#9eacc8;
  text-decoration:none;
}

.panel{
  background:#121c2d;
  padding:20px;
  border-radius:10px;
  margin-bottom:18px;
}

h1{font-size:26px;}
h2{font-size:22px;}

.btn{
  padding:10px 14px;
  background:#1b2940;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.btn.primary{
  background:#67b7ff;
  color:#000;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.footer{
  text-align:center;
  color:#9eacc8;
  margin-top:20px;
}

/* POPUP */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal.show{
  display:flex;
}

.modal-box{
  width:90%;
  max-width:900px;
  background:#0f1726;
  border-radius:10px;
  overflow:hidden;
}

.modal-header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#121c2d;
}

.close{
  cursor:pointer;
  background:#1b2940;
  border:none;
  color:white;
  padding:6px 10px;
}

iframe{
  width:100%;
  height:600px;
  border:none;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="topbar">
    <div class="brand">Advanced Physics Research Lab</div>
    <div class="nav">
      <a href="#documents">Documents</a>
      <a href="#simulations">Simulations</a>
    </div>
  </div>

  <div class="panel">
    <h1>Theoretical Physics & Simulation</h1>
    <p>Exploring warp concepts, CST models, and advanced simulations.</p>

    <button class="btn primary" onclick="openModal()">Join Email Updates</button>
  </div>

  <div class="grid">
    <div class="panel" id="documents">
      <h2>Documents</h2>
      <p>Theory notes and research summaries.</p>
    </div>

    <div class="panel" id="simulations">
      <h2>Simulations</h2>
      <p>Exploratory visual tools.</p>
    </div>
  </div>

  <div class="footer">
    © 2026 Advanced Physics Research Lab
  </div>

</div>

<!-- POPUP -->
<div class="modal" id="popup">
  <div class="modal-box">
    <div class="modal-header">
      <strong>Email Signup</strong>
      <button class="close" onclick="closeModal()">X</button>
    </div>

    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScW6rUinihVUF4MzzRIgiuE5_IsbPnr9WCJuq5ZqjSymrnXxw/viewform?embedded=true"></iframe>
  </div>
</div>

<script>
const popup = document.getElementById("popup");

function openModal(){
  popup.classList.add("show");
}

function closeModal(){
  popup.classList.remove("show");
}

/* 🔥 AUTO OPEN AFTER 3 SECONDS */
setTimeout(() => {
  openModal();
}, 3000);

/* Close on outside click */
popup.addEventListener("click", function(e){
  if(e.target === popup){
    closeModal();
  }
});

/* ESC key close */
document.addEventListener("keydown", function(e){
  if(e.key === "Escape"){
    closeModal();
  }
});
</script>

</body>
</html>
